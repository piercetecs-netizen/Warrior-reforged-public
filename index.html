        pushLog(g, `Auto-forge: ${strikes} strike${strikes > 1 ? "s" : ""} → ${made.name} (${RARITIES[made.rarity].name}), ${outcome}. Spent ${spentMats}× ${mat.name} + ${fmt(spentGold)}g.`, "lvl");
        if (made.mw) pushSplash(g, "MASTERWORK", made.name, C.gilt);
      } else {
        pushLog(g, `Auto-forge: ${strikes} strikes, nothing bested your gear. Spent ${spentMats}× ${mat.name} + ${fmt(spentGold)}g (melts returned some gold).`, "sys");
      }
      return g;
    });

  const switchLoadout = (i) =>
    mutate((g) => {
      if (!FLAGS.loadouts) return g;
      if (i === g.loadoutIdx) return g;
      if (!g.camping) { pushLog(g, "Loadouts can only be changed at camp.", "sys"); return g; }
      g.loadouts = [...(g.loadouts || [null, null, null])];
      g.loadouts[g.loadoutIdx] = { ...g.eq };
      const lf = [...(g.loadoutFocus || [null, null, null])];
      lf[g.loadoutIdx] = g.focus ? [...g.focus] : null;
      const next = g.loadouts[i];
      g.loadoutIdx = i;
      g.focus = lf[i] ? [...lf[i]] : null;
      g.loadoutFocus = lf;
      g.eq = next ? { ...next } : Object.fromEntries(SLOT_KEYS.map((k) => [k, null]));
      g.hp = Math.min(g.hp, calcStats(g).maxHp);
      pushLog(g, `Loadout ${["Ⅰ", "Ⅱ", "Ⅲ"][i]} donned.`, "sys");
      return g;
    });

  const alignLoadout = () =>
    mutate((g) => {
      if (!FLAGS.loadouts) return g;
      if (!g.camping) { pushLog(g, "Alignment is a camp ritual.", "sys"); return g; }
      const label = ["Ⅰ", "Ⅱ", "Ⅲ"][g.loadoutIdx];
      const usedIds = new Set();
      const packTaken = new Set();
      const loTaken = [new Set(), new Set(), new Set()];
      let fromPack = 0, fromVault = 0, fromLo = 0, improved = 0;
      const cands = (slot, asOff) => {
        const out = [];
        const add = (it, src, meta) => {
          if (!it || usedIds.has(it.id)) return;
          const inst = asOff && it.slot === "weapon" ? { ...it, slot: "offhand" } : it;
          out.push({ it: inst, src, ...(meta || {}), bv: buildValue(g, inst, slot) });
        };
        add(g.eq[slot], "eq");
        (g.loadouts || []).forEach((L, li) => {
          if (li === g.loadoutIdx || !L) return;
          if (L[slot]) add(L[slot], "lo", { li, key: slot });
          if (asOff && g.cls === "blademaster" && L.weapon && L.weapon.wtype && !isTwoH(L.weapon)) add(L.weapon, "lo", { li, key: "weapon" });
        });
        g.inv.forEach((c) => {
          if (packTaken.has(c.id)) return;
          if (c.slot === slot) add(c, "pack");
          else if (asOff && g.cls === "blademaster" && c.slot === "weapon" && c.wtype && !isTwoH(c)) add(c, "pack");
        });
        (g.vault || []).forEach((vv) => {
          if (vv.slot === slot) add(vv, "vault");
          else if (asOff && g.cls === "blademaster" && vv.slot === "weapon" && vv.wtype && !isTwoH(vv)) add(vv, "vault");
        });
        return out;
      };
      const consume = (pk) => {
        if (!pk) return null;
        usedIds.add(pk.it.id);
        if (pk.src === "pack") { packTaken.add(pk.it.id); fromPack++; return pk.it; }
        if (pk.src === "lo") { loTaken[pk.li].add(pk.key); fromLo++; return pk.it; }
        if (pk.src === "vault") { fromVault++; return { ...pk.it, id: itemSeq++ }; }
        return pk.it;
      };
      const stow = (it) => {
        if (!it || usedIds.has(it.id)) return;
        if (isVaultClass(it)) { pushLog(g, `${it.name} rests in the vault.`, "sys"); return; }
        if (g.inv.length < INV_CAP && !packTaken.has(it.id)) g.inv = [...g.inv, it];
        else { g.gold += it.value; }
      };
      const nextEq = { ...g.eq };
      // weapons: judge the pair as a whole (locked hands stay put)
      if (!(g.locked && (g.locked.weapon || g.locked.offhand))) {
        const mains = cands("weapon", false);
        const offs = cands("offhand", true);
        let best = { v: -1 };
        for (const m of mains) {
          if (isTwoH(m.it)) { if (m.bv > best.v) best = { v: m.bv, m, o: null }; }
          else for (const o of [null, ...offs]) {
            if (o && o.it.id === m.it.id) continue;
            const v = m.bv + (o ? o.bv : 0);
            if (v > best.v) best = { v, m, o };
          }
        }
        if (best.m) {
          const oldW = g.eq.weapon, oldO = g.eq.offhand;
          const nm = consume(best.m);
          const no = best.o ? consume(best.o) : null;
          nextEq.weapon = nm; nextEq.offhand = no;
          if (!oldW || oldW.id !== (nm && nm.id)) improved++;
          if ((oldO ? oldO.id : null) !== (no ? no.id : null)) improved++;
          if (oldW && (!nm || nm.id !== oldW.id)) stow(oldW);
          if (oldO && (!no || no.id !== oldO.id)) stow(oldO);
        }
      }
      for (const k of SLOT_KEYS) {
        if (k === "weapon" || k === "offhand") continue;
        if (g.locked && g.locked[k]) continue;
        const list = cands(k, false);
        if (!list.length) continue;
        list.sort((a, b) => b.bv - a.bv);
        const top = list[0];
        const curIt = g.eq[k];
        if (curIt && top.it.id === curIt.id) { usedIds.add(curIt.id); continue; }
        const inst = consume(top);
        nextEq[k] = inst;
        improved++;
        if (curIt) stow(curIt);
      }
      g.inv = g.inv.filter((c) => !packTaken.has(c.id));
      g.loadouts = (g.loadouts || [null, null, null]).map((L, li) => {
        if (!L || !loTaken[li].size) return L;
        const M = { ...L };
        for (const key of loTaken[li]) M[key] = null;
        return M;
      });
      g.eq = nextEq;
      g.hp = Math.min(g.hp, calcStats(g).maxHp);
      pushLog(g, improved
        ? `Loadout ${label} aligned${g.focus ? " to " + g.focus.map((s) => s.toUpperCase()).join(">") : ""} — ${improved} slot${improved > 1 ? "s" : ""} adjusted (${fromPack} pack · ${fromVault} vault · ${fromLo} from other loadouts).`
        : `Loadout ${label} already stands optimal.`, "lvl");
      return g;
    });

  const equipFromVault = (vid) =>
    mutate((g) => {
      if (!g.camping) { pushLog(g, "The vault opens only at camp.", "sys"); return g; }
      const v = (g.vault || []).find((x) => x.id === vid);
      if (!v) return g;
      if (v.slot === "offhand" && isTwoH(g.eq.weapon)) {
        pushLog(g, "Your two-handed grip leaves no hand free.", "sys");
        return g;
      }
      if (v.slot === "weapon" && isTwoH(v)) displaceOffhand(g, false);
      const old = g.eq[v.slot];
      g.eq = { ...g.eq, [v.slot]: { ...v, id: itemSeq++ } };
      if (old) {
        if (isVaultClass(old)) pushLog(g, `${old.name} returns to the vault's keeping.`, "sys");
        else if (g.inv.length < INV_CAP) g.inv = [...g.inv, old];
        else { g.gold += old.value; pushLog(g, `Pack full — ${old.name} melted.`, "melt"); }
      }
      g.hp = Math.min(g.hp, calcStats(g).maxHp);
      pushLog(g, `Drawn from the vault: ${v.name}.`, "sys");
      return g;
    });

  const enchantGroup = () =>
    mutate((g) => {
      const it = g.eq[forgeSlot];
      if (!it) { pushLog(g, "Nothing is equipped in that slot.", "sys"); return g; }
      const avail = enchantCatsFor(it);
      if (!avail.length) { pushLog(g, `${RARITIES[it.rarity].name} gear is too plain to bind enchantments — reforge it to a higher rarity first.`, "sys"); return g; }
      const cur = itemProcsMap(it);
      const filled = avail.filter((c) => cur[c]);
      const rerollAll = filled.length === 0 || filled.length === avail.length;
      const targets = rerollAll ? avail : avail.filter((c) => !cur[c]);
      const nS = targets.length;
      const glyphC = 2 * nS, essC = 3 * nS, goldC = Math.round(45 * costScale(it.tier) * nS * (g.bg === "smith" ? 0.85 : 1) * (g.race === "ironkin" ? 0.88 : 1));
      if ((g.materials.glyph || 0) < glyphC || (g.essence || 0) < essC || g.gold < goldC) {
        pushLog(g, `The rite asks ${glyphC}× Glyph Dust, ${essC}精 and ${fmt(goldC)} gold.`, "sys");
        return g;
      }
      g.materials.glyph -= glyphC; g.essence -= essC; g.gold -= goldC;
      const np = { ...cur };
      if (rerollAll) for (const c of avail) delete np[c];
      for (const c of targets) np[c] = pick(procsOfCat(c));
      g.eq = { ...g.eq, [forgeSlot]: { ...it, procs: np, proc: undefined } };
      const names = targets.map((c) => "✦" + PROCS[np[c]].name).join(" · ");
      pushLog(g, filled.length === avail.length
        ? `The bound group re-rolls whole: ${names}.`
        : `Enchanted — ${nS} trait${nS > 1 ? "s" : ""} woven: ${names}.`, "lvl");
      if (avail.every((c) => np[c])) pushRibbon(g, avail.length >= 4 ? "FULLY ENCHANTED" : "ENCHANT SEALED", C.violet);
      return g;
    });

  const extractProcAct = (cat) =>
    mutate((g) => {
      const it = g.eq[forgeSlot];
      const pid = it && itemProcsMap(it)[cat];
      if (!pid) { pushLog(g, "No such trait on that piece.", "sys"); return g; }
      const goldCost = Math.round(80 * costScale(it.tier) * (g.bg === "smith" ? 0.85 : 1) * (g.race === "ironkin" ? 0.88 : 1));
      if ((g.materials.pearl || 0) < 1 || g.gold < goldCost) {
        pushLog(g, `Extraction asks 1× Chaos Pearl and ${fmt(goldCost)} gold.`, "sys");
        return g;
      }
      g.materials.pearl -= 1; g.gold -= goldCost;
      const np = { ...itemProcsMap(it) };
      delete np[cat];
      g.eq = { ...g.eq, [forgeSlot]: { ...it, procs: np, proc: undefined } };
      if (Math.random() < 0.6) {
        g.runes = { ...(g.runes || {}), [pid]: ((g.runes || {})[pid] || 0) + 1 };
        pushRibbon(g, "TRAIT EXTRACTED", C.violet);
        pushLog(g, `✦${PROCS[pid].name} drawn out whole — sealed as a rune.`, "lvl");
      } else {
        pushLog(g, `✦${PROCS[pid].name} unravels in the drawing… the trait is lost.`, "sys");
      }
      return g;
    });

  const applyRune = (pid) =>
    mutate((g) => {
      const it = g.eq[forgeSlot];
      if (!it) { pushLog(g, "Nothing is equipped in that slot.", "sys"); return g; }
      if (((g.runes || {})[pid] || 0) < 1) return g;
      const cat = PROCS[pid].cat;
      if (!enchantCatsFor(it).includes(cat)) { pushLog(g, `This ${RARITIES[it.rarity].name} ${SLOTS[it.slot].name} can't hold a ${cat} trait — reforge it higher.`, "sys"); return g; }
      g.runes = { ...g.runes, [pid]: g.runes[pid] - 1 };
      if (g.runes[pid] <= 0) delete g.runes[pid];
      const np = { ...itemProcsMap(it), [cat]: pid };
      g.eq = { ...g.eq, [forgeSlot]: { ...it, procs: np, proc: undefined } };
      pushLog(g, `Rune set: ${it.name} now bears ✦${PROCS[pid].name}.`, "lvl");
      return g;
    });

  const [elPick, setElPick] = useState("fire");

  const wardInfusion = () =>
    mutate((g) => {
      const it = g.eq[forgeSlot];
      if (!it) { pushLog(g, "Nothing is equipped in that slot.", "sys"); return g; }
      const pct = +clamp((0.06 + it.rarity * 0.03), 0.06, 0.25).toFixed(2);
      const goldC = Math.round(50 * costScale(it.tier) * (g.bg === "smith" ? 0.85 : 1) * (g.race === "ironkin" ? 0.88 : 1));
      if ((g.materials.glyph || 0) < 2 || g.gold < goldC) { pushLog(g, `The ward asks 2× Glyph Dust and ${fmt(goldC)} gold.`, "sys"); return g; }
      g.materials.glyph -= 2; g.gold -= goldC;
      g.eq = { ...g.eq, [forgeSlot]: { ...it, res: { el: elPick, pct } } };
      pushLog(g, `Warded: ${it.name} now resists ${ELEMENTS[elPick].name} ${Math.round(pct * 100)}%.`, "lvl");
      return g;
    });

  const edgeInfusion = (chaos) =>
    mutate((g) => {
      const it = g.eq[forgeSlot];
      if (!it || it.slot !== "weapon") { pushLog(g, "Only weapons take an elemental edge.", "sys"); return g; }
      if (chaos && it.rarity < 6) { pushLog(g, "Only an Eternal blade can hold CHAOS.", "sys"); return g; }
      const pct = chaos ? 0.5 : +clamp(0.2 + it.rarity * 0.05, 0.2, 0.45).toFixed(2);
      const goldC = Math.round(70 * costScale(it.tier) * (g.bg === "smith" ? 0.85 : 1) * (g.race === "ironkin" ? 0.88 : 1));
      if ((g.essence || 0) < 3 || (g.materials.glyph || 0) < 2 || g.gold < goldC) { pushLog(g, `The edge asks 3精, 2× Glyph Dust and ${fmt(goldC)} gold.`, "sys"); return g; }
      g.essence -= 3; g.materials.glyph -= 2; g.gold -= goldC;
      g.eq = { ...g.eq, [forgeSlot]: { ...it, infuse: chaos ? { el: "chaos", pct: 0.5 } : { el: elPick, pct } } };
      pushLog(g, chaos ? `CHAOS bound: ${it.name} now strikes with a random element, half its weight.` : `Edged: ${it.name} converts ${Math.round(pct * 100)}% of each hit to ${ELEMENTS[elPick].name}.`, "lvl");
      return g;
    });

  const openPouch = () =>
    mutate((g) => {
      const t2 = g.zone + 1;
      const cost = Math.round(90 * costScale(t2) * (g.bg === "merchant" ? 0.88 : 1));
      if (g.gold < cost) { pushLog(g, "Grey-Whisker sniffs at your empty purse.", "sys"); return g; }
      g.gold -= cost;
      const r = Math.random();
      let item;
      if (r < 0.005) {
        const E = ETERNALS[g.zone];
        item = makeItem(t2, { slot: E.slot, rarity: 6, name: E.name, boost: 1.15, wild: "chaos", proc: E.proc, wtype: E.wtype });
      } else if (r < 0.055) {
        const rslot = pickRelicSlot();
        item = makeItem(t2, { slot: rslot, rarity: 4, name: `${SIG_SETS[g.zone]} ${RELIC_NOUNS[rslot]}`, boost: 1.1, set: g.zone, favor: BOSS_SOULS[g.zone].favor, wild: "wild" });
      } else if (r < 0.135) item = makeItem(t2, { rarity: 4, wild: "wild" });
      else if (r < 0.235) item = makeItem(t2, { rarity: 3, wild: "wild" });
      else item = makeItem(t2, { minRarity: 1, wild: "wild" });
      pushLog(g, `Grey-Whisker's pouch opens: ${item.name} (${RARITIES[item.rarity].name}).`, "lvl");
      applyDrop(g, item);
      return g;
    });

  const openChest = () =>
    mutate((g) => {
      const t2 = g.zone + 1;
      const cost = Math.round(260 * costScale(t2) * (g.bg === "merchant" ? 0.88 : 1));
      if ((g.materials.pearl || 0) < 1 || g.gold < cost) {
        pushLog(g, `The Sealed Fate Chest asks 1× Chaos Pearl and ${fmt(cost)} gold.`, "sys");
        return g;
      }
      g.materials.pearl -= 1; g.gold -= cost;
      const r = Math.random();
      let item;
      if (r < 0.02) {
        const E = ETERNALS[g.zone];
        item = makeItem(t2, { slot: E.slot, rarity: 6, name: E.name, boost: 1.15, wild: "chaos", proc: E.proc, wtype: E.wtype });
      } else if (r < 0.14) item = makeItem(t2, { rarity: 5, wild: "chaos" });
      else item = makeItem(t2, { rarity: 4, wild: "wild" });
      ensureProc(item);
      pushLog(g, `Fate unseals: ${item.name} (${RARITIES[item.rarity].name}).`, "lvl");
      applyDrop(g, item);
      return g;
    });

  const exportSeed = () => {
    const g = gameRef.current;
    if (!g) return;
    const seed = encodeSeed(g);
    setSeedOut(seed);
    setSeedMsg("Seed forged. Copy it, or download the file below.");
    try {
      const blob = new Blob([seed], { type: "text/plain" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${(g.name || "hero").replace(/\W+/g, "-")}-lv${g.level}.warseed.txt`;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    } catch (e) { /* download blocked — text remains copyable */ }
  };

  const importSeed = (text) => {
    try {
      const g = decodeSeed(text);
      pushLog(g, "The seed takes root. Your journey resumes.", "sys");
      setGame(g);
      setPhase("play");
      setTab("battle");
      setSeedMsg(`Restored ${g.name}, level ${g.level} ${CLASSES[g.cls].name}.`);
      setSeedIn("");
      saveGame(g);
    } catch (e) {
      setSeedMsg("That seed would not sprout — check it was pasted whole.");
    }
  };

  const onSeedFile = (ev) => {
    const file = ev.target.files && ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => importSeed(String(reader.result || ""));
    reader.readAsText(file);
    ev.target.value = "";
  };

  const doReset = async () => {
    await clearSave();
    try { await store.delete(ECHO_KEY); } catch (e) { /* ignore */ }
    setCarry({ echoes: 0, rebirths: 0 });
    setGame(null);
    setConfirmReset(false);
    setReport(null);
    setTab("battle");
    setSeedOut("");
    setSeedMsg("");
    setPhase("select");
  };

  /* ---------- render ---------- */

  if (phase === "loading") {
    return <Frame><div className="center dim" style={{ padding: 60 }}>Unrolling the scroll…</div></Frame>;
  }

  if (phase === "select") {
    return (
      <Frame>
        <div className="titleblock">
          <div className="eyebrow">A personal edition · no ads · no paywalls · nothing tracked</div>
          <h1 className="gametitle">Warriors &amp; Adventure</h1>
          <div className="subtitle">Reforged</div>
          {carry.echoes > 0 && (
            <div className="echobanner mono tiny">
              回响 {carry.echoes} Echoes await your next life · +{carry.echoes}% XP &amp; gold · +{(carry.echoes * 0.5).toFixed(0)}% stats
            </div>
          )}
        </div>
        <div className="selectgrid">
          {Object.entries(CLASSES).map(([key, c]) => (
            <button
              key={key}
              className={"classcard" + (pickCls === key ? " picked" : "")}
              style={pickCls === key ? { borderColor: c.color } : {}}
              onClick={() => setPickCls(key)}
            >
              <Seal char={c.seal} color={c.color} size={52} />
              <div className="classname" style={{ color: c.color }}>{c.name}</div>
              <div className="classblurb">{c.blurb}</div>
              <div className="classpassive">{c.passive}</div>
              <div className="classstats mono">HP {c.hp} · ATK {c.atk} · DEF {c.def} · CRIT {c.crit}%</div>
            </button>
          ))}
        </div>
        <div className="sectionlabel" style={{ marginTop: 14 }}>Bloodline</div>
        <div className="chiprow">
          {Object.entries(RACES).map(([k, r]) => (
            <button
              key={k}
              className={"chip" + (pickRace === k ? " on" : "")}
              style={pickRace === k ? { borderColor: r.color, color: r.color } : {}}
              onClick={() => setPickRace(k)}
            >
              <span className="chipseal">{r.seal}</span>{r.name}
            </button>
          ))}
        </div>
        <div className="pickblurb tiny dim">{RACES[pickRace].blurb} · {RACES[pickRace].modText}</div>

        <div className="sectionlabel" style={{ marginTop: 10 }}>Past life</div>
        <div className="chiprow">
          {Object.entries(BACKGROUNDS).map(([k, b]) => (
            <button
              key={k}
              className={"chip" + (pickBg === k ? " on" : "")}
              onClick={() => setPickBg(k)}
            >
              <span className="chipseal">{b.seal}</span>{b.name}
            </button>
          ))}
        </div>
        <div className="pickblurb tiny dim">{BACKGROUNDS[pickBg].blurb} · {BACKGROUNDS[pickBg].passive}</div>

        <div className="namerow">
          <input
            className="nameinput"
            placeholder="Name your hero (optional)"
            maxLength={16}
            value={heroName}
            onChange={(e) => setHeroName(e.target.value)}
          />
          <button className="btn primary" onClick={start}>Begin</button>
        </div>
        <div className="seedimport">
          <div className="sectionlabel">Or plant a hero seed</div>
          <textarea
            className="seedbox"
            placeholder="Paste a WARSEED here to restore a hero…"
            value={seedIn}
            onChange={(e) => setSeedIn(e.target.value)}
          />
          <div className="seedacts">
            <button className="btn small" onClick={() => importSeed(seedIn)} disabled={!seedIn.trim()}>Plant seed</button>
            <label className="btn small ghost filelabel">
              Load seed file
              <input type="file" accept=".txt,.warseed,text/plain" onChange={onSeedFile} style={{ display: "none" }} />
            </label>
          </div>
          {seedMsg && <div className="small dim">{seedMsg}</div>}
        </div>
        <div className="footnote">
          Your hero fights on their own — check in, claim loot, weave skills. Progress saves to this device, and time away still counts.
        </div>
      </Frame>
    );
  }

  const g = game;
  if (!g) return <Frame><div className="center dim" style={{ padding: 60 }}>Unrolling the scroll…</div></Frame>;
  const st = calcStats(g);
  const z = ZONES[g.zone];
  const cls = CLASSES[g.cls];
  const t = g.zone + 1;
  const mi = matIdxForTier(t);
  const enemyFx = (g.fx || []).filter((f) => f.side === "enemy");
  const playerFx = (g.fx || []).filter((f) => f.side === "player");
  const critFx = enemyFx.filter((f) => f.crit).slice(-1)[0] || null;
  const hurtFx = playerFx.filter((f) => !f.heal).slice(-1)[0] || null;
  const lastEnemyFx = enemyFx.slice(-1)[0] || null;
  const fighting = !g.camping && g.dead === 0 && !!(g.enemies && g.enemies.length);
  const scent = Math.min(0.53, 0.03 + g.bossMeter[g.zone]);
  const xpFrac = g.xp / xpNeed(g.level);
  const tonicPrice = Math.round(35 * costScale(t) * (g.bg === "merchant" ? 0.88 : 1));
  const craftGold = (x) => Math.round(x * (g.bg === "smith" ? 0.85 : 1) * (g.race === "ironkin" ? 0.88 : 1));
  const gambleCost = (x) => Math.round(x * (g.bg === "merchant" ? 0.88 : 1));
  const forgeGold = craftGold(60 * costScale(t));
  const vigorColor = g.vigor >= 60 ? C.jade : g.vigor >= 25 ? C.gilt : C.cinnabar;
  const lowHp = g.dead === 0 && g.hp < st.maxHp * 0.25;
  const front = g.enemies && g.enemies[0];
  const others = g.enemies ? g.enemies.slice(1) : [];
  const zoneTrivial = g.level > z.lv[1] + 4;
  const gs = gearSum(g);
  const raceInfo = RACES[g.race] || RACES.human;
  const bgInfo = BACKGROUNDS[g.bg] || BACKGROUNDS.farmhand;
  const baseHp = Math.round(cls.hp + cls.hpL * (g.level - 1));
  const baseAtk = Math.round(cls.atk + cls.atkL * (g.level - 1));
  const baseDef = Math.round(cls.def + cls.defL * (g.level - 1));
  const sgn = (n) => (n >= 0 ? "+" : "−") + fmt(Math.abs(n));
  const priceOf = (p) => Math.round(p * (g.bg === "merchant" ? 0.88 : 1));
  const dots = {
    gear: g.inv.some((it) => {
      const cur = g.eq[it.slot];
      if (!cur) return false;
      const bvI = buildValue(g, it, it.slot);
      const bvE = buildValue(g, cur, it.slot);
      const frW = focusRanks(g);
      const fGain = frW.length ? focusCmp(it, cur, frW) > 0 : false;
      const nLoss = frW.every((k) => (it.stats[k] || 0) >= (cur.stats[k] || 0));
      return (fGain && bvI >= bvE * 0.85) || bvI > bvE * 1.03 || (nLoss && bvI > bvE * 1.005);
    }),
    skills: SKILLS.some((s) => s.cls === g.cls && g.level >= s.lv && !g.trained.includes(s.id) && !(g.training && g.training.id === s.id)),
    forge: g.materials[MATS[mi].key] >= 5 && g.gold >= forgeGold,
    zones: g.maxZone > g.zone,
  };

  const banner = g.paused
    ? { text: "Paused — the world holds its breath", color: C.dim }
    : g.camping
      ? { text: g.vigor >= 100 ? "Camped · rested and ready" : g.vigor < 40 ? "Camped · sleeping deeply…" : "Camped · resting by the fire", color: C.jade }
      : g.bossPending
        ? { text: `${z.boss} approaches — the next fight cannot be refused`, color: C.cinnabar }
        : zoneTrivial
          ? { text: "These foes are beneath you — XP sharply reduced", color: C.dim }
          : g.restedT > 0
            ? { text: `Rested · +25% XP for ${Math.ceil(g.restedT / 60)}m`, color: C.gilt }
            : { text: `Hunting in ${z.name} · ${g.kills[g.zone]} slain here`, color: C.dim };

  return (
    <Frame>
      {/* header */}
      <div className="hud">
        <div className="hudleft">
          <Seal char={cls.seal} color={cls.color} size={40} />
          <div className="hudinfo">
            <div className="heroname">{g.name}</div>
            <div className="herosub mono">{cls.name} · Lv {g.level} · {realmOf(g.level)}</div>
          </div>
        </div>
        <div className="hudright">
          <span className="gold mono"><span className="coin" />{fmt(g.gold)}</span>
          <button className="pausebtn" onClick={() => setShowStats(true)} aria-label="Hero stats">表</button>
          <button className="pausebtn" onClick={togglePause} aria-label={g.paused ? "Resume" : "Pause"}>
            {g.paused ? "▶" : "❚❚"}
          </button>
        </div>
      </div>

      {/* battle stage — fixed geometry, nothing jumps */}
      <div className={"stage" + (front && front.isBoss ? " bossstage" : "") + (g.camping ? " campstage" : "") + (g.lvlfx ? " lvlglow" : "")}>
        {g.splash && (
          <div key={g.splash.id} className="splash" style={{ color: g.splash.color, borderColor: g.splash.color, animationDuration: ((g.splash.dur || 2400) / 1000) + "s" }}>
            <div className="splashtext">{g.splash.text}</div>
            <div className="splashsub">{g.splash.sub}</div>
          </div>
        )}
        {g.ribbon && (
          <div key={g.ribbon.id} className="ribbonwrap">
            <span className="ribbon mono" style={{ color: g.ribbon.color, borderColor: g.ribbon.color }}>{g.ribbon.text}</span>
          </div>
        )}
        {g.lvlfx && (
          <div key={g.lvlfx.id} className="lvlburst">
            <div className="lvlrays" />
            <div className="lvlring" />
            <div className="lvlring lag" />
            <div className="lvlcol">
              <div className="lvltext mono">LEVEL {g.lvlfx.lvl} ▲</div>
              {g.lvlfx.gains && <div className="lvlgains mono">{g.lvlfx.gains}</div>}
            </div>
          </div>
        )}
        <div className="stagehead">
          <span className="zonename">{g.camping ? "Camp · " + z.name : z.name}</span>
          <span className="mono small" style={{ color: g.streak >= 10 ? C.cinnabar : C.dim }}>连 ×{g.streak || 0}</span>
        </div>

        {/* battle scene — vector actors, fixed height, nothing shifts */}
        <div className={"scene" + (fighting ? " fighting" : "") + (g.camping ? " camping" : "")}>
          <div className="sceneline" />
          <div className={"heroSpot" + (g.dead > 0 ? " fallen" : "") + (lowHp ? " lowfig" : "")}>
            <HeroFig cls={g.cls} camping={g.camping} />
          </div>
          {companionCfg(g) && !g.camping && g.dead === 0 && g.pet && g.pet.hp > 0 && (
            <div className={"beastSpot" + (g.formation === "back" ? " backline" : "")}>
              {companionCfg(g).kind === "guardian" ? <GuardianFig /> : <BeastFig />}
            </div>
          )}
          {fighting && lastEnemyFx && (
            <svg key={"s" + lastEnemyFx.id} className={"slashfx" + (lastEnemyFx.crit ? " critslash" : "")} width="46" height="46" viewBox="0 0 46 46" fill="none" strokeLinecap="round">
              <path d="M6 36C16 30 30 16 40 6" stroke={lastEnemyFx.crit ? C.gilt : C.bone} strokeWidth={lastEnemyFx.crit ? 3.4 : 2.4} />
            </svg>
          )}
          <div className="foeSpot">
            {g.camping ? (
              <CampfireFig />
            ) : g.dead > 0 ? null : g.enemies && g.enemies.length ? (
              g.enemies.slice(0, 3).map((f, i) => (
                <div key={i} className="foeStack" style={{ marginLeft: i ? -12 : 0, opacity: i ? 0.7 : 1 }}>
                  <FoeFig f={f} hurtKey={i === 0 ? "h" + (lastEnemyFx ? lastEnemyFx.id : 0) : "s"} />
                </div>
              ))
            ) : (
              <span className="mistdots mono">· · ·</span>
            )}
          </div>
        </div>

        <div className="enemyarea">
          {g.camping ? (
            <div className="campfire">
              <div className="flame">▲</div>
              <div className="dim small">HP and vigor recover here{g.training ? " · training underway" : ""}</div>
            </div>
          ) : g.dead > 0 ? (
            <div className="center">
              <div className="deadtext">Struck down…</div>
              <div className="dim mono small">reviving in {Math.ceil((g.dead * TICK_MS) / 1000)}s</div>
            </div>
          ) : front ? (
            <div className="enemystack">
              <div className={"enemybox" + (critFx ? " shake" : "")} key={critFx ? "c" + critFx.id : "steady"}>
                <div className="enemyrow">
                  <span className="enemyname">
                    {front.isBoss && <span className="bosstag">BOSS</span>}
                    {front.isElite && <span className="elitetag">ELITE</span>}
                    {front.name}
                  </span>
                  <span className="mono dim small">
                    Lv {front.lvl}{g.waveSize > 1 ? ` · ${g.enemies.length}/${g.waveSize}` : ""}
                  </span>
                </div>
                <Bar cur={front.hp} max={front.maxHp} color={front.isBoss ? C.cinnabar : front.isElite ? C.storm : "#b8593f"} height={12} />
                <div className="floatzone">
                  {enemyFx.map((f) => <span key={f.id} className={"float" + (f.crit ? " crit" : "")}>{f.text}</span>)}
                </div>
              </div>
              {others.map((f, i) => (
                <div key={i} className="minifoe">
                  <span className="mono tiny dim mininame">{f.name}</span>
                  <div className="minibar"><Bar cur={f.hp} max={f.maxHp} color={f.isElite ? C.storm : "#8a4a3a"} height={5} /></div>
                </div>
              ))}
            </div>
          ) : (
            <div className="center dim small mistline">A shape stirs in the mist…</div>
          )}
        </div>

        <div className={"playerbox" + (hurtFx ? " hurtflash" : "")} key={hurtFx ? "h" + hurtFx.id : "calm"}>
          <div className="enemyrow">
            <span className="mono small" style={{ color: C.bone }}>{g.name}</span>
            <span className={"mono small " + (lowHp ? "lowhptext" : "dim")}>
              {fmt(g.hp)}/{fmt(st.maxHp)}{g.buffs.shield > 0 ? ` · ⛨${fmt(g.buffs.shield)}` : ""}
            </span>
          </div>
          <div className={lowHp ? "lowhp" : ""}>
            <Bar cur={g.hp} max={st.maxHp} color={lowHp ? C.cinnabar : C.jade} height={12} />
          </div>
          <div className="floatzone">
            {playerFx.map((f) => <span key={f.id} className={"float" + (f.heal ? " heal" : " hurt")}>{f.text}</span>)}
          </div>
        </div>

        {companionCfg(g) && (() => {
          const ccfg = companionCfg(g);
          const cform = companionForm(g);
          const pcap = petMaxOf(g, st);
          const pet = g.pet || { hp: pcap, downT: 0 };
          const ccol = ccfg.kind === "guardian" ? "#e0d08a" : C.violet;
          return (
            <div className="beastrow">
              <span className="beastglyph" style={{ color: ccol, textShadow: `0 0 8px ${ccol}88` }}>{cform.glyph}</span>
              <span className="mono tiny" style={{ color: ccol }}>{cform.name}</span>
              <button className="chip formchip" onClick={toggleFormation}>
                {g.formation === "back" ? "⇠ back line" : "front line ⇢"}
              </button>
              <div className="petstats mono tiny">
                <div className="petbar">
                  <Bar cur={Math.max(0, pet.hp)} max={pcap} color={pet.hp <= 0 ? "#565d6d" : ccol} height={5} />
                </div>
                <span className="dim">
                  {pet.hp <= 0
                    ? `fallen · returns ${Math.ceil(pet.downT)}s`
                    : `HP ${fmt(Math.max(0, pet.hp))}/${fmt(pcap)} · ATK ${fmt(Math.round(st.atk * ccfg.atkShare))} · DEF ${fmt(Math.round(st.def * ccfg.petDefMul))}`}
                </span>
              </div>
              <div className="floatzone beastfloats">
                {(g.fx || []).filter((f) => f.side === "beast").map((f) => (
                  <span key={f.id} className={"float beasthit" + (f.heal ? " healf" : "")}>{f.text}</span>
                ))}
              </div>
            </div>
          );
        })()}

        <div className="meters">
          <div className="buffrow mono">
            {g.buffs.atkT > 0 && <span className="buffchip" style={{ color: C.cinnabar, borderColor: C.cinnabar }}>FURY +{Math.round((g.buffs.atkMult - 1) * 100)}%</span>}
            {g.buffs.critT > 0 && <span className="buffchip" style={{ color: C.storm, borderColor: C.storm }}>MIND +{g.buffs.critAdd}%</span>}
            {g.buffs.shield > 0 && <span className="buffchip" style={{ color: C.jade, borderColor: C.jade }}>WARD {fmt(g.buffs.shield)}</span>}
            {g.buffs.dotT > 0 && <span className="buffchip" style={{ color: C.violet, borderColor: C.violet }}>FLAME</span>}
            {g.restedT > 0 && <span className="buffchip" style={{ color: C.gilt, borderColor: C.gilt }}>RESTED +25%</span>}
            {g.vigor < 25 && <span className="buffchip" style={{ color: C.dim, borderColor: C.line }}>TIRED −25%</span>}
          </div>
          <div className="meterrow">
            <span className="meterlabel mono" style={{ color: vigorColor }}>气 vigor</span>
            <div className="meterbar"><Bar cur={g.vigor} max={100} color={vigorColor} height={5} /></div>
            <span className="meterval mono" style={{ color: vigorColor }}>{Math.round(g.vigor)}</span>
          </div>
          <div className="meterrow">
            <span className="meterlabel mono dim">scent</span>
            <div className="meterbar"><Bar cur={scent} max={0.53} color={C.cinnabar} height={5} /></div>
            <span className="meterval mono dim">{Math.round(scent * 100)}%</span>
          </div>
          <div className="meterrow">
            <span className="meterlabel mono dim">XP</span>
            <div className={"meterbar" + (xpFrac > 0.9 ? " xppulse" : "")}>
              <Bar cur={g.xp} max={xpNeed(g.level)} color={C.gilt} height={5} />
            </div>
            <span className="meterval mono dim">{fmt(g.xp)}/{fmt(xpNeed(g.level))}</span>
          </div>
          {g.cls === "ravager" && (
            <div className="meterrow">
              <span className="meterlabel mono" style={{ color: "#d14b2f" }}>怒 rage</span>
              <div className="meterbar"><Bar cur={g.rage || 0} max={100} color="#d14b2f" height={5} /></div>
              <span className="meterval mono" style={{ color: "#d14b2f" }}>{Math.round(g.rage || 0)}</span>
            </div>
          )}
        </div>
      </div>

      {/* status banner — always rendered, fixed height */}
      <div className="banner" style={{ color: banner.color, borderColor: banner.color }}>{banner.text}</div>

      {/* bounty board — a bite-size goal, always in sight */}
      <div className="bountyrow">
        {g.bounty && !g.bounty.done ? (
          <>
            <span className="tiny" style={{ color: C.gilt }}>◈</span>
            <span className="tiny">{g.bounty.label}</span>
            <div className="bountybar"><Bar cur={g.bounty.have} max={g.bounty.need} color={C.gilt} height={4} /></div>
            <span className="mono tiny dim">{g.bounty.have}/{g.bounty.need} · +{fmt(g.bounty.gold)}g</span>
          </>
        ) : (
          <span className="tiny dim">{g.bounty && g.bounty.done ? "Bounty complete — a new notice posts soon…" : "The bounty board is bare…"}</span>
        )}
      </div>

      {/* tabs */}
      <div className="tabs">
        {["battle", "gear", "skills", "forge", "vault", "zones"].map((tb) => (
          <button key={tb} className={"tab" + (tab === tb ? " on" : "")} onClick={() => setTab(tb)}>
            {tb === "gear" ? `Gear·${g.inv.length}` : tb[0].toUpperCase() + tb.slice(1)}
            {dots[tb] && <span className="tabdot" />}
          </button>
        ))}
      </div>

      {tab === "battle" && (
        <div className="pane">
          <button className={"btn campbtn" + (g.camping ? " camped" : "")} onClick={toggleCamp}>
            {g.camping ? "Break camp — return to the hunt" : "Set up camp — rest, sleep, and train"}
          </button>
          <div className="log mono">
            {g.log.slice().reverse().map((l) => (
              <div key={l.id} className={"logline " + l.kind}>{l.msg}</div>
            ))}
          </div>
          <div className="statline mono dim">
            ATK {fmt(st.atk)}{g.vigor < 25 ? " (−25% tired)" : ""} · DEF {fmt(st.def)} · CRIT {st.crit.toFixed(1)}% · slain {fmt(g.lifetimeKills)}
          </div>
        </div>
      )}

      {tab === "gear" && (
        <div className="pane">
          {(g.pendingUpgrades || []).map((q) => (
            <div key={q.itemId} className="upgradeprompt">
              <div className="tiny" style={{ color: C.bone }}>
                <b style={{ color: C.gilt }}>{q.itemName}</b> is worth <b style={{ color: C.jade }}>+{fmt(q.gain)}</b> build value over {q.curName}, but lowers your <b style={{ color: C.cinnabar }}>{q.drops}</b>. Replace?
              </div>
              <div className="skillacts" style={{ margin: 0 }}>
                <button className="btn tiny" onClick={() => resolveUpgrade(q.itemId, true)}>Replace</button>
                <button className="btn tiny ghost" onClick={() => resolveUpgrade(q.itemId, false)}>Keep current</button>
              </div>
            </div>
          ))}
          {FLAGS.loadouts && (
            <div className="focusrow">
              <span className="dim small">Loadout:</span>
              {[0, 1, 2].map((i) => (
                <button key={i} className={"chip" + (g.loadoutIdx === i ? " on" : "")} onClick={() => switchLoadout(i)}>
                  {["Ⅰ", "Ⅱ", "Ⅲ"][i]}
                </button>
              ))}
              <button className="chip" style={{ borderColor: C.jade, color: C.jade }} onClick={alignLoadout} disabled={!g.camping}>align to build</button>
              {!g.camping && <span className="tiny dim">at camp</span>}
            </div>
          )}
          <div className="guidehead">
            <div className="sectionlabel">{focusRanks(g).length ? `Equipped · ${focusRanks(g).map((s) => s.toUpperCase()).join(">")} preference` : "Equipped · pure upgrades equip themselves"}</div>
            <button className="guidetoggle" onClick={() => setShowLootGuide(!showLootGuide)}>
              {showLootGuide ? "hide guide" : "loot guide"}
            </button>
          </div>
          <div className="focusrow">
            <span className="dim small">Preference:</span>
            <button className={"chip" + (!focusRanks(g).length ? " on" : "")} onClick={clearFocus}>any</button>
            {["atk", "hp", "def", "crit"].map((f) => {
              const idx = focusRanks(g).indexOf(f);
              return (
                <button key={f} className={"chip" + (idx >= 0 ? " on" : "")} onClick={() => toggleFocusStat(f)}>
                  {f.toUpperCase()}{idx >= 0 ? ["¹", "²", "³", "⁴"][idx] : ""}
                </button>
              );
            })}
          </div>
          {showLootGuide && (
            <div className="guide">
              <div className="guidetitle">Rarity</div>
              {RARITIES.map((r) => (
                <div key={r.key} className="guiderow mono">
                  <span><span className="swatch" style={{ background: r.color }} /> <span style={{ color: r.color }}>{r.name}</span></span>
                  <span className="dim">×{r.mult} stats · {r.weight === 0 ? "bosses only" : `${r.weight < 1 ? r.weight : Math.round(r.weight)}% drop`}</span>
                </div>
              ))}
              <div className="guidetitle" style={{ marginTop: 8 }}>Tiers</div>
              <div className="tiny dim">An item's tier (T1–T12) is the zone it fell in. Each tier multiplies base stats ×1.5; rarity multiplies them again. Every item rolls two stat types drawn freely from ATK, HP, DEF, and CRIT — slots differ only in budget. Epic rolls 1 bonus substat, Legendary 2, Mythic 3.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Weapons &amp; mastery</div>
              {Object.entries(WEAPON_TYPES).map(([wk, w]) => (
                <div key={wk} className="guiderow mono">
                  <span style={{ color: C.bone }}>{w.name}</span>
                  <span className="dim">{w.hands}H · {w.spd} spd · ×{w.dmg} dmg</span>
                </div>
              ))}
              <div className="tiny dim" style={{ marginTop: 4 }}>Speed above 1.0 is the chance of an extra basic strike each tick; two-handers trade speed for heavier blows and seal the offhand while gripped. Each class masters certain types for +10% weapon damage — Warrior: sword/greatsword/glaive · Blademaster: sword/saber/dagger (and may wield a second one-hander, striking with both) · Mage: staff/whisk · Taoist: fists/whisk/staff · Beastcaller: saber/glaive/dagger · Monk: fists/staff/whisk · Shadow: dagger/saber · Sentinel: sword/glaive · Ranger: dagger/saber · Berserker: greatsword/glaive/saber · Warlock, Cleric, Necromancer: staff/whisk · Samurai: sword/saber · Druid: staff/fist · Spellblade: sword/saber/staff. Fist weapons are hand-to-hand: two-handed yet fastest of all.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>How skills choose their moment</div>
              <div className="tiny dim">Woven skills no longer fire the instant they're ready — they wait for the moment they matter. Sustain casts on NEED (heals when you or your companion are hurt — Berserkers cling to their wounds far longer, since bloodrage feeds on them); buffs recast only once the old one fades; running afflictions aren't clobbered; shields aren't stacked onto a full ward. DPS respects the target: great nukes hold when a basic strike would finish common prey (Elites and bosses always merit them), and grand AOE waits for a pack — or a boss — rather than one straggler. Nothing ever burns a cooldown into empty air, though shields and mending may be laid between waves. Rage runs its own economy: the Ravager reserves 60+ rage finishers for worthy prey — but at 90+ rage it DUMPS freely, because capped rage is rage wasted. A held skill costs nothing: no cooldown, no rage.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Companions &amp; formation</div>
              <div className="tiny dim">Beastcallers and Clerics fight through a partner: the companion carries a SHARE of your power (its strikes and HP scale with your stats) while your own numbers are reduced to pay for it — the Cleric most of all, a pure healer at 35% ATK whose Votive Guardian bears 85%. Companions have real HP shown beside the battle: they can FALL (returning after ≈ six beats, or nursed faster at the campfire), and Cleric healing mends them alongside you. Tap the chip on the companion row to set the formation — <b>front line</b> puts your partner ahead to soak every enemy strike and boss breath; <b>back line</b> tucks it behind you so the blows land on you instead. The Cleric's Martyr's Communion transforms grief into might: castable only while the Guardian lies fallen.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>The Four Elements</div>
              <div className="tiny dim">The wheel: <b style={{ color: "#e0562f" }}>火 Fire</b> scorches <b style={{ color: "#b08d4f" }}>土 Earth</b>, Earth grounds <b style={{ color: "#6c8fc4" }}>雷 Storm</b>, Storm rides <b style={{ color: "#5fa8c8" }}>水 Water</b>, Water douses Fire. Striking with the winning element deals ×1.3; striking into your counter, ×0.75. Neutral damage ignores the wheel.</div>
              <div className="tiny dim" style={{ marginTop: 4 }}>Aligned foes (65% of lesser spawns) bear a glyph, hit 8% harder, deal their element (your resistances blunt it, cap 75%), and RESIST their own element by menace: normals 20%, Elites 45% — and every zone boss is fully IMMUNE to its own element, so bring the counter or neutral steel. Bosses also breathe: heavy elemental bursts on a cadence, and rage when denied.</div>
              <div className="tiny dim" style={{ marginTop: 4 }}>Your elemental tools: skills marked with a glyph strike as that element whole. Gear from Rare up may carry a <b>ward</b> (土res12%); weapons from Epic up may carry an <b>edge</b> converting a share of every hit (火infuse30%) — Eternal blades can bind <b>CHAOS</b>: a random element per trigger at 50%. Both can be set at the bench. Elemental bloodlines and past lives add resistance beneath it all.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>The rules of the pack</div>
              <div className="tiny dim">Pure upgrades (nothing lower, something higher) equip themselves and melt the old piece. Sidegrades that score higher but lose a stat wait in your pack. Everything else melts to gold. Each zone boss guards a full relic set — one signature piece for every slot; 25% chance per kill to claim a random piece.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Boss souls</div>
              <div className="tiny dim">Every boss imbues its loot with its nature — the Direwolf's ferocity leans ATK &amp; CRIT, the Bone Tyrant's deathless bulk leans HP &amp; DEF, and so on; favored stats roll three times as often but nothing is guaranteed. Boss loot runs wild (roughly ±45%; Silence wilder still), can carry a third stat, and grows with the slain boss's level — a Lv 120 Silence pays far better than its floor. Relics announce their roll: Dormant, plain, Roused, Furious, or the rare Awakened.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Eternals</div>
              <div className="tiny dim">Each tier hides one Eternal artifact — Moonhowl, Gravemantle, The Last Word… — that only its boss can yield: 2% per kill, rolled in full chaos, always bearing its signature proc.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Procs — buffs &amp; debuffs</div>
              {Object.values(PROCS).map((pr) => (
                <div key={pr.name} className="guiderow mono" style={{ alignItems: "flex-start" }}>
                  <span style={{ color: pr.color, flexShrink: 0 }}>✦{pr.name} <span className="dim tiny">{pr.cat}{pr.aoe ? "·AOE" : ""}</span></span>
                  <span className="dim" style={{ textAlign: "right" }}>{pr.desc}</span>
                </div>
              ))}
              <div className="tiny dim" style={{ marginTop: 4 }}>Chances roll once per battle tick (0.6s) or per trigger.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Enchant slots by rarity</div>
              <div className="tiny dim">An item's rarity sets how many trait slots it can ever hold, and its equipment type sets which categories fill first — so gear reads logically: <b style={{ color: C.cinnabar }}>weapons</b> lean offensive, <b style={{ color: C.storm }}>armor</b> defensive, trinkets utility, boots/cloak/gloves sustain. <b>Common: 0 — cannot be enchanted.</b> Uncommon: 1 slot. Rare: 2. Epic &amp; Legendary: 3. Mythic: 4. <b style={{ color: RARITIES[6].color }}>Eternal: all 4, every type guaranteed.</b></div>
              <div className="tiny dim" style={{ marginTop: 4 }}>On a fresh drop, higher rarity guarantees more and rolls the rest by chance: Uncommon ~40% for its one trait; Rare each of 2 slots ~45%; Epic 1 guaranteed +~40% for more; Legendary 1 guaranteed +~50%; Mythic 2 guaranteed +~55%; Eternal fills every slot. At the Enchanting bench, traits form a BOUND GROUP sized to the item's available slots — enchanting fills open slots (after an extraction, or a drop that arrived partial), then re-rolls them together once all are sealed. Reforging an item to a higher rarity opens more slots. Runes set one category deterministically (only where the rarity allows).</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>What stacks, what doesn't</div>
              <div className="tiny dim"><b style={{ color: C.jade }}>Stacks:</b> different traits combine freely — an item may carry one of each category (offensive + defensive + sustain + passive), and traits on different pieces all apply. Percentage SET bonds from different sets stack too, and stack on top of traits.</div>
              <div className="tiny dim" style={{ marginTop: 4 }}><b style={{ color: C.cinnabar }}>Doesn't stack:</b> the SAME trait twice does nothing the second time. Traits are all-or-nothing flags, not additive percentages — for example <b>Ironblood (+6% max HP)</b> on two pieces still grants <b>+6%, not +12%</b>; a second Ironblood is wasted. Likewise two Scorches don't burn harder, two Greedglints don't pay more. One offensive trait per item also means <b>Scorch and Stormbrand can't share a piece</b> (same category). The upgrade valuation knows this: a trait adds worth only when no other worn piece already grants it.</div>
              <div className="tiny dim" style={{ marginTop: 4 }}>So to actually stack effects, spread DIFFERENT traits across your slots rather than repeating a favorite. Flat item stats (ATK/HP/DEF/CRIT numbers) always add up normally — only the named trait effects follow the no-duplicate rule.</div>
              <div className="tiny dim" style={{ marginTop: 4 }}><b style={{ color: C.gilt }}>Same-trait trigger chance is CAPPED, not increased.</b> Two Scorch pieces don't give 24% — they give one 12% roll, exactly as if you wore one; the second is inert. Trigger odds never add up across duplicates. To raise your effective proc rate, carry DIFFERENT traits so more independent rolls happen each tick.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Set bonds</div>
              <div className="tiny dim">Bonds form on specific slots: Edge (weapon+amulet), Grip (offhand+gloves), Bulwark (armor+helm+boots), Warplate (pauldrons+greaves), Binding (belt+ring+talisman), Veil (cloak+bracers), Chime (earring+anklet), and the Full sixteen (+12% boss damage, +8% all stats). On top, every bond channels its boss's soul: each formed bond adds +3% to the boss's first favored stat and +2% to its second (Silence: +1.5% to everything) — so a Direwolf bond breathes ferocity while a Bone Tyrant bond hardens you. Bonds from different sets stack; relic pieces fall unevenly, weapons rarest of all.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Locks</div>
              <div className="tiny dim">Lock a slot and nothing auto-equips into it — would-be upgrades go to your pack instead, marked with a green upgrade tag, so you review the comparison and equip by hand.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Build preference — weighted ranking</div>
              <div className="tiny dim">Set one preference: tap stats in order to rank them (ATK¹ CRIT² …). Every find is scored for its real impact on your character — ranked stats weigh heaviest (×1.6 / ×1.25 / ×1.0 / ×0.85; unranked ×0.55), and value already accounts for weapon DPS, procs, and diminishing returns near caps. Missing stats count as literal zeroes on both sides. Any strict gain along your ranking auto-equips (with a floor against ruinous trades); a find that never lowers a ranked stat upgrades on any overall gain; preference-raising trades are never melted — at worst they wait in your pack.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>When you're asked to choose</div>
              <div className="tiny dim">If a drop is worth far more overall (15%+ build value) but would LOWER a stat you rank, it isn't equipped automatically — a prompt appears at the top of the Gear tab so you decide. Choose Replace and the piece equips while your old one is kept (moved to your pack, or the vault if it's attuned) — never auto-melted. Choose Keep current and the find simply waits in your pack.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Stat caps — where stats stop mattering</div>
              <div className="tiny dim"><b style={{ color: C.storm }}>CRIT</b> is a hard ceiling at <b>100%</b>: it's the chance to crit, so points beyond 100% do nothing — the stat sheet turns gold when you hit it. <b style={{ color: C.jade }}>DEF</b> keeps helping but with sharply diminishing returns past <b>~400</b> (mitigation flattens), so valuation counts DEF over the cap at ~25% worth. <b style={{ color: C.cinnabar }}>ATK</b> and <b style={{ color: C.jade }}>HP</b> have no hard cap — they scale with the endless endgame. The stat sheet (tap your name) shows each cap and highlights any you've reached.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>The Spoils Vault</div>
              <div className="tiny dim">Set pieces and Mythic+ finds attune on pickup and can never be lost — they live in the Vault tab, equipable at camp without melting anything. Only true duplicates melt: if a new piece's stats are matched or bettered by a stored twin it melts as surplus, and stored pieces a new find strictly beats are refined away. Every distinct stat combination is kept.</div>
              <div className="tiny dim" style={{ marginTop: 4 }}>Upgrade value now credits set synergy: a relic that would complete or extend a bond is scored with the bond bonus it unlocks (weighted to your build and scaled to your current power), so set pieces read as the upgrades they are and the loot AI won't shatter a formed bond for a slightly higher raw stat. Pack pieces that advance a bond are flagged <b style={{ color: C.gilt }}>+bond</b>.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Foes &amp; XP</div>
              <div className="tiny dim">Foe strength grows with foe level, not zone walls — expect packs of 2–3 striking together and Elites with deep health and better loot. Elites and even bosses sometimes arrive with cohorts; when Elites hunt in a group, every member is Elite, each with full Elite spoils. Foes 5+ levels beneath you pay −10% XP per level below, down to 10%. Kill streaks (连) sweeten gold up to +20% and break only on death; the bounty board posts fresh micro-quests for gold and materials.</div>
            </div>
          )}
          {(() => {
            const { detail } = setTiers(g);
            const active = Object.entries(detail).filter(([, d]) => d.count >= 1);
            if (!active.length) return null;
            return (
              <div className="setpanel">
                {active.map(([sIdx, d]) => (
                  <div key={sIdx} className="setrow">
                    <span className="small" style={{ color: C.gilt }}>{SIG_SETS[sIdx]} set · {d.count}/{SLOT_KEYS.length} worn</span>
                    <span className="mono tiny setiers">
                      {SET_GROUPS.map((grp) => (
                        <span key={grp.key} style={{ color: d.groups[grp.key] ? C.jade : C.dim }}>
                          {grp.name} ({grp.slots.map((sl) => SLOTS[sl].name).join("+")}): {grp.text}
                        </span>
                      ))}
                      <span style={{ color: d.full ? C.jade : C.dim }}>Full ×10: boss +15% · +10% all stats</span>
                    </span>
                  </div>
                ))}
              </div>
            );
          })()}
          <div className="eqgrid">
            {SLOT_KEYS.map((k) => {
              const it = g.eq[k];
              const lk = g.locked && g.locked[k];
              return (
                <div key={k} className={"eqslot" + (lk ? " lockedslot" : "")} style={it ? { borderColor: RARITIES[it.rarity].color } : {}}>
                  <button className={"lockbtn" + (lk ? " on" : "")} onClick={() => toggleLock(k)}>
                    {lk ? "locked" : "lock"}
                  </button>
                  <div className="slothead">
                    <ItemIcon slot={it && it.wtype ? "weapon" : k} color={it ? RARITIES[it.rarity].color : "#565d6d"} size={16} />
                    <span className="dim tiny">{SLOTS[k].name}</span>
                  </div>
                  {it ? (
                    <>
                      <div className="itemname" style={{ color: RARITIES[it.rarity].color }}>{it.name}{it.temper ? ` +${it.temper}` : ""}{typeof it.set === "number" && <span className="settag">set</span>}{masteryOf(g, it) && <span className="settag" style={{ borderColor: C.jade, color: C.jade }}>mastery</span>}</div>
                      <div className="mono tiny dim">{itemStatText(it)}</div>
                      {itemProcs(it).map((pid3) => PROCS[pid3] && (
                        <div key={pid3} className="tiny" style={{ color: PROCS[pid3].color }}>✦{PROCS[pid3].name}: {PROCS[pid3].desc}</div>
                      ))}
                    </>
                  ) : (
                    <div className="dim tiny">{k === "offhand" && isTwoH(g.eq.weapon) ? "— two-handed grip —" : "— empty —"}</div>
                  )}
                </div>
              );
            })}
          </div>

          <div className="sectionlabel" style={{ marginTop: 12 }}>
            Pack · {g.inv.length}/{INV_CAP} · trade-off finds only
          </div>
          <div className="dim small">Drops that don't beat your gear melt to gold on their own. What lands here gains one stat at the cost of another.</div>
          {g.inv.length > 0 && (
            <button className="btn ghost small" onClick={sellAll}>Melt the whole pack</button>
          )}
          {g.inv.length === 0 && <div className="dim small" style={{ padding: "6px 2px" }}>Nothing worth carrying yet.</div>}
          {g.inv
            .slice()
            .sort((a, b) => b.rarity - a.rarity || b.tier - a.tier)
            .map((it) => {
              const cur = g.eq[it.slot];
              const bvI = buildValue(g, it, it.slot);
              const bvE = buildValue(g, cur, it.slot);
              const frW = focusRanks(g);
              const fGain = cur && frW.length ? focusCmp(it, cur, frW) > 0 : false;
              const nLoss = cur ? frW.every((k) => (it.stats[k] || 0) >= (cur.stats[k] || 0)) : false;
              const wouldUp = cur && ((fGain && bvI >= bvE * 0.85) || bvI > bvE * 1.03 || (nLoss && bvI > bvE * 1.005));
              const bondGain = typeof it.set === "number" &&
                bondPoints(g, calcStats(g), statWeights(g), eqWith(g.eq, it.slot, it)) >
                bondPoints(g, calcStats(g), statWeights(g), g.eq) + 0.5;
              return (
                <div key={it.id} className="itemrow" style={{ borderLeftColor: RARITIES[it.rarity].color }}>
                  <ItemIcon slot={it.wtype ? "weapon" : it.slot} color={RARITIES[it.rarity].color} size={22} />
                  <div className="itemmain">
                    <div className="itemname" style={{ color: RARITIES[it.rarity].color }}>
                      {it.name} <span className="mono dim tiny">{SLOTS[it.slot].name} T{it.tier}</span>
                      {typeof it.set === "number" && <span className="settag">set</span>}
                      {bondGain && <span className="settag" style={{ borderColor: C.gilt, color: C.gilt }}>+bond</span>}
                      {masteryOf(g, it) && <span className="settag" style={{ borderColor: C.jade, color: C.jade }}>mastery</span>}
                      {wouldUp && <span className="upgtag">upgrade</span>}
                    </div>
                    <div className="mono tiny dim">
                      {cur && (
                        <span style={{ color: bvI >= bvE ? C.jade : C.cinnabar }}>
                          Δ{fmt(bvI - bvE)} build value ·{" "}
                        </span>
                      )}
                      {itemStatText(it)}{cur ? ` — now: ${itemStatText(cur)}` : ""}
                    </div>
                  </div>
                  <div className="itemacts">
                    <button className="btn tiny" onClick={() => equip(it)}>Equip</button>
                    {g.cls === "blademaster" && it.slot === "weapon" && !isTwoH(it) && !isTwoH(g.eq.weapon) && (
                      <button className="btn tiny ghost" onClick={() => equipOff(it)}>Off</button>
                    )}
                    <button className="btn tiny ghost" onClick={() => sell(it)}>{fmt(it.value)}g</button>
                  </div>
                </div>
              );
            })}
        </div>
      )}

      {tab === "skills" && (
        <div className="pane">
          {g.training && (
            <div className="trainbar">
              <div className="enemyrow">
                <span className="small">Training: {SKILLS.find((s) => s.id === g.training.id)?.name}</span>
                <span className="mono tiny dim">{g.camping ? Math.ceil(g.training.left) + "s left" : "paused — needs camp"}</span>
              </div>
              <Bar cur={g.training.total - g.training.left} max={g.training.total} color={C.storm} height={6} />
            </div>
          )}
          <div className="dim small">New skills must be trained at camp before they can be woven. Weave up to three (Beastcallers four) — one more loom opens at level 50. Skills marked ⛬ strike every foe in a pack.</div>
          {SKILLS.filter((s) => s.cls === g.cls).map((s) => {
            const locked = g.level < s.lv;
            const trained = g.trained.includes(s.id);
            const inTraining = g.training && g.training.id === s.id;
            const on = g.skillsOn.includes(s.id);
            const cd = g.cds[s.id] || 0;
            return (
              <div key={s.id} className={"skillrow" + (on ? " on" : "") + (locked ? " locked" : "")}>
                <div className="skillhead">
                  <span className="skillname" style={on ? { color: cls.color } : {}}>{s.name}{AOE[s.id] ? " ⛬" : ""}</span>
                  <span className="mono tiny dim">
                    {locked ? `unlocks Lv ${s.lv}`
                      : !trained ? (inTraining ? "in training" : `train · ${s.tt}s`)
                      : g.cls === "ravager" ? (on ? ((g.rage || 0) >= s.cd * 4 ? `怒${s.cd * 4} · primed` : `怒${s.cd * 4} · building`) : `怒${s.cd * 4}`)
                      : on ? (cd > 0 ? `cd ${cd.toFixed(0)}s` : "woven") : "ready"}
                  </span>
                </div>
                <div className="tiny dim">{s.desc}</div>
                <div className="skillacts">
                  {!locked && !trained && !inTraining && (
                    <button className="btn tiny" onClick={() => startTraining(s.id)}>Begin training</button>
                  )}
                  {trained && (
                    <button className="btn tiny" onClick={() => toggleSkill(s.id)}>{on ? "Unweave" : "Weave"}</button>
                  )}
                </div>
              </div>
            );
          })}
          <div className="classpassive">{cls.passive}</div>
        </div>
      )}

      {tab === "forge" && (
        <div className="pane">
          <div className="sectionlabel">Materials</div>
          <div className="matgrid">
            {MATS.map((m) => (
              <div key={m.key} className="matchip" style={{ borderColor: m.color }}>
                <span style={{ color: m.color }}>{m.name}</span>
                <span className="mono">{g.materials[m.key]}</span>
              </div>
            ))}
            <div className="matchip" style={{ borderColor: C.violet, gridColumn: "1 / -1" }}>
              <span style={{ color: C.violet }}>Spirit Essence 精 <span className="dim tiny">from melted Epic+ gear</span></span>
              <span className="mono">{g.essence || 0}</span>
            </div>
          </div>

          <div className="guidehead" style={{ marginTop: 10 }}>
            <div className="sectionlabel">The Forge</div>
            <button className="guidetoggle" onClick={() => setShowForgeGuide(!showForgeGuide)}>
              {showForgeGuide ? "hide guide" : "forge guide"}
            </button>
          </div>
          {showForgeGuide && (
            <div className="guide">
              <div className="guidetitle">Forge odds (per strike)</div>
              <div className="guiderow mono"><span style={{ color: RARITIES[2].color }}>Rare</span><span className="dim">55%</span></div>
              <div className="guiderow mono"><span style={{ color: RARITIES[3].color }}>Epic</span><span className="dim">32%</span></div>
              <div className="guiderow mono"><span style={{ color: RARITIES[4].color }}>Legendary</span><span className="dim">11.5%</span></div>
              <div className="guiderow mono"><span style={{ color: RARITIES[5].color }}>Mythic</span><span className="dim">1.5%</span></div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Materials by tier</div>
              <div className="guiderow mono"><span style={{ color: MATS[0].color }}>Iron Shard</span><span className="dim">zones T1–T3</span></div>
              <div className="guiderow mono"><span style={{ color: MATS[1].color }}>Spirit Ash</span><span className="dim">zones T4–T6</span></div>
              <div className="guiderow mono"><span style={{ color: MATS[2].color }}>Drake Scale</span><span className="dim">zones T7–T9</span></div>
              <div className="guiderow mono"><span style={{ color: MATS[3].color }}>Star Fragment</span><span className="dim">zones T10–T12</span></div>
              <div className="tiny dim" style={{ marginTop: 6 }}>Auto-forge strikes again and again until a piece equips itself or lands in your pack, then stops — or until materials or gold run dry. Melted misses return some gold.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Masterwork</div>
              <div className="tiny dim">Every strike — plain, auto, or rite — has a 10% chance to come out Masterwork: +25% to all stats.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Spirit Essence 精</div>
              <div className="tiny dim">Melting Epic+ gear distills essence: Epic 1 · Legendary 3 · Mythic 8. Ten essence fuels the Focused Rite — a guaranteed Legendary (85%) or Mythic (15%) in your chosen slot.</div>
              <div className="guidetitle" style={{ marginTop: 8 }}>Tempering 打磨</div>
              <div className="tiny dim">Hone an equipped piece up to +5; each pass grants +8% to all its stats, at rising material and gold cost keyed to the item's tier.</div>
            </div>
          )}
          <div className="dim small">Spend 5× {MATS[mi].name} + {fmt(forgeGold)} gold to commission a rare-or-better piece at tier {t}.</div>
          <div className="slotpicker">
            {SLOT_KEYS.map((k) => (
              <button key={k} className={"chip" + (forgeSlot === k ? " on" : "")} onClick={() => setForgeSlot(k)}>
                {SLOTS[k].name}
              </button>
            ))}
          </div>
          <button
            className="btn primary"
            onClick={forge}
            disabled={g.materials[MATS[mi].key] < 5 || g.gold < forgeGold}
          >
            Forge {SLOTS[forgeSlot].name} — 5× {MATS[mi].name} + {fmt(forgeGold)}g
          </button>
          <button
            className="btn"
            onClick={autoForge}
            disabled={g.materials[MATS[mi].key] < 5 || g.gold < forgeGold}
          >
            Auto-forge until upgrade
          </button>
          <button
            className="btn"
            style={{ borderColor: C.violet, color: (g.essence || 0) >= 10 ? C.violet : undefined }}
            onClick={focusedForge}
            disabled={(g.essence || 0) < 10 || g.materials[MATS[mi].key] < 5 || g.gold < craftGold(120 * costScale(t))}
          >
            Focused Rite — 10精 + 5× {MATS[mi].name} + {fmt(craftGold(120 * costScale(t)))}g · Legendary guaranteed
          </button>

          <div className="sectionlabel" style={{ marginTop: 12 }}>Tempering 打磨</div>
          {g.eq[forgeSlot] ? (
            <div className="shoprow" style={{ borderLeft: `3px solid ${RARITIES[g.eq[forgeSlot].rarity].color}` }}>
              <ItemIcon slot={forgeSlot} color={RARITIES[g.eq[forgeSlot].rarity].color} size={20} />
              <div style={{ minWidth: 0, flex: 1 }}>
                <div className="itemname" style={{ color: RARITIES[g.eq[forgeSlot].rarity].color }}>
                  {g.eq[forgeSlot].name}{g.eq[forgeSlot].temper ? ` +${g.eq[forgeSlot].temper}` : ""}
                </div>
                <div className="mono tiny dim">{itemStatText(g.eq[forgeSlot])}</div>
              </div>
              {(g.eq[forgeSlot].temper || 0) >= 5 ? (
                <span className="mono tiny" style={{ color: C.gilt }}>honed</span>
              ) : (
                <button className="btn tiny" onClick={temper}>
                  +8% · {2 + (g.eq[forgeSlot].temper || 0)}× {MATS[matIdxForTier(g.eq[forgeSlot].tier)].name.split(" ")[0]} + {fmt(craftGold(40 * costScale(g.eq[forgeSlot].tier) * ((g.eq[forgeSlot].temper || 0) + 1)))}g
                </button>
              )}
            </div>
          ) : (
            <div className="dim small">Equip something in the chosen slot to hone it — up to +5, each pass +8% to all its stats.</div>
          )}

          <div className="sectionlabel" style={{ marginTop: 12 }}>Enchanting 呪</div>
          {g.eq[forgeSlot] ? (() => {
            const eit = g.eq[forgeSlot];
            const avail = enchantCatsFor(eit);
            const cap = ENCHANT_CAP[eit.rarity] || 0;
            const curMap = itemProcsMap(eit);
            const filledN = avail.filter((c) => curMap[c]).length;
            const nS = filledN === 0 || filledN === avail.length ? avail.length : avail.length - filledN;
            const goldC = craftGold(45 * costScale(eit.tier) * nS);
            return (
              <div className="guide">
                <div className="tiny dim">
                  {cap === 0
                    ? `${eit.name} is ${RARITIES[eit.rarity].name} — too plain to bind any enchantment. Reforge it to Uncommon or better to open trait slots.`
                    : `${eit.name} · ${RARITIES[eit.rarity].name} — ${cap} of 4 trait slot${cap > 1 ? "s" : ""} available (rarity sets the count; type sets the order). Enchanting fills open slots; once all available are sealed it re-rolls them together. Extract (1× Chaos Pearl) pulls a trait, 60% to keep it as a rune.`}
                </div>
                {PROC_CATS.map((cat) => {
                  const pid = curMap[cat];
                  const open = avail.includes(cat);
                  const needR = minRarityForEnchantSlot(slotCatPriority(eit.slot).indexOf(cat));
                  return (
                    <div key={cat} className="guiderow mono">
                      <span style={{ color: pid ? PROCS[pid].color : open ? C.dim : "#565d6d" }}>
                        {cat}: {pid ? "✦" + PROCS[pid].name : open ? "— open —" : `🔒 needs ${RARITIES[needR] ? RARITIES[needR].name : "higher"}`}
                      </span>
                      <span className="skillacts" style={{ margin: 0 }}>
                        {pid && <button className="btn tiny ghost" onClick={() => extractProcAct(cat)}>Extract</button>}
                      </span>
                    </div>
                  );
                })}
                {cap > 0 && (
                  <button
                    className="btn"
                    style={{ borderColor: C.violet, marginTop: 4 }}
                    onClick={enchantGroup}
                    disabled={(g.materials.glyph || 0) < 2 * nS || (g.essence || 0) < 3 * nS || g.gold < goldC}
                  >
                    {filledN === avail.length ? `Re-roll ${avail.length} trait${avail.length > 1 ? "s" : ""}` : filledN === 0 ? `Enchant (${avail.length} slot${avail.length > 1 ? "s" : ""})` : `Fill ${nS} open slot${nS > 1 ? "s" : ""}`} — {2 * nS}× Dust + {3 * nS}精 + {fmt(goldC)}g
                  </button>
                )}
                <div className="guidetitle" style={{ marginTop: 8 }}>Elemental work</div>
                <div className="focusrow">
                  {EL_KEYS.map((ek) => (
                    <button key={ek} className={"chip" + (elPick === ek ? " on" : "")} style={{ borderColor: ELEMENTS[ek].color, color: elPick === ek ? ELEMENTS[ek].color : undefined }} onClick={() => setElPick(ek)}>
                      {ELEMENTS[ek].glyph} {ELEMENTS[ek].name}
                    </button>
                  ))}
                </div>
                <div className="skillacts" style={{ margin: 0 }}>
                  <button className="btn tiny" onClick={wardInfusion}>Ward — resist {ELEMENTS[elPick].glyph}</button>
                  {eit.slot === "weapon" && <button className="btn tiny" onClick={() => edgeInfusion(false)}>Edge — infuse {ELEMENTS[elPick].glyph}</button>}
                  {eit.slot === "weapon" && eit.rarity >= 6 && <button className="btn tiny ghost" onClick={() => edgeInfusion(true)}>CHAOS edge</button>}
                </div>
                <div className="tiny dim">Ward sets one resistance on the piece (replaces any prior ward). Edge converts a share of every weapon hit into the chosen element — Eternal blades may bind CHAOS: a random element per trigger at 50%.</div>
                {Object.keys(g.runes || {}).length > 0 && (
                  <>
                    <div className="guidetitle" style={{ marginTop: 6 }}>Sealed runes</div>
                    <div className="slotpicker">
                      {Object.entries(g.runes || {}).map(([pid, n]) => (
                        <button key={pid} className="chip" style={{ borderColor: PROCS[pid]?.color, color: PROCS[pid]?.color }} onClick={() => applyRune(pid)}>
                          ✦{PROCS[pid]?.name} ×{n} — apply
                        </button>
                      ))}
                    </div>
                  </>
                )}
              </div>
            );
          })() : (
            <div className="dim small">Equip something in the chosen slot to enchant it.</div>
          )}

          <div className="sectionlabel" style={{ marginTop: 12 }}>The Bazaar · Grey-Whisker's Gambles</div>
          <div className="dim small">The old luck merchant grins. Materials at fair prices — and fate in a pouch, if you dare.</div>
          {MATS.map((m, idx) => (
            <div key={m.key} className="shoprow">
              <span className="small" style={{ color: m.color }}>{m.name}</span>
              <button className="btn tiny" onClick={() => buyMat(idx)} disabled={g.gold < priceOf(m.price)}>{fmt(priceOf(m.price))}g</button>
            </div>
          ))}
          <div className="shoprow">
            <span className="small" style={{ color: C.jade }}>Vigor Tonic <span className="dim tiny">+50 vigor</span></span>
            <button className="btn tiny" onClick={buyTonic} disabled={g.gold < tonicPrice}>{fmt(tonicPrice)}g</button>
          </div>
          <button className="btn" style={{ borderColor: C.gilt }} onClick={openPouch} disabled={g.gold < gambleCost(90 * costScale(t))}>
            Grey-Whisker's Pouch — {fmt(gambleCost(90 * costScale(t)))}g
          </button>
          <div className="tiny dim">Odds: 0.5% zone Eternal · 5% zone relic · 8% Legendary · 10% Epic · rest Uncommon+ — all rolled wild.</div>
          <button className="btn" style={{ borderColor: C.violet }} onClick={openChest} disabled={(g.materials.pearl || 0) < 1 || g.gold < gambleCost(260 * costScale(t))}>
            Sealed Fate Chest — 1× Chaos Pearl + {fmt(gambleCost(260 * costScale(t)))}g
          </button>
          <div className="tiny dim">Guaranteed Legendary+ with a trait · 12% Mythic · 2% zone Eternal.</div>
        </div>
      )}

      {tab === "vault" && (
        <div className="pane">
          <div className="sectionlabel">Spoils Vault · {(g.vault || []).length} attuned{!g.camping ? " · equip at camp" : ""}</div>
          <div className="dim small">Set pieces and Mythic+ finds bind here forever — stored or worn on demand, never lost. Only true duplicates melt.</div>
          <div className="focusrow" style={{ overflowX: "auto", flexWrap: "nowrap" }}>
            <button className={"chip" + (vaultSlotF === "all" ? " on" : "")} onClick={() => setVaultSlotF("all")}>all</button>
            {SLOT_KEYS.map((k) => (
              <button key={k} className={"chip" + (vaultSlotF === k ? " on" : "")} onClick={() => setVaultSlotF(k)} title={SLOTS[k].name}>
                <ItemIcon slot={k} color={vaultSlotF === k ? C.gilt : "#9aa0ab"} size={13} />
              </button>
            ))}
          </div>
          <div className="focusrow">
            {["any", "atk", "hp", "def", "crit"].map((s2) => (
              <button key={s2} className={"chip" + (vaultStatF === s2 ? " on" : "")} onClick={() => setVaultStatF(s2)}>{s2 === "any" ? "any stat" : s2.toUpperCase()}</button>
            ))}
          </div>
          {(g.vault || []).length === 0 && <div className="dim small" style={{ padding: "8px 2px" }}>The vault waits for its first treasure.</div>}
          {(g.vault || [])
            .filter((v) => (vaultSlotF === "all" || v.slot === vaultSlotF) && (vaultStatF === "any" || (v.stats[vaultStatF] || 0) > 0))
            .map((v) => ({ v, imp: buildValue(g, v, v.slot) - buildValue(g, g.eq[v.slot], v.slot) }))
            .sort((a, b2) => b2.imp - a.imp)
            .map(({ v, imp }) => (
              <div key={v.id} className="vaultcard" style={{ borderColor: RARITIES[v.rarity].color, boxShadow: v.rarity >= 6 ? `0 0 10px ${RARITIES[6].color}55` : undefined }}>
                <ItemIcon slot={v.wtype ? "weapon" : v.slot} color={RARITIES[v.rarity].color} size={26} />
                <div className="itemmain">
                  <div className="itemname" style={{ color: RARITIES[v.rarity].color }}>
                    {v.name} <span className="mono dim tiny">{SLOTS[v.slot].name} T{v.tier}</span>
                    {typeof v.set === "number" && <span className="settag">{SIG_SETS[v.set]}</span>}
                  </div>
                  <div className="mono tiny dim">{itemStatText(v)}</div>
                </div>
                <div className="vaultside">
                  <span className="mono tiny" style={{ color: imp > 0 ? C.jade : C.dim }}>{imp > 0 ? "+" : ""}{fmt(imp)}</span>
                  <button className="btn tiny" disabled={!g.camping} onClick={() => equipFromVault(v.id)}>Equip</button>
                </div>
              </div>
            ))}
        </div>
      )}

      {tab === "zones" && (
        <div className="pane">
          {ZONES.map((zn, i) => {
            const locked = i > g.maxZone;
            const here = i === g.zone;
            const triv = g.level > zn.lv[1] + 4;
            return (
              <div key={zn.name} className={"zonerow" + (here ? " here" : "") + (locked ? " locked" : "")}>
                <div>
                  <div className="zonetitle">
                    {zn.name} {g.bossDown[i] && <span className="sealed">sealed</span>}
                    {!locked && triv && <span className="trivtag">trivial xp</span>}
                  </div>
                  <div className="mono tiny dim">Lv {zn.lv[0]}–{zn.lv[1] === 99 ? "∞" : zn.lv[1]} · {zn.enemies.join(", ")}</div>
                </div>
                {locked ? (
                  <span className="mono tiny dim">slay {ZONES[i - 1].boss}</span>
                ) : here ? (
                  <span className="mono tiny" style={{ color: C.gilt }}>here</span>
                ) : (
                  <button className="btn tiny" onClick={() => travel(i)}>Travel</button>
                )}
              </div>
            );
          })}

          <div className="sectionlabel" style={{ marginTop: 12 }}>Hero seed</div>
          <div className="dim small">Carry your progress anywhere: forge a seed to export, or plant one to restore.</div>
          <div className="seedacts">
            <button className="btn small" onClick={exportSeed}>Forge seed (export)</button>
            <label className="btn small ghost filelabel">
              Plant seed file
              <input type="file" accept=".txt,.warseed,text/plain" onChange={onSeedFile} style={{ display: "none" }} />
            </label>
