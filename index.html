          </div>
          {seedOut && <textarea className="seedbox" readOnly value={seedOut} onFocus={(e) => e.target.select()} />}
          <textarea
            className="seedbox"
            placeholder="…or paste a seed here to restore"
            value={seedIn}
            onChange={(e) => setSeedIn(e.target.value)}
          />
          {seedIn.trim() && <button className="btn small" onClick={() => importSeed(seedIn)}>Plant pasted seed</button>}
          {seedMsg && <div className="small dim">{seedMsg}</div>}

          <div className="sectionlabel" style={{ marginTop: 12 }}>Reincarnation 转世</div>
          <div className="dim small">
            Shed this life and carry its Echoes forward forever: each Echo grants +1% XP and gold and +0.5% to all stats in every future life.
            {(g.echoes || 0) > 0 ? ` You bear ${g.echoes} Echo${g.echoes > 1 ? "es" : ""} from ${g.rebirths} past ${g.rebirths > 1 ? "lives" : "life"}.` : ""}
          </div>
          {!g.bossDown[ZONES.length - 1] ? (
            <div className="tiny dim">Seal the Throne of Silence to unlock reincarnation.</div>
          ) : confirmRebirth ? (
            <div className="resetrow" style={{ justifyContent: "flex-start", marginTop: 4 }}>
              <span className="small" style={{ color: C.gilt }}>
                End this life for {Math.round((Math.floor(g.level / 4) + g.bossDown.filter(Boolean).length * 3) * (g.race === "starborn" ? 1.2 : 1))} Echoes?
              </span>
              <button className="btn tiny" style={{ borderColor: C.gilt, color: C.gilt }} onClick={doRebirth}>Reincarnate</button>
              <button className="btn tiny ghost" onClick={() => setConfirmRebirth(false)}>Not yet</button>
            </div>
          ) : (
            <button className="btn small" style={{ borderColor: C.gilt }} onClick={() => setConfirmRebirth(true)}>
              Reincarnate — carry {Math.round((Math.floor(g.level / 4) + g.bossDown.filter(Boolean).length * 3) * (g.race === "starborn" ? 1.2 : 1))} Echoes
            </button>
          )}

          <div className="resetrow">
            {confirmReset ? (
              <>
                <span className="small" style={{ color: C.cinnabar }}>Erase this hero forever?</span>
                <button className="btn tiny danger" onClick={doReset}>Erase</button>
                <button className="btn tiny ghost" onClick={() => setConfirmReset(false)}>Keep</button>
              </>
            ) : (
              <button className="btn tiny ghost" onClick={() => setConfirmReset(true)}>Start over</button>
            )}
          </div>
        </div>
      )}

      {showStats && (
        <div className="overlay" onClick={() => setShowStats(false)}>
          <div className="modal statmodal" onClick={(e) => e.stopPropagation()}>
            <div className="statheadrow">
              <Seal char={cls.seal} color={cls.color} size={42} />
              <div style={{ textAlign: "left", minWidth: 0 }}>
                <div className="modaltitle" style={{ fontSize: 18 }}>{g.name}</div>
                <div className="mono tiny dim">{raceInfo.name} {cls.name} · {bgInfo.name}</div>
                <div className="mono tiny" style={{ color: C.gilt }}>Lv {g.level} · {realmOf(g.level)} Realm</div>
              </div>
            </div>
            <table className="stattable mono">
              <thead>
                <tr><th></th><th>total</th><th>base</th><th>gear</th><th>cap</th></tr>
              </thead>
              <tbody>
                <tr><td>HP</td><td>{fmt(st.maxHp)}</td><td className="dim">{fmt(baseHp)}</td><td className="dim">{sgn(gs.hp)}</td><td className="dim">—</td></tr>
                <tr><td>ATK</td><td>{fmt(st.atk)}</td><td className="dim">{fmt(baseAtk)}</td><td className="dim">{sgn(gs.atk)}</td><td className="dim">—</td></tr>
                <tr><td>DEF</td><td style={st.def >= STAT_CAPS.def ? { color: C.gilt } : undefined}>{fmt(st.def)}</td><td className="dim">{fmt(baseDef)}</td><td className="dim">{sgn(gs.def)}</td><td className="dim">~{STAT_CAPS.def}</td></tr>
                <tr><td>CRIT</td><td style={st.crit >= STAT_CAPS.crit ? { color: C.gilt } : undefined}>{st.crit.toFixed(1)}%</td><td className="dim">{cls.crit}%</td><td className="dim">+{gs.crit.toFixed(1)}%</td><td className="dim">{STAT_CAPS.crit}%</td></tr>
              </tbody>
            </table>
            <div className="tiny dim" style={{ textAlign: "left", lineHeight: 1.5 }}>
              {st.crit >= STAT_CAPS.crit
                ? <span style={{ color: C.gilt }}>CRIT is at its 100% ceiling — further CRIT is wasted; favor other stats.</span>
                : `CRIT ${capNote.crit}. DEF ${capNote.def}.`}
            </div>
            <div className="mono modalstats" style={{ fontSize: 12, lineHeight: 1.7 }}>
              <div>Vigor {Math.round(g.vigor)} · Streak 连×{g.streak || 0}</div>
              <div>Gold {fmt(g.gold)} · Slain {fmt(g.lifetimeKills)}</div>
              <div>XP {fmt(g.xp)} / {fmt(xpNeed(g.level))}</div>
              {(g.echoes || 0) > 0 && <div style={{ color: C.violet }}>回响 {g.echoes} Echoes · Rebirth {g.rebirths}</div>}
            </div>
            <div className="tiny dim" style={{ textAlign: "left", lineHeight: 1.6 }}>
              <div>{cls.passive}</div>
              <div>Bloodline: {raceInfo.modText}</div>
              <div>Resist: {EL_KEYS.map((ek) => `${ELEMENTS[ek].glyph}${Math.round(playerRes(g, ek) * 100)}%`).join(" · ")}</div>
              {companionCfg(g) && (() => {
                const cc = companionCfg(g);
                const pc = petMaxOf(g, st);
                const pp = g.pet || { hp: pc, downT: 0 };
                return (
                  <div style={{ color: cc.kind === "guardian" ? "#e0d08a" : C.violet }}>
                    Companion — {companionForm(g).name}: ATK {fmt(Math.round(st.atk * cc.atkShare))}/strike ({Math.round(cc.atkShare * 100)}% share) · HP {fmt(Math.max(0, pp.hp))}/{fmt(pc)} · DEF {fmt(Math.round(st.def * cc.petDefMul))} · {pp.hp <= 0 ? `fallen, returns ${Math.ceil(pp.downT)}s` : g.formation === "back" ? "back line" : "front line"} · your hand: {Math.round(cc.heroAtkMul * 100)}% ATK, {Math.round(cc.heroDefMul * 100)}% DEF
                  </div>
                );
              })()}
              <div>Past life: {bgInfo.passive}</div>
              {(g.echoes || 0) > 0 && <div>Echoes: +{g.echoes}% XP &amp; gold · +{(g.echoes * 0.5).toFixed(0)}% stats</div>}
              {Object.entries(setTiers(g).detail).filter(([, d]) => d.count >= 1).map(([sIdx, d]) => (
                <div key={sIdx} style={{ color: C.gilt }}>
                  Set: {SIG_SETS[sIdx]} ×{d.count} — {[...SET_GROUPS.filter((gr) => d.groups[gr.key]).map((gr) => gr.name), ...(d.full ? ["Full"] : [])].join(", ") || "no bonds formed yet"}
                </div>
              ))}
              {[...eqProcs(g)].map((pid) => PROCS[pid] && (
                <div key={pid} style={{ color: PROCS[pid].color }}>✦{PROCS[pid].name} — {PROCS[pid].desc}</div>
              ))}
            </div>
            <button className="btn primary" onClick={() => setShowStats(false)}>Close</button>
          </div>
        </div>
      )}

      {report && (
        <div className="overlay">
          <div className="modal">
            <div className="eyebrow">While you were away · {report.time}</div>
            <div className="modaltitle">{report.camp ? "You slept soundly" : "The hunt went on"}</div>
            <div className="mono modalstats">
              {report.camp ? (
                <>
                  <div>HP and vigor fully restored</div>
                  {report.trainedName && <div style={{ color: C.storm }}>Mastered {report.trainedName}</div>}
                </>
              ) : (
                <>
                  <div>{fmt(report.kills)} foes slain</div>
                  <div>+{fmt(report.gold)} gold · +{fmt(report.xp)} XP{report.trivial ? ` (trivial −${report.trivial}%)` : ""}</div>
                  {report.levels > 0 && <div style={{ color: C.gilt }}>{report.levels} level{report.levels > 1 ? "s" : ""} gained</div>}
                  {report.realm && <div style={{ color: C.violet }}>Breakthrough: {report.realm} Realm</div>}
                  {report.mats > 0 && <div style={{ color: C.violet }}>{report.mats}× {report.matName} gathered</div>}
                </>
              )}
            </div>
            <button className="btn primary" onClick={() => setReport(null)}>Claim and continue</button>
          </div>
        </div>
      )}
    </Frame>
  );
}

/* ---------------- styles ---------------- */

const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Marcellus&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

.root {
  min-height: 100vh;
  background:
    radial-gradient(1200px 500px at 50% -10%, rgba(108,143,196,0.07), transparent 60%),
    radial-gradient(900px 400px at 50% 110%, rgba(200,69,44,0.06), transparent 60%),
    ${C.ink};
  color: ${C.bone};
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  display: flex; justify-content: center;
  padding: 14px 10px 40px;
}
.shell { width: 100%; max-width: 460px; }
.mono { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
.dim { color: ${C.dim}; }
.small { font-size: 12px; }
.tiny { font-size: 11px; }
.center { text-align: center; }

.titleblock { text-align: center; margin: 26px 0 20px; }
.eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: ${C.dim}; margin-bottom: 10px; }
.gametitle { font-family: 'Marcellus', serif; font-size: 30px; font-weight: 400; margin: 0; letter-spacing: 0.04em; color: ${C.bone}; }
.subtitle { font-family: 'Marcellus', serif; color: ${C.cinnabar}; letter-spacing: 0.5em; text-transform: uppercase; font-size: 13px; margin-top: 6px; }
.echobanner {
  margin: 12px auto 0; display: inline-block; color: ${C.violet};
  border: 1px solid ${C.violet}; border-radius: 999px; padding: 4px 14px;
  text-shadow: 0 0 10px rgba(166,120,200,0.6);
}

.selectgrid { display: flex; flex-direction: column; gap: 10px; }
.classcard {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  background: ${C.panel}; border: 1px solid ${C.line}; border-radius: 10px;
  padding: 16px 14px; cursor: pointer; text-align: center; color: inherit;
  transition: border-color 0.15s;
}
.classcard.picked { background: ${C.panel2}; }
.classname { font-family: 'Marcellus', serif; font-size: 19px; letter-spacing: 0.06em; }
.classblurb { font-size: 13px; color: ${C.bone}; }
.classpassive { font-size: 12px; color: ${C.dim}; font-style: italic; }
.classstats { font-size: 11px; color: ${C.dim}; }
.namerow { display: flex; gap: 8px; margin-top: 14px; }
.nameinput {
  flex: 1; background: ${C.panel}; border: 1px solid ${C.line}; border-radius: 8px;
  color: ${C.bone}; padding: 10px 12px; font-size: 14px; font-family: inherit; min-width: 0;
}
.nameinput:focus { outline: 2px solid ${C.gilt}; outline-offset: 1px; }
.footnote { font-size: 12px; color: ${C.dim}; text-align: center; margin-top: 16px; line-height: 1.5; }
.seedimport { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; }

.seal {
  border: 2px solid; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Marcellus', serif; flex-shrink: 0;
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.35);
  background: rgba(0,0,0,0.2);
}

.hud { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
.hudleft { display: flex; gap: 10px; align-items: center; min-width: 0; flex: 1; overflow: hidden; }
.hudinfo { min-width: 0; }
.hudright { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.heroname { font-family: 'Marcellus', serif; font-size: 16px; letter-spacing: 0.03em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.herosub { font-size: 11px; color: ${C.dim}; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gold { font-size: 14px; color: ${C.gilt}; display: inline-flex; align-items: center; gap: 5px; min-width: 74px; justify-content: flex-end; }
.coin { width: 9px; height: 9px; border-radius: 50%; display: inline-block; background: radial-gradient(circle at 35% 35%, #f2cf7e, ${C.gilt} 70%); }
.pausebtn {
  background: ${C.panel2}; color: ${C.bone}; border: 1px solid ${C.line}; border-radius: 8px;
  width: 34px; height: 30px; font-size: 11px; cursor: pointer; flex-shrink: 0;
}

/* battle scene graphics */
.scene { position: relative; height: 58px; margin: 2px 0 6px; overflow: hidden; }
.sceneline { position: absolute; left: 0; right: 0; bottom: 5px; border-bottom: 1px solid ${C.line}; opacity: 0.6; }
.heroSpot { position: absolute; left: 10px; bottom: 3px; }
.fighting .heroSpot { animation: lunge 0.6s ease-in-out infinite; }
@keyframes lunge { 0%,100% { transform: translateX(0); } 35% { transform: translateX(7px); } }
.fighting .armF { animation: swing 0.6s ease-in-out infinite; transform-origin: 18px 19px; }
@keyframes swing { 0%,100% { transform: rotate(6deg); } 35% { transform: rotate(-16deg); } }
.heroSpot.fallen { transform: rotate(78deg) translate(8px,-4px); opacity: 0.7; animation: none; }
.heroSpot.fallen .armF { animation: none; }
.beastSpot { position: absolute; left: 58px; bottom: 2px; }
.fighting .beastSpot { animation: pounce 0.6s ease-in-out infinite; }
@keyframes pounce { 0%,100% { transform: translate(0,0); } 40% { transform: translate(9px,-3px); } }
.foeSpot { position: absolute; right: 8px; bottom: 3px; display: flex; align-items: flex-end; }
.foefig { animation: foestagger 0.35s ease-out; }
@keyframes foestagger { 0% { transform: translateX(6px); } 60% { transform: translateX(-2px); } 100% { transform: translateX(0); } }
.bossfig { animation: bossaura 1.6s ease-in-out infinite; }
@keyframes bossaura {
  0%,100% { filter: drop-shadow(0 0 4px rgba(200,69,44,0.45)); }
  50% { filter: drop-shadow(0 0 10px rgba(200,69,44,0.85)); }
}
.slashfx { position: absolute; right: 40px; bottom: 10px; pointer-events: none; animation: slashpop2 0.35s ease-out forwards; }
@keyframes slashpop2 { 0% { opacity: 0; transform: scale(0.5) rotate(-8deg); } 25% { opacity: 1; } 100% { opacity: 0; transform: scale(1.15) rotate(4deg); } }
.critslash { filter: drop-shadow(0 0 6px rgba(217,164,65,0.9)); }
.firefig { animation: flicker 1.6s ease-in-out infinite; }
.mistdots { color: ${C.dim}; letter-spacing: 6px; padding-bottom: 14px; }
.itemicon { flex-shrink: 0; }
.vaultcard {
  display: flex; align-items: center; gap: 9px;
  background: ${C.panel}; border: 1px solid; border-radius: 9px; padding: 9px 10px;
}
.vaultside { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.upgradeprompt { display: flex; flex-direction: column; gap: 6px; background: ${C.panel2}; border: 1px solid ${C.gilt}; border-radius: 9px; padding: 9px 10px; margin-bottom: 8px; }
.slothead { display: flex; align-items: center; gap: 5px; }

/* stage: fixed geometry so nothing jumps */
.stage { background: ${C.panel}; border: 1px solid ${C.line}; border-radius: 12px; padding: 12px 14px 10px; position: relative; overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s; }
.stage.lvlglow { border-color: ${C.gilt}; box-shadow: 0 0 0 1px rgba(217,164,65,0.4), 0 0 26px rgba(217,164,65,0.15); }
.bossstage { border-color: ${C.cinnabar}; box-shadow: 0 0 0 1px rgba(200,69,44,0.35), 0 0 24px rgba(200,69,44,0.12); }
.campstage { border-color: ${C.jade}; }
.stagehead { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; height: 20px; }
.zonename { font-family: 'Marcellus', serif; font-size: 15px; letter-spacing: 0.05em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.enemyarea { height: 96px; display: flex; flex-direction: column; justify-content: center; position: relative; }
.enemystack { display: flex; flex-direction: column; gap: 5px; }
.enemybox { position: relative; }
.minifoe { display: flex; align-items: center; gap: 8px; height: 14px; }
.mininame { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 46%; }
.minibar { flex: 1; }
.mistline { padding: 0; }
.campfire { text-align: center; }
.flame { color: ${C.gilt}; font-size: 18px; animation: flicker 1.6s ease-in-out infinite; line-height: 1; margin-bottom: 4px; }
@keyframes flicker { 0%,100% { opacity: 0.85; transform: scaleY(1); } 50% { opacity: 1; transform: scaleY(1.15); } }
.enemyrow { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; font-size: 13px; }
.enemyname { color: ${C.bone}; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bosstag { color: ${C.cinnabar}; border: 1px solid ${C.cinnabar}; border-radius: 3px; font-size: 9px; padding: 1px 4px; margin-right: 6px; letter-spacing: 0.1em; vertical-align: 1px; }
.elitetag { color: ${C.storm}; border: 1px solid ${C.storm}; border-radius: 3px; font-size: 9px; padding: 1px 4px; margin-right: 6px; letter-spacing: 0.1em; vertical-align: 1px; }
.bar { background: rgba(0,0,0,0.45); border-radius: 4px; overflow: hidden; }
.barfill { height: 100%; transition: width 0.35s ease; border-radius: 4px; }
.playerbox { position: relative; height: 40px; margin-top: 6px; }
.beastrow { height: 36px; display: flex; align-items: center; gap: 7px; margin-top: 4px; position: relative; flex-wrap: wrap; }
.petstats { flex-basis: 100%; display: flex; align-items: center; gap: 7px; height: 13px; }
.beastglyph {
  font-family: 'Marcellus', serif; color: ${C.violet}; font-size: 14px; line-height: 1;
  text-shadow: 0 0 8px rgba(166,120,200,0.6); animation: beastbob 2.4s ease-in-out infinite;
}
@keyframes beastbob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
.beastfloats { top: -4px; }
.petbar { flex: 1; max-width: 84px; }
.formchip { font-size: 9px; padding: 1px 7px; flex-shrink: 0; }
.beastSpot.backline { left: 2px; opacity: 0.85; z-index: 0; }
.float.beasthit.healf { color: ${C.jade}; }
.float.beasthit { color: ${C.violet}; }
.deadtext { font-family: 'Marcellus', serif; color: ${C.cinnabar}; font-size: 16px; margin-bottom: 2px; }
.meters { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
.meterrow { display: flex; align-items: center; gap: 7px; height: 13px; }
.meterlabel { width: 52px; font-size: 10px; text-align: right; flex-shrink: 0; letter-spacing: 0.06em; white-space: nowrap; overflow: hidden; }
.meterbar { flex: 1; }
.meterval { width: 86px; font-size: 10px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* low-health alarm: red pulse under 25% max HP */
@keyframes lowpulse { 0%,100% { box-shadow: 0 0 2px rgba(200,69,44,0.35); } 50% { box-shadow: 0 0 12px rgba(200,69,44,0.95); } }
.lowhp .bar { animation: lowpulse 0.8s ease-in-out infinite; }
@keyframes lowblink { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }
.lowhptext { color: ${C.cinnabar}; animation: lowblink 0.8s ease-in-out infinite; }
@keyframes figred {
  0%,100% { filter: drop-shadow(0 0 2px rgba(200,69,44,0.5)); }
  50% { filter: drop-shadow(0 0 9px rgba(200,69,44,1)); }
}
.lowfig .herofig { animation: figred 0.8s ease-in-out infinite; }

/* character creation pickers + stat table */
.chiprow { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.chipseal { font-family: 'Marcellus', serif; margin-right: 5px; }
.pickblurb { min-height: 28px; padding: 4px 2px 0; line-height: 1.5; }
.statmodal { max-width: 360px; gap: 10px; }
.statheadrow { display: flex; gap: 10px; align-items: center; }
.stattable { width: 100%; border-collapse: collapse; font-size: 11.5px; }
.stattable th { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: ${C.dim}; font-weight: 400; padding: 2px 6px; text-align: right; }
.stattable td { padding: 4px 6px; text-align: right; border-top: 1px solid ${C.line}; }
.stattable td:first-child, .stattable th:first-child { text-align: left; color: ${C.dim}; }
.stattable td:nth-child(2) { color: ${C.bone}; font-weight: 500; }

.settag { font-size: 9px; color: ${C.gilt}; border: 1px solid ${C.gilt}; border-radius: 3px; padding: 0 4px; margin-left: 5px; letter-spacing: 0.08em; vertical-align: 1px; text-transform: uppercase; }
.setpanel {
  background: rgba(217,164,65,0.06); border: 1px solid rgba(217,164,65,0.4); border-radius: 8px;
  padding: 8px 10px; display: flex; flex-direction: column; gap: 8px;
}
.setrow { display: flex; flex-direction: column; gap: 3px; }
.setiers { display: flex; flex-wrap: wrap; gap: 4px 10px; }

/* juice: shakes, flashes, chips, dots, pulses */
@keyframes shakex { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-3px); } 40% { transform: translateX(3px); } 60% { transform: translateX(-2px); } 80% { transform: translateX(2px); } }
.shake { animation: shakex 0.32s ease-out; }
@keyframes hurtpulse { 0% { box-shadow: 0 0 0 0 rgba(200,69,44,0.55); } 100% { box-shadow: 0 0 0 9px rgba(200,69,44,0); } }
.hurtflash { animation: hurtpulse 0.4s ease-out; border-radius: 6px; }
.buffrow { height: 16px; display: flex; gap: 6px; align-items: center; overflow: hidden; }
.buffchip { font-size: 9px; letter-spacing: 0.08em; border: 1px solid; border-radius: 4px; padding: 0 5px; line-height: 13px; white-space: nowrap; }
.bountyrow {
  height: 28px; display: flex; align-items: center; gap: 8px; margin-top: 8px; padding: 0 10px;
  background: ${C.panel}; border: 1px solid ${C.line}; border-radius: 8px;
  overflow: hidden; white-space: nowrap;
}
.bountybar { flex: 1; min-width: 40px; }
.tabdot { position: absolute; top: 5px; right: 7px; width: 6px; height: 6px; border-radius: 50%; background: ${C.gilt}; box-shadow: 0 0 6px ${C.gilt}; }
.xppulse .barfill { animation: barpulse 1.1s ease-in-out infinite; }
@keyframes barpulse { 0%,100% { box-shadow: 0 0 2px rgba(217,164,65,0.4); } 50% { box-shadow: 0 0 10px rgba(217,164,65,0.95); } }

/* ribbons: quick non-blocking flourishes */
.ribbonwrap { position: absolute; top: 32px; left: 0; right: 0; display: flex; justify-content: center; z-index: 3; pointer-events: none; }
.ribbon {
  font-size: 10.5px; letter-spacing: 0.16em; border: 1px solid; border-radius: 999px;
  padding: 3px 12px; background: rgba(15,16,22,0.88); text-shadow: 0 0 10px currentColor;
  animation: ribbonpop 1.5s ease-out forwards;
}
@keyframes ribbonpop {
  0% { opacity: 0; transform: translateY(-6px); }
  12% { opacity: 1; transform: translateY(0); }
  78% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-4px); }
}

/* level-up theatrics */
.lvlburst { position: absolute; inset: 0; z-index: 4; pointer-events: none; display: flex; align-items: center; justify-content: center; }
.lvlrays { position: absolute; inset: -20%; background: radial-gradient(circle, rgba(217,164,65,0.25), transparent 55%); animation: raysfade 1.9s ease-out forwards; }
@keyframes raysfade { 0% { opacity: 0; } 12% { opacity: 1; } 70% { opacity: 0.6; } 100% { opacity: 0; } }
.lvlring { position: absolute; width: 44px; height: 44px; border: 2px solid ${C.gilt}; border-radius: 50%; animation: ringout 1.9s ease-out forwards; }
.lvlring.lag { animation-delay: 0.18s; opacity: 0; }
.lvlcol { position: relative; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.lvltext { color: ${C.gilt}; font-size: 16px; letter-spacing: 0.22em; text-shadow: 0 0 16px rgba(217,164,65,0.85); animation: lvlpop 1.9s ease-out forwards; }
.lvlgains { color: ${C.bone}; font-size: 11px; letter-spacing: 0.06em; text-shadow: 0 1px 3px rgba(0,0,0,0.9); animation: lvlpop 1.9s ease-out forwards; }
@keyframes ringout { 0% { transform: scale(0.35); opacity: 0.9; } 100% { transform: scale(5.5); opacity: 0; } }
@keyframes lvlpop {
  0% { transform: translateY(6px) scale(0.8); opacity: 0; }
  15% { opacity: 1; transform: translateY(0) scale(1.12); }
  28% { transform: scale(1); }
  75% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-10px); }
}

/* splash announcements */
.splash {
  position: absolute; inset: 0; z-index: 5; pointer-events: none;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: rgba(15,16,22,0.72); border: 1px solid; border-radius: 12px;
  animation: splashpop 2.4s ease-out forwards;
}
.splashtext {
  font-family: 'Marcellus', serif; font-size: 24px; letter-spacing: 0.18em;
  text-shadow: 0 0 18px currentColor;
}
.splashsub { font-size: 12px; color: ${C.bone}; margin-top: 4px; letter-spacing: 0.04em; }
@keyframes splashpop {
  0% { opacity: 0; transform: scale(0.92); }
  10% { opacity: 1; transform: scale(1.02); }
  16% { transform: scale(1); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: scale(1); }
}

.floatzone { position: absolute; right: 4px; top: -8px; height: 0; pointer-events: none; }
.float {
  position: relative; display: inline-block; margin-left: 8px;
  font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: ${C.bone};
  animation: rise 0.9s ease-out forwards; text-shadow: 0 1px 2px rgba(0,0,0,0.8);
}
.float.crit { color: ${C.gilt}; font-size: 14px; font-weight: 500; }
.float.hurt { color: ${C.cinnabar}; }
.float.heal { color: ${C.jade}; }
@keyframes rise { from { transform: translateY(4px); opacity: 1; } to { transform: translateY(-16px); opacity: 0; } }

.banner {
  height: 34px; margin-top: 10px; border: 1px dashed; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; padding: 0 10px; text-align: center;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.tabs { display: flex; gap: 5px; margin: 10px 0; }
.tab {
  flex: 1; background: transparent; border: 1px solid ${C.line}; color: ${C.dim};
  border-radius: 8px; padding: 8px 2px; font-size: 12px; cursor: pointer; font-family: inherit;
  white-space: nowrap; position: relative;
}
.tab.on { color: ${C.bone}; border-color: ${C.gilt}; background: ${C.panel}; }

.pane { display: flex; flex-direction: column; gap: 8px; }
.sectionlabel { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: ${C.dim}; }
.log {
  background: rgba(0,0,0,0.28); border: 1px solid ${C.line}; border-radius: 10px;
  padding: 10px 12px; font-size: 12px; line-height: 1.65;
  height: 170px; overflow-y: auto;
}
.logline.kill { color: ${C.bone}; }
.logline.loot { color: ${C.violet}; }
.logline.melt { color: ${C.dim}; }
.logline.lvl { color: ${C.gilt}; }
.logline.boss { color: ${C.cinnabar}; }
.logline.buff { color: ${C.storm}; }
.logline.death { color: ${C.cinnabar}; }
.logline.sys { color: ${C.dim}; font-style: italic; }
.logline.info { color: ${C.dim}; }
.statline { font-size: 11px; text-align: center; height: 15px; }

.btn {
  background: ${C.panel2}; color: ${C.bone}; border: 1px solid ${C.line};
  border-radius: 8px; padding: 10px 14px; font-size: 14px; cursor: pointer; font-family: inherit;
  transition: border-color 0.15s;
}
.btn:disabled { opacity: 0.5; cursor: default; }
.btn.primary { background: ${C.cinnabar}; border-color: ${C.cinnabar}; color: #fff; }
.btn.ghost { background: transparent; }
.btn.small { font-size: 12.5px; padding: 8px 10px; }
.btn.tiny { font-size: 12px; padding: 6px 10px; border-radius: 6px; }
.btn.danger { background: ${C.cinnabar}; border-color: ${C.cinnabar}; color: #fff; }
.campbtn { width: 100%; border-color: ${C.jade}; }
.campbtn.camped { background: rgba(111,174,143,0.12); }
.filelabel { display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }

.eqgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.eqslot {
  background: ${C.panel}; border: 1px solid ${C.line}; border-radius: 8px; padding: 7px 9px;
  display: flex; flex-direction: column; gap: 2px; min-height: 56px; position: relative;
}
.eqslot.lockedslot { border-style: dashed; }
.lockbtn {
  position: absolute; top: 5px; right: 6px; background: transparent; border: 1px solid ${C.line};
  color: ${C.dim}; border-radius: 5px; font-size: 9px; padding: 1px 6px; cursor: pointer;
  letter-spacing: 0.08em; text-transform: uppercase; font-family: inherit;
}
.lockbtn.on { color: ${C.gilt}; border-color: ${C.gilt}; }
.upgtag { font-size: 9px; color: ${C.jade}; border: 1px solid ${C.jade}; border-radius: 3px; padding: 0 4px; margin-left: 5px; letter-spacing: 0.08em; vertical-align: 1px; text-transform: uppercase; }
.itemname { font-size: 12.5px; font-weight: 500; }
.itemrow {
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  background: ${C.panel}; border: 1px solid ${C.line}; border-left: 3px solid;
  border-radius: 8px; padding: 8px 10px;
}
.itemmain { min-width: 0; }
.itemacts { display: flex; gap: 6px; flex-shrink: 0; }

.chip {
  background: transparent; border: 1px solid ${C.line}; color: ${C.dim};
  border-radius: 999px; padding: 4px 10px; font-size: 11.5px; cursor: pointer; font-family: inherit;
}
.chip.on { border-color: ${C.gilt}; color: ${C.gilt}; }

.guidehead { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.focusrow { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.guidetoggle {
  background: transparent; border: none; color: ${C.storm}; cursor: pointer;
  font-size: 11px; font-family: inherit; text-decoration: underline dotted; padding: 2px 0; flex-shrink: 0;
}
.guide {
  background: rgba(0,0,0,0.28); border: 1px solid ${C.line}; border-radius: 10px;
  padding: 10px 12px; display: flex; flex-direction: column; gap: 4px;
}
.guidetitle { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: ${C.bone}; }
.guiderow { display: flex; justify-content: space-between; align-items: baseline; font-size: 11.5px; }
.swatch { width: 8px; height: 8px; border-radius: 2px; display: inline-block; vertical-align: baseline; margin-right: 2px; }
.slotpicker { display: flex; flex-wrap: wrap; gap: 6px; }
.matgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.matchip {
  display: flex; justify-content: space-between; align-items: center;
  border: 1px solid; border-radius: 8px; padding: 7px 10px; font-size: 12px;
  background: ${C.panel};
}
.shoprow {
  display: flex; justify-content: space-between; align-items: center;
  background: ${C.panel}; border: 1px solid ${C.line}; border-radius: 8px; padding: 8px 10px;
}

.skillrow {
  text-align: left; background: ${C.panel}; border: 1px solid ${C.line}; border-radius: 8px;
  padding: 10px 12px; color: inherit; font-family: inherit; width: 100%;
}
.skillrow.on { border-color: ${C.gilt}; background: ${C.panel2}; }
.skillrow.locked { opacity: 0.5; }
.skillhead { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.skillname { font-size: 14px; font-weight: 500; }
.skillacts { margin-top: 6px; display: flex; gap: 6px; min-height: 0; }
.trainbar { background: ${C.panel}; border: 1px solid ${C.storm}; border-radius: 8px; padding: 8px 10px; }

.zonerow {
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  background: ${C.panel}; border: 1px solid ${C.line}; border-radius: 8px; padding: 10px 12px;
}
.zonerow.here { border-color: ${C.gilt}; }
.zonerow.locked { opacity: 0.55; }
.zonetitle { font-size: 14px; font-family: 'Marcellus', serif; letter-spacing: 0.03em; }
.sealed { font-size: 10px; color: ${C.jade}; border: 1px solid ${C.jade}; border-radius: 3px; padding: 1px 5px; margin-left: 6px; letter-spacing: 0.08em; font-family: 'IBM Plex Sans', sans-serif; }
.trivtag { font-size: 10px; color: ${C.dim}; border: 1px solid ${C.line}; border-radius: 3px; padding: 1px 5px; margin-left: 6px; letter-spacing: 0.08em; font-family: 'IBM Plex Sans', sans-serif; }
.resetrow { display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: 14px; }

.seedbox {
  width: 100%; box-sizing: border-box; background: rgba(0,0,0,0.3); border: 1px solid ${C.line};
  border-radius: 8px; color: ${C.bone}; font-family: 'IBM Plex Mono', monospace; font-size: 10px;
  padding: 8px 10px; min-height: 64px; resize: vertical;
}
.seedacts { display: flex; gap: 8px; flex-wrap: wrap; }

.overlay { position: fixed; inset: 0; background: rgba(10,11,15,0.8); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 50; }
.modal {
  background: ${C.panel}; border: 1px solid ${C.gilt}; border-radius: 12px;
  padding: 22px 20px; max-width: 340px; width: 100%; text-align: center;
  display: flex; flex-direction: column; gap: 12px;
}
.modaltitle { font-family: 'Marcellus', serif; font-size: 21px; }
.modalstats { font-size: 13px; line-height: 1.9; color: ${C.bone}; }

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}
`;

const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(<App />);
