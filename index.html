/* storage adapter — uses Claude's artifact storage when available, and falls
   back to the browser's localStorage when the game is published on the web.
   Same async shape either way: get → {key,value}|null, set/delete → void. */
const store = {
  async get(k) {
    if (typeof window !== "undefined" && window.storage && window.storage.get) {
      try { return await window.storage.get(k); } catch (e) { return null; }
    }
    try {
      const v = typeof localStorage !== "undefined" ? localStorage.getItem(k) : null;
      return v == null ? null : { key: k, value: v };
    } catch (e) { return null; }
  },
  async set(k, v) {
    if (typeof window !== "undefined" && window.storage && window.storage.set) {
      try { return await window.storage.set(k, v); } catch (e) { return null; }
    }
    try { if (typeof localStorage !== "undefined") localStorage.setItem(k, v); } catch (e) { /* full/blocked */ }
    return null;
  },
  async delete(k) {
    if (typeof window !== "undefined" && window.storage && window.storage.delete) {
      try { return await window.storage.delete(k); } catch (e) { return null; }
    }
    try { if (typeof localStorage !== "undefined") localStorage.removeItem(k); } catch (e) { /* ignore */ }
    return null;
  },
  available() {
    if (typeof window !== "undefined" && window.storage) return true;
    try { return typeof localStorage !== "undefined"; } catch (e) { return false; }
  },
};

/* the four elements. Cycle of dominance: fire scorches earth, earth grounds
   storm, storm rides the water, water douses fire. Strong hits ×1.3; striking
   into your counter ×0.75. Neutral damage ignores the wheel entirely. */
const ELEMENTS = {
  fire: { name: "Fire", glyph: "火", color: "#e0562f", beats: "earth" },
  earth: { name: "Earth", glyph: "土", color: "#b08d4f", beats: "storm" },
  storm: { name: "Storm", glyph: "雷", color: "#6c8fc4", beats: "water" },
  water: { name: "Water", glyph: "水", color: "#5fa8c8", beats: "fire" },
};
const EL_KEYS = Object.keys(ELEMENTS);
const cycleMult = (atkEl, defEl) =>
  !atkEl || !defEl ? 1 : ELEMENTS[atkEl].beats === defEl ? 1.3 : ELEMENTS[defEl].beats === atkEl ? 0.75 : 1;
/* a foe's resistance guards only its OWN element; menace sets the strength */
const foeElemMod = (el, f) => {
  if (!el) return 1;
  let m = cycleMult(el, f.el);
  if (f.el === el) m *= 1 - (f.elRes || 0);
  return m;
};

  for (const [k, w] of entries) { r -= w; if (r <= 0) return k; }

function fmt(n) {
  n = Math.round(n);
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
  if (n >= 1e4) return (n / 1e3).toFixed(1) + "k";
  return n.toLocaleString();
}

/* level-driven curves: enemies grow smoothly with their level,

const eHp = (lvl) => 30 * Math.pow(1.09, lvl);

const eXp = (lvl) => 7 * Math.pow(1.07, lvl);

const xpNeed = (lv) => Math.round((12 + lv * 0.25) * eXp(lv));
// fighting foes far beneath you pays a fraction of the XP
function xpScale(playerLvl, enemyLvl) {
  const diff = playerLvl - enemyLvl;
  if (diff <= 4) return 1;
  return clamp(1 - (diff - 4) * 0.1, 0.1, 1);

const tierScale = (t) => Math.pow(1.5, t - 1);
const costScale = (t) => Math.pow(1.85, t - 1);
const matIdxForTier = (t) => (t <= 3 ? 0 : t <= 6 ? 1 : t <= 9 ? 2 : 3);

let RARITY_LUCK = 0;
function rollRarity(minIdx = 0, weights = null) {
  const w = weights || RARITIES.map((r) => r.weight);
  let total = 0;
  for (let i = minIdx; i < w.length; i++) total += w[i];
  let roll = Math.random() * total;
  for (let i = minIdx; i < w.length; i++) {
    roll -= w[i];
    if (roll <= 0) {
      if (RARITY_LUCK > 0 && i < RARITIES.length - 2 && Math.random() < RARITY_LUCK) return i + 1;
      return i;
    }
  }
  return minIdx;
}

let itemSeq = 1;

/* stat types roll freely: every item draws two of ATK / HP / DEF / CRIT,
   so any slot can serve any build. Slots differ only in stat budget. */
const SLOT_BUDGET = { armor: 28, helm: 16, boots: 12, belt: 16, amulet: 13, ring: 17, talisman: 10, cloak: 14, bracers: 13, offhand: 18, gloves: 12, pauldrons: 14, greaves: 15, earring: 9, anklet: 8 };
const STAT_PER_POINT = { atk: 3, hp: 0.55, def: 2.2 };

function rollStats(slot, tier, s, rIdx, favor, wild) {
  const budget = slot === "weapon" ? 24 + tier * 6 : SLOT_BUDGET[slot];
  const pickType = (pool) => {
    const w = pool.map((k) => (favor && favor.includes(k) ? 3 : 1));
    let r = Math.random() * w.reduce((a, b) => a + b, 0);
    for (let i = 0; i < pool.length; i++) { r -= w[i]; if (r <= 0) return pool.splice(i, 1)[0]; }
    return pool.pop();
  };
  const pool = ["atk", "hp", "def", "crit"];
  const first = pickType(pool);
  const second = pickType(pool);
  const biased = (lo, hi, p) => lo + (hi - lo) * Math.pow(Math.random(), p);
  const vr = () => (wild === "chaos" ? biased(0.6, 1.7, 1.5) : wild ? biased(0.75, 1.45, 1.6) : rnd(0.9, 1.1));
  let heatSum = 0, heatN = 0;
  const stats = {};
  const putCrit = (scale) => {
    const v = vr(); heatSum += v; heatN++;
    stats.crit = +(((1.2 + rIdx * 1.1 + tier * 0.15) * scale) * v).toFixed(1);
  };
  const putStat = (k, frac) => {
    const v = vr(); heatSum += v; heatN++;
    stats[k] = Math.max(1, Math.round((budget * frac * s * v) / STAT_PER_POINT[k]));
  };
  if (first === "crit" || second === "crit") {
    putCrit(first === "crit" ? 1 : 0.6);
    putStat(first === "crit" ? second : first, 0.8);
  } else {
    putStat(first, 0.65);
    putStat(second, 0.35);
  }
  // wild loot sometimes remembers a third virtue
  if (wild && Math.random() < 0.35) {
    const third = pickType(pool);
    if (third === "crit") putCrit(0.45);
    else putStat(third, 0.25);
  }
  return { stats, heat: heatN ? heatSum / heatN : 1 };
}

function makeItem(tier, opts = {}) {
  const rIdx = opts.rarity != null ? opts.rarity : rollRarity(opts.minRarity || 0, opts.weights || null);
  const r = RARITIES[rIdx];
  const slotKey = opts.slot || pick(SLOT_KEYS);
  const s = tierScale(tier) * r.mult * (opts.boost || 1);
  const v = () => rnd(0.9, 1.1);
  const wtype = slotKey === "weapon" ? (opts.wtype || pick(Object.keys(WEAPON_TYPES))) : undefined;
  const rolled = rollStats(slotKey, tier, s, rIdx, opts.favor, opts.wild);
  const stats = rolled.stats;
  const bonus = BONUS_STATS[rIdx] || 0;
  for (let i = 0; i < bonus; i++) {
    const k = pick(["atk", "hp", "def", "crit"]);
    if (k === "atk") stats.atk = (stats.atk || 0) + Math.round(2 * s * v());
    if (k === "hp") stats.hp = (stats.hp || 0) + Math.round(12 * s * v());
    if (k === "def") stats.def = (stats.def || 0) + Math.round(1.2 * s * v());
    if (k === "crit") stats.crit = +((stats.crit || 0) + 1 + 0.6 * rIdx).toFixed(1);
  }
  const procs = rollDropEnchants(slotKey, rIdx, opts.proc);
  /* elemental affixes — wards on any gear from Rare-adjacent up; weapons from
     Epic up may convert a share of every hit into an element (Eternals may
     roll CHAOS: a random element per trigger, at a fat 50% share). */
  let res;
  if (rIdx >= 2 && Math.random() < 0.35) {
    res = { el: pick(EL_KEYS), pct: +clamp((5 + tier * 1.2 + rIdx * 3) / 100, 0.05, 0.25).toFixed(3) };
  }
  let infuse;
  if (slotKey === "weapon" && rIdx >= 3 && Math.random() < 0.18 + 0.06 * (rIdx - 3)) {
    infuse = rIdx >= 6
      ? { el: "chaos", pct: 0.5 }
      : { el: pick(EL_KEYS), pct: +(0.25 + 0.05 * (rIdx - 3)).toFixed(2) };
  }
  return {
    res, infuse,
    id: itemSeq++,
    slot: slotKey, tier, rarity: rIdx,
    set: opts.set,
    heat: rolled.heat,
    procs,
    wtype,
    name: opts.name || `${RARITY_ADJ[rIdx]} ${pick(wtype ? WEAPON_TYPES[wtype].nouns : SLOTS[slotKey].nouns)}`,
    stats,
    value: Math.round(10 * tierScale(tier) * r.mult),
  };
}

function itemStatText(it) {
  const p = [];
  if (it.stats.atk) p.push(`+${fmt(it.stats.atk)} ATK`);
  if (it.stats.hp) p.push(`+${fmt(it.stats.hp)} HP`);
  if (it.stats.def) p.push(`+${fmt(it.stats.def)} DEF`);
  if (it.stats.crit) p.push(`+${it.stats.crit}% CRIT`);
  if (it.wtype && WEAPON_TYPES[it.wtype]) p.push(`${WEAPON_TYPES[it.wtype].hands}H·${WEAPON_TYPES[it.wtype].spd}spd`);
  if (it.res && ELEMENTS[it.res.el]) p.push(`${ELEMENTS[it.res.el].glyph}res${Math.round(it.res.pct * 100)}%`);
  if (it.infuse) p.push(it.infuse.el === "chaos" ? `混infuse${Math.round(it.infuse.pct * 100)}%` : `${ELEMENTS[it.infuse.el].glyph}infuse${Math.round(it.infuse.pct * 100)}%`);
  for (const pid2 of itemProcs(it)) if (PROCS[pid2]) p.push(`✦${PROCS[pid2].name}`);
  return p.join(" · ");
}

const scoreItem = (it) =>
  (it.stats.atk || 0) * 3 + (it.stats.hp || 0) * 0.55 + (it.stats.def || 0) * 2.2 + (it.stats.crit || 0) * 14;

/* ranked focus: compare items along the preference order; the first
   stat that differs decides. Returns >0 if a beats b on the ranking. */
function focusCmp(a, b, ranks) {
  for (const k of ranks) {
    const d = (a.stats[k] || 0) - (b.stats[k] || 0);
    if (d !== 0) return d;
  }
  return 0;
}
const focusRanks = (g) => (Array.isArray(g.focus) ? g.focus : g.focus ? [g.focus] : []);

function dominates(a, b) {
  const keys = ["atk", "hp", "def", "crit"];
  let strictly = false;
  for (const k of keys) {
    const av = a.stats[k] || 0, bv = b.stats[k] || 0;
    if (av < bv) return false;
    if (av > bv) strictly = true;
  }
  return strictly;
}

function calcStats(g) {
  const c = CLASSES[g.cls];
  let maxHp = c.hp + c.hpL * (g.level - 1);
  let atk = c.atk + c.atkL * (g.level - 1);
  let def = c.def + c.defL * (g.level - 1);
  let crit = c.crit;
  for (const k of SLOT_KEYS) {
    const it = g.eq[k];
    if (!it) continue;
    if (it.stats.atk) atk += it.stats.atk;
    if (it.stats.hp) maxHp += it.stats.hp;
    if (it.stats.def) def += it.stats.def;
    if (it.stats.crit) crit += it.stats.crit;
  }
  const rmods = (RACES[g.race] || RACES.human).mods;
  maxHp *= rmods.hp || 1;
  atk *= rmods.atk || 1;
  def *= rmods.def || 1;
  crit += rmods.crit || 0;
  const tiers = setTiers(g);
  const sT = tiers.t;
  atk *= 1 + 0.06 * sT.edge + 0.04 * sT.grip + 0.08 * sT.full;
  maxHp *= 1 + 0.06 * sT.bulwark + 0.06 * sT.warplate + 0.08 * sT.full;
  def *= 1 + 0.06 * sT.bulwark + 0.04 * sT.veil + 0.04 * sT.grip + 0.08 * sT.full;
  crit += 1 * sT.edge + 2 * sT.binding + 1 * sT.veil + 1 * sT.chime;
  // boss-soul themes: every bond formed channels its boss's nature
  for (const sIdx in tiers.detail) {
    const d = tiers.detail[sIdx];
    const n = Object.values(d.groups).filter(Boolean).length + (d.full ? 1 : 0);
    if (!n) continue;
    const soul = BOSS_SOULS[sIdx] || {};
    if (soul.chaos || !soul.favor) {
      atk *= 1 + 0.015 * n; maxHp *= 1 + 0.015 * n; def *= 1 + 0.015 * n; crit += 0.5 * n;
    } else {
      const app = (k, amt) => {
        if (k === "atk") atk *= 1 + amt;
        else if (k === "hp") maxHp *= 1 + amt;
        else if (k === "def") def *= 1 + amt;
        else crit += amt * 40;
      };
      app(soul.favor[0], 0.03 * n);
      app(soul.favor[1], 0.02 * n);
    }
  }
  if (eqProcs(g).has("ironblood")) maxHp *= 1.06;
  crit = Math.min(crit, STAT_CAPS.crit);
  const em = 1 + (g.echoes || 0) * 0.005;
  maxHp *= em; atk *= em; def *= em;
  return { maxHp: Math.round(maxHp), atk: Math.round(atk), def: Math.round(def), crit };
}

function gearSum(g) {
  const s = { atk: 0, hp: 0, def: 0, crit: 0 };
  for (const k of SLOT_KEYS) {
    const it = g.eq[k];
    if (!it) continue;
    s.atk += it.stats.atk || 0; s.hp += it.stats.hp || 0;
    s.def += it.stats.def || 0; s.crit += it.stats.crit || 0;
  }
  return s;
}

/* relic set bonds form on specific slots, not raw piece counts:
   Edge (weapon+amulet) · Bulwark (armor+helm+boots) · Binding (belt+ring+talisman)
   · Full (all eight). Bonds from different sets stack. */
const SET_GROUPS = [
  { key: "edge", name: "Edge", slots: ["weapon", "amulet"], text: "+6% ATK · +1 CRIT" },
  { key: "grip", name: "Grip", slots: ["offhand", "gloves"], text: "+4% ATK · +4% DEF" },
  { key: "bulwark", name: "Bulwark", slots: ["armor", "helm", "boots"], text: "+6% HP · +6% DEF" },
  { key: "warplate", name: "Warplate", slots: ["pauldrons", "greaves"], text: "+6% HP" },
  { key: "binding", name: "Binding", slots: ["belt", "ring", "talisman"], text: "+2 CRIT · +6% XP & gold" },
  { key: "veil", name: "Veil", slots: ["cloak", "bracers"], text: "+4% DEF · +1 CRIT" },
  { key: "chime", name: "Chime", slots: ["earring", "anklet"], text: "+1 CRIT · +4% XP & gold" },
];

function setTiersEq(eqMap) {
  const bySet = {};
  for (const k of SLOT_KEYS) {
    const it = eqMap[k];
    if (it && typeof it.set === "number") (bySet[it.set] = bySet[it.set] || new Set()).add(k);
  }
  const t = { edge: 0, grip: 0, bulwark: 0, warplate: 0, binding: 0, veil: 0, chime: 0, full: 0 };
  const detail = {};
  for (const s in bySet) {
    const worn = bySet[s];
    const d = { count: worn.size, groups: {}, full: worn.size >= SLOT_KEYS.length };
    for (const grp of SET_GROUPS) {
      d.groups[grp.key] = grp.slots.every((sl) => worn.has(sl));
      if (d.groups[grp.key]) t[grp.key]++;
    }
    if (d.full) t.full++;
    detail[s] = d;
  }
  return { t, detail };
}
function setTiers(g) { return setTiersEq(g.eq); }

/* item procs: buffs and debuffs that fire on their own in battle */
/* item procs — each belongs to a category; an item holds at most ONE proc
   per category, so similar boons (Scorch vs Stormbrand) never stack on a piece. */
const PROC_CATS = ["offensive", "defensive", "sustain", "passive"];
const PROCS = {
  scorch: { name: "Scorch", cat: "offensive", aoe: false, el: "fire", color: "#c8452c", desc: "12% on hit: ignite the front foe for 60% ATK/s, 3s" },
  stormbrand: { name: "Stormbrand", cat: "offensive", aoe: false, el: "storm", color: "#d9a441", desc: "10% on hit: lightning strikes the front foe for 150% ATK" },

  { g: 0, p: 0.4 },   // Uncommon (cap 1)
  { g: 0, p: 0.45 },  // Rare (cap 2)
  { g: 1, p: 0.4 },   // Epic (cap 3)
  { g: 1, p: 0.5 },   // Legendary (cap 3)

function makeFoe(g, kind) {
  const z = ZONES[g.zone];
  const last = g.zone === ZONES.length - 1;
  let lvl = last ? Math.max(z.lv[0], g.level + ri(-1, 3)) : ri(z.lv[0], z.lv[1]);
  lvl = clamp(lvl, 1, 150) + (kind === "boss" ? 2 : 0);
  const v = rnd(0.85, 1.15);
  let hp = eHp(lvl) * v, atk = eAtk(lvl) * v;
  let name = pick(z.enemies);
  if (kind === "boss") { hp *= 6.5; atk *= 1.5; name = ELEMENTS[BOSS_EL[g.zone % BOSS_EL.length]].glyph + " " + z.boss; }
  if (kind === "elite") { hp *= 2.5; atk *= 1.3; name = "Elite " + name; }
  if (kind === "pack") { hp *= 0.75; atk *= 0.8; }
  /* elemental alignment: bosses always bear their zone's element and are
     IMMUNE to it; lesser foes align 65% of the time, resistance by menace. */
  let el = null, elRes = 0;
  if (kind === "boss") { el = BOSS_EL[g.zone % BOSS_EL.length]; elRes = 1; }
  else if (Math.random() < 0.65) {
    el = pick(EL_KEYS);
    elRes = kind === "elite" ? 0.45 : 0.2;
    hp *= 1.08; atk *= 1.08;
  }
  return {
    name: el && kind !== "boss" ? ELEMENTS[el].glyph + " " + name : name, lvl,
    hp: Math.round(hp), maxHp: Math.round(hp), atk: Math.round(atk),
    isBoss: kind === "boss", isElite: kind === "elite", inPack: kind === "pack",
    stun: 0, el, elRes, bsT: kind === "boss" ? 6 : 0, bsN: 0, enrage: 1,
  };
}

function spawnWave(g) {
  const withCohorts = (wave, chance, max, kind) => {
    if (Math.random() < chance) {
      const n = ri(1, max);
      for (let i = 0; i < n; i++) wave.push(makeFoe(g, kind));
    }
    return wave;
  };
  if (g.bossPending) return withCohorts([makeFoe(g, "boss")], 0.3, 2, "pack");
  const r = Math.random();
  if (r < 0.1) {
    // when Elites hunt together, every member is Elite — softened per head so
    // the group is dangerous, not a death sentence; rewards stay full Elite
    const wave = withCohorts([makeFoe(g, "elite")], 0.4, 2, "elite");
    if (wave.length > 1) {
      for (const f of wave) {
        f.hp = Math.round(f.hp * 0.8);
        f.maxHp = f.hp;
        f.atk = Math.round(f.atk * 0.85);
        f.inPack = true;
      }
    }
    return wave;
  }
  if (r < 0.26) return Array.from({ length: ri(2, 3) }, () => makeFoe(g, "pack"));
  return [makeFoe(g, "normal")];
}

function killTime(g) {
  const st = calcStats(g);
  const z = ZONES[g.zone];
  const mid = Math.round((z.lv[0] + z.lv[1]) / 2);
  const hitAvg = Math.max(1, st.atk * (1 + (st.crit / 100) * 0.8)) * 1.25; // rough skill uplift
  return eHp(mid) / (hitAvg / (TICK_MS / 1000)) + 1.4;
}

/* Spirit Essence 精: distilled from melted Epic+ gear, fuels the Focused Rite */
const essenceOf = (r) => [0, 0, 0, 1, 3, 8, 20][r] || 0;

/* every forge strike has a 10% chance to come out Masterwork: +25% stats */
function forgeItem(t, slot, weights) {

/* ---- build-aware valuation: items are judged by what they do for THIS

const RANK_MULT = [1.6, 1.25, 1.0, 0.85];

  const base = { atk: 3, hp: 0.55, def: 2.2, crit: 14 };
  const fr = focusRanks(g);
  const w = {};
  for (const k in base) {
    const i = fr.indexOf(k);
    w[k] = base[k] * (i >= 0 ? RANK_MULT[i] : (fr.length ? 0.55 : 1));
  }

function cappedGain(g, k, fromVal, addVal) {

  if (k === "crit") { const room = Math.max(0, cap - fromVal); return Math.min(addVal, room); }

function procPoints(g, ids, exclSlot) {

    for (const pid of itemProcs(g.eq[k])) have.add(pid);
  }
  const st = calcStats(g);
  const charPts = st.atk * 3 + st.maxHp * 0.55 + st.def * 2.2 + st.crit * 14;
  let pts = 0;
  for (const id of ids) {
    if (have.has(id)) continue;
    const pc = PROCS[id];
    if (!pc) continue;
    const f = pc.cat === "offensive" ? (pc.aoe ? 0.05 : 0.04)

      : pc.cat === "sustain" ? 0.04 : 0.03;

function bondPoints(g, refSt, w, eqMap) {

  let aPct = 0.06 * sT.edge + 0.04 * sT.grip + 0.08 * sT.full;
  let hPct = 0.06 * sT.bulwark + 0.06 * sT.warplate + 0.08 * sT.full;
  let dPct = 0.06 * sT.bulwark + 0.04 * sT.veil + 0.04 * sT.grip + 0.08 * sT.full;

    if (soul.chaos || !soul.favor) {

      const app = (k, amt) => { if (k === "atk") aPct += amt; else if (k === "hp") hPct += amt; else if (k === "def") dPct += amt; else crit += amt * 40; };

      app(soul.favor[1], 0.02 * n);

function buildValue(g, it, slot) {

  const refSt = calcStats(g);

    ? WEAPON_TYPES[it.wtype].dmg * WEAPON_TYPES[it.wtype].spd * (masteryOf(g, it) ? 1.1 : 1)
    : 1;
  const cur = g.eq[slot];
  const floorCrit = refSt.crit - (cur && cur.stats.crit || 0);
  const floorDef = refSt.def - (cur && cur.stats.def || 0);
  let v = 0;
  for (const k of ["atk", "hp", "def", "crit"]) {
    const raw = it.stats[k] || 0;
    const eff = k === "crit" ? cappedGain(g, k, floorCrit, raw)
      : k === "def" ? cappedGain(g, k, floorDef, raw) : raw;
    v += eff * w[k] * (k === "atk" ? wf : 1);
  }
  v += procPoints(g, itemProcs(it), slot);
  if (it.res) v += it.res.pct * refSt.maxHp * 0.08 * w.hp;
  if (it.infuse) v += it.infuse.pct * refSt.atk * 0.22 * w.atk;
  // marginal set-bond value: the bonds this piece would complete/extend (or
  // break) versus your current gear — so relics that finish a bond finally
  // read as the upgrades they are, and the AI won't shatter a bond blindly.
  v += bondPoints(g, refSt, w, eqWith(g.eq, slot, it)) - bondPoints(g, refSt, w, g.eq);

/* estimated worth of a typical fresh find for a slot at the current tier —
   used when a hand is empty and we must price its potential */
function expectedSlotValue(g, slot) {
  const budget = slot === "weapon" ? 24 + (g.zone + 1) * 6 : (SLOT_BUDGET[slot] || 12);
  return budget * tierScale(g.zone + 1) * 1.2;
}
/* the best REAL offhand available anywhere (worn · pack · vault · dual-wield
   blades for Blademasters), falling back to the estimate when bare-handed */
function bestOffOption(g) {
  let best = buildValue(g, g.eq.offhand, "offhand");
  for (const it of g.inv) {
    if (it.slot === "offhand") best = Math.max(best, buildValue(g, it, "offhand"));
    else if (g.cls === "blademaster" && it.slot === "weapon" && it.wtype && !isTwoH(it)) {
      best = Math.max(best, buildValue(g, { ...it, slot: "offhand" }, "offhand"));
    }
  }
  for (const vv of (g.vault || [])) {
    if (vv.slot === "offhand") best = Math.max(best, buildValue(g, vv, "offhand"));
    else if (g.cls === "blademaster" && vv.slot === "weapon" && vv.wtype && !isTwoH(vv)) {
      best = Math.max(best, buildValue(g, { ...vv, slot: "offhand" }, "offhand"));
    }
  }
  if (!g.eq.offhand) best = Math.max(best, expectedSlotValue(g, "offhand"));
  return best;

/* ---- the Spoils Vault: set pieces and Mythic+ finds attune forever ---- */
const isVaultClass = (it) => typeof it.set === "number" || it.rarity >= 5;
const vaultKey = (it) => (typeof it.set === "number" ? "S" + it.set : "R") + "|" + it.slot + "|" + (it.rarity >= 6 ? it.name : "");
const sameStats = (a, b) => ["atk", "hp", "def", "crit"].every((k) => (a.stats[k] || 0) === (b.stats[k] || 0)) &&
  JSON.stringify(itemProcsMap(a)) === JSON.stringify(itemProcsMap(b));
function vaultStore(g, item, quiet = false) {
  g.vault = g.vault || [];
  const peers = g.vault.filter((v) => vaultKey(v) === vaultKey(item));
  for (const pr of peers) {
    if (sameStats(pr, item) || dominates(pr, item)) return "dup";
  }
  const beaten = peers.filter((pr) => dominates(item, pr));
  if (beaten.length) {
    g.vault = g.vault.filter((v) => !beaten.includes(v));
    for (const pr of beaten) { g.gold += pr.value; g.essence = (g.essence || 0) + essenceOf(pr.rarity); }
    if (!quiet) pushLog(g, `Vault refined — ${beaten.length} lesser piece${beaten.length > 1 ? "s" : ""} melted as duplicates.`, "melt");
  }
  g.vault = [...g.vault, { ...item }];
  if (!quiet) pushLog(g, `${item.name} attunes to your soul — sealed in the Spoils Vault.`, "loot");
  return "stored";
}

function displaceOffhand(g, quiet) {
  const off = g.eq.offhand;
  if (!off) return;
  g.eq = { ...g.eq, offhand: null };
  if (isVaultClass(off)) {
    if (!quiet) pushLog(g, `${off.name} yields to the two-handed grip — resting in the vault.`, "sys");
  } else if (g.inv.length < INV_CAP) {
    g.inv = [...g.inv, off];
    if (!quiet) pushLog(g, `${off.name} stowed — the new grip needs both hands.`, "sys");
  } else {
    g.gold += off.value;
    if (!quiet) pushLog(g, `Pack full — ${off.name} melted to make room for the grip.`, "melt");
  }
}

/* ---- smart drop: build-value evaluation. Vault-class items are never lost;
   only true duplicates melt. ---- */
function applyDrop(g, item, quiet = false) {
  if (item.rarity >= 4) {
    pushSplash(g, item.rarity >= 6 ? "ETERNAL" : item.rarity >= 5 ? "MYTHIC" : "LEGENDARY", item.name, RARITIES[item.rarity].color, item.rarity >= 6 ? 4800 : 2400);
  }
  const distill = (it2) => {
    const e = essenceOf(it2.rarity);
    if (e) g.essence = (g.essence || 0) + e;
    return e ? ` · +${e}精` : "";
  };
  const vClass = isVaultClass(item);
  let dupCopy = false;
  if (vClass) dupCopy = vaultStore(g, item, quiet) === "dup";
  // offhand is sealed while a two-handed weapon is gripped
  if (item.slot === "offhand" && isTwoH(g.eq.weapon)) {
    if (vClass) {
      if (dupCopy) {
        g.gold += item.value;
        const e = distill(item);
        if (!quiet) pushLog(g, `Duplicate attunement — melted ${item.name} +${fmt(item.value)}g${e}.`, "melt");
        return "melt";
      }
      if (!quiet) pushLog(g, `${item.name} rests in the vault — your two-handed grip leaves no hand free.`, "loot");
      return "vaulted";
    }
    g.gold += item.value;
    const e = distill(item);
    if (!quiet) pushLog(g, `Melted ${item.name} — no hand free for it (two-handed grip) +${fmt(item.value)}g${e}.`, "melt");
    return "melt";
  }
  let cur = g.eq[item.slot];
  if (!cur) {
    if (item.slot === "weapon" && isTwoH(item)) displaceOffhand(g, quiet);
    g.eq = { ...g.eq, [item.slot]: item };
    if (!quiet) pushLog(g, `Equipped ${item.name} (${RARITIES[item.rarity].name}).`, "loot");
    return "equipped";
  }
  let bvN = buildValue(g, item, item.slot);
  let bvC = buildValue(g, cur, item.slot);
  if (item.slot === "weapon") {
    // hand pairing: the 1H side is judged as its LITERAL main plus its real
    // offhand — or, when that hand is empty, the best offhand in pack/vault
    // (or a fresh-find estimate). The 2H side stands alone.
    if (isTwoH(item) && !isTwoH(cur)) bvC += g.eq.offhand ? buildValue(g, g.eq.offhand, "offhand") : bestOffOption(g);
    else if (!isTwoH(item) && isTwoH(cur)) bvN += bestOffOption(g);
    // Blademasters may route a 1H blade to the off hand instead
    if (g.cls === "blademaster" && !isTwoH(item) && !isTwoH(cur)) {
      const offItem = { ...item, slot: "offhand" };
      const bvON = buildValue(g, offItem, "offhand");
      const bvOC = buildValue(g, g.eq.offhand, "offhand");
      if (bvON - bvOC > bvN - bvC && bvON > bvOC * 1.03 && !(g.locked && g.locked.offhand)) {
        item = offItem;
        cur = g.eq.offhand;
        bvN = bvON;
        bvC = bvOC;
        if (!cur) {
          g.eq = { ...g.eq, offhand: item };
          if (!quiet) pushLog(g, `Second blade! ${item.name} fills your off hand.`, "loot");
          return "equipped";
        }
      }
    }
  }
  // your preferences RULE the decision: any strict gain along the ranking
  // auto-equips (with a sanity floor against catastrophic trades), a find
  // that never lowers ranked stats upgrades on any overall gain, and null
  // stats count as literal zeroes on both sides.
  const fr2 = focusRanks(g);
  const focusGain = fr2.length ? focusCmp(item, cur, fr2) > 0 : false;
  const noFocusLoss = fr2.every((k) => (item.stats[k] || 0) >= (cur.stats[k] || 0));
  // significantly higher overall value, yet it would LOWER a preferred stat:
  // don't decide silently — ask the player, and keep the item meanwhile.
  const loweredFocus = fr2.find((k) => (item.stats[k] || 0) < (cur.stats[k] || 0));
  if (fr2.length && loweredFocus && !focusGain && bvN > bvC * 1.15 && !(g.locked && g.locked[item.slot]) && !isTwoH(item)) {
    if (!vClass && g.inv.length < INV_CAP) g.inv = [...g.inv, item];
    g.pendingUpgrades = [...(g.pendingUpgrades || []), {
      itemId: item.id, slot: item.slot, gain: Math.round(bvN - bvC), drops: loweredFocus.toUpperCase(),
      itemName: item.name, curName: cur.name,
    }];
    if (!quiet) pushLog(g, `${item.name} is worth far more overall but lowers ${loweredFocus.toUpperCase()} — your call. (Gear tab)`, "loot");
    return vClass ? "vaulted" : "kept";
  }
  if ((focusGain && bvN >= bvC * 0.85) || bvN > bvC * 1.03 || (noFocusLoss && bvN > bvC * 1.005)) {
    if (g.locked && g.locked[item.slot]) {
      if (vClass) {
        if (!quiet) pushLog(g, `${item.name} would upgrade your locked ${SLOTS[item.slot].name} — it waits in the vault.`, "loot");
        return "vaulted";
      }
      if (g.inv.length >= INV_CAP) {
        g.gold += item.value;
        const e = distill(item);
        if (!quiet) pushLog(g, `Pack full — melted ${item.name} (an upgrade for your locked ${SLOTS[item.slot].name}!) +${fmt(item.value)}g${e}.`, "melt");
        return "melt";
      }
      g.inv = [...g.inv, item];
      if (!quiet) pushLog(g, `${item.name} would upgrade your locked ${SLOTS[item.slot].name} — waiting in pack.`, "loot");
      return "kept";
    }
    if (item.slot === "weapon" && isTwoH(item)) displaceOffhand(g, quiet);
    g.eq = { ...g.eq, [item.slot]: item };
    if (isVaultClass(cur)) {
      if (!quiet) pushLog(g, `Upgrade! ${item.name} takes the field · ${cur.name} rests on in the vault.`, "loot");
    } else {
      g.gold += cur.value;
      const e = distill(cur);
      if (!quiet) pushLog(g, `Upgrade! ${item.name} (+${fmt(bvN - bvC)} build value) replaces ${cur.name} · old melted +${fmt(cur.value)}g${e}.`, "loot");
    }
    return "upgrade";
  }
  if (vClass) {
    if (dupCopy) {
      g.gold += item.value;
      const e = distill(item);
      if (!quiet) pushLog(g, `Duplicate attunement — melted ${item.name} +${fmt(item.value)}g${e}.`, "melt");
      return "melt";
    }
    if (!quiet) pushLog(g, `${item.name} rests in the vault (−${fmt(Math.max(0, bvC - bvN))} vs worn).`, "loot");
    return "vaulted";
  }
  if (bvN > bvC * 0.97) {
    if (g.inv.length >= INV_CAP) {
      g.gold += item.value;
      const e = distill(item);
      if (!quiet) pushLog(g, `Pack full — melted ${item.name} +${fmt(item.value)}g${e}.`, "melt");
      return "melt";
    }
    g.inv = [...g.inv, item];
    if (!quiet) pushLog(g, `Kept ${item.name} — a near-match worth weighing (Δ${fmt(bvN - bvC)}).`, "loot");
    return "kept";
  }
  if (focusGain && !vClass && g.inv.length < INV_CAP) {
    g.inv = [...g.inv, item];
    if (!quiet) pushLog(g, `Kept ${item.name} — raises your focus but trades heavily (Δ${fmt(bvN - bvC)}).`, "loot");
    return "kept";
  }
  g.gold += item.value;
  const e = distill(item);
  if (!quiet) pushLog(g, `Melted ${item.name} +${fmt(item.value)}g${e}.`, "melt");
  return "melt";
}

/* ---- per-foe kill rewards ---- */
function rewardFoe(g, f, st) {
  const rm = f.isBoss ? 10 : f.isElite ? 3 : f.inPack ? 0.85 : 1;
  const rmods = (RACES[g.race] || RACES.human).mods;
  const sc = xpScale(g.level, f.lvl);
  g.streak = (g.streak || 0) + 1;
  if ([10, 25, 50, 100, 200, 500].includes(g.streak)) pushRibbon(g, `STREAK ×${g.streak}`, C.cinnabar);
  const streakBonus = 1 + Math.min(g.race === "foxkin" ? 0.3 : 0.2, Math.floor(g.streak / 10) * (g.bg === "veteran" ? 0.03 : 0.02));
  const echoMult = 1 + (g.echoes || 0) * 0.01;
  const setB = setTiers(g).t;
  const setRewardMult = 1 + 0.06 * setB.binding + 0.04 * setB.chime;
  const xpGain = Math.round(eXp(f.lvl) * rm * (g.restedT > 0 ? (g.bg === "pilgrim" ? 1.35 : 1.25) : 1) * sc * (rmods.xp || 1) * echoMult * setRewardMult * (eqProcs(g).has("sagemind") ? 1.08 : 1) * (g.bg === "scholar" ? 1.1 : 1));
  const goldGain = Math.round(eGold(f.lvl) * rm * streakBonus * (rmods.gold || 1) * echoMult * setRewardMult * (eqProcs(g).has("greedglint") ? 1.1 : 1) * (g.bg === "noble" ? 1.08 : 1) * (g.bg === "rod" ? 1.05 : 1));
  g.xp += xpGain; g.gold += goldGain; g.lifetimeKills += 1;
  bumpBounty(g, "kills");
  g.vigor = Math.max(0, g.vigor - 0.35 * (g.bg === "farmhand" ? 0.75 : 1));
  if (!f.isBoss) g.kills[g.zone] += 1;
  const cut = sc < 1 ? ` (trivial −${Math.round((1 - sc) * 100)}%)` : "";
  pushLog(g, `${f.name} falls. +${fmt(xpGain)} XP${cut}, +${fmt(goldGain)} gold.`, f.isBoss ? "boss" : "kill");
  if (g.cls === "taoist") g.hp = Math.min(st.maxHp, g.hp + Math.round(st.maxHp * 0.04));
  if (g.cls === "warlock") {
    g.hp = Math.min(st.maxHp, g.hp + Math.round(st.maxHp * 0.04));
    for (const ck of Object.keys(g.cds)) g.cds[ck] = Math.max(0, g.cds[ck] - 0.5);
  }
  if (g.cls === "necromancer") g.graveChill = 3;
  if (g.cls === "ravager") g.rage = Math.min(100, (g.rage || 0) + 12);
  const kprocs = eqProcs(g);
  if (kprocs.has("lifedrink")) g.hp = Math.min(st.maxHp, g.hp + Math.round(st.maxHp * 0.06));
  if (kprocs.has("hastewind") && Math.random() < 0.15) {
    for (const ck of Object.keys(g.cds)) g.cds[ck] = Math.max(0, g.cds[ck] - 1);
  }

  const t = g.zone + 1;
  const mi = matIdxForTier(t);
  if (f.isBoss) {
    const q = ri(4, 7);
    g.materials[MATS[mi].key] += q;
    const gq = ri(1, 2) + (g.bg === "quarry" ? 1 : 0);
    g.materials.glyph = (g.materials.glyph || 0) + gq;
    pushLog(g, `Harvested ${q}× ${MATS[mi].name} and ${gq}× Glyph Dust.`, "loot");
    if (Math.random() < 0.25) {
      g.materials.pearl = (g.materials.pearl || 0) + 1;
      pushLog(g, "A Chaos Pearl gleams among the spoils.", "loot");
    }
  } else if (f.isElite && Math.random() < 0.6) {
    const q = ri(1, 2);
    g.materials[MATS[mi].key] += q;
    if (Math.random() < 0.3) g.materials.glyph = (g.materials.glyph || 0) + 1;
    pushLog(g, `Found ${q}× ${MATS[mi].name}.`, "melt");
  } else if (Math.random() < (f.inPack ? 0.25 : 0.3)) {
    const q = Math.random() < 0.8 ? 1 : 2;
    g.materials[MATS[mi].key] += q;
    pushLog(g, `Found ${q}× ${MATS[mi].name}.`, "melt");
  }

  if (f.isBoss) {
    const soul = BOSS_SOULS[g.zone];
    const zb = ZONES[g.zone];
    const lvlBoost = 1 + clamp((f.lvl - zb.lv[0]) * 0.012, 0.05, 0.65);
    const wildMode = soul.chaos ? "chaos" : "wild";
    applyDrop(g, makeItem(t, { minRarity: 3, boost: lvlBoost * 0.95, favor: soul.favor, wild: wildMode }));
    applyDrop(g, makeItem(t, { minRarity: 2, boost: lvlBoost * 0.9, favor: soul.favor, wild: wildMode }));
    if (Math.random() < 0.25) {
      const rslot = pickRelicSlot();
      const item = makeItem(t, { slot: rslot, rarity: 4, boost: 1.1 * lvlBoost, set: g.zone, favor: soul.favor, wild: wildMode });
      const ep = item.heat >= 1.38 ? "Awakened" : item.heat >= 1.28 ? "Furious" : item.heat >= 1.15 ? "Roused" : item.heat <= 0.92 ? "Dormant" : "";
      item.name = `${ep ? ep + " " : ""}${SIG_SETS[g.zone]} ${RELIC_NOUNS[rslot]}`;
      pushLog(g, `${f.name} (Lv ${f.lvl}) yields a relic of its ${soul.nature}: ${item.name}!`, "boss");
      pushSplash(g, ep === "Awakened" ? "AWAKENED RELIC" : "RELIC CLAIMED", item.name, ep === "Awakened" ? C.violet : C.gilt);
      applyDrop(g, item);
    }
    if (Math.random() < 0.02) {
      const E = ETERNALS[g.zone];
      const eit = makeItem(t, { slot: E.slot, rarity: 6, name: E.name, boost: 1.15 * lvlBoost, favor: soul.favor, wild: "chaos", proc: E.proc, wtype: E.wtype });
      pushLog(g, `Something impossible falls from ${f.name}: ${E.name}, the Eternal.`, "boss");
      applyDrop(g, eit);
    }
  } else if (f.isElite) {
    applyDrop(g, makeItem(t, { minRarity: 1 }));
  } else if (Math.random() < (f.inPack ? 0.22 : 0.28)) {
    applyDrop(g, makeItem(t));
  }

  // level ups — a surge of power, marked with ceremony
  while (g.xp >= xpNeed(g.level)) {
    g.xp -= xpNeed(g.level);
    const before = calcStats(g);
    const formBefore = g.cls === "beastcaller" ? beastForm(g.level).name : null;
    g.level += 1;
    const after = calcStats(g);
    if (formBefore) {
      const formNow = beastForm(g.level).name;
      if (formNow !== formBefore) {
        pushRibbon(g, `BEAST EVOLVES — ${formNow.toUpperCase()}`, C.violet);
        pushLog(g, `Your spirit beast takes new shape: ${formNow}.`, "lvl");
      }
    }
    g.hp = after.maxHp;
    g.vigor = 100;
    const parts = [];
    if (after.maxHp > before.maxHp) parts.push(`+${fmt(after.maxHp - before.maxHp)} HP`);
    if (after.atk > before.atk) parts.push(`+${fmt(after.atk - before.atk)} ATK`);
    if (after.def > before.def) parts.push(`+${fmt(after.def - before.def)} DEF`);
    const gains = parts.join(" · ");
    pushLog(g, `Level ${g.level} — ${gains}. Body and spirit fully restored.`, "lvl");
    if (g.level % 10 === 0) {
      const realm = realmOf(g.level);
      pushSplash(g, "BREAKTHROUGH", `${realm} Realm — Level ${g.level}`, C.gilt, 9600);
      pushLog(g, `You break through to the ${realm} Realm. The heavens take notice.`, "lvl");
      const bq = ri(3, 5);
      g.materials[MATS[mi].key] += bq;
      pushLog(g, `Breakthrough tribute: ${bq}× ${MATS[mi].name} and a worthy arm.`, "loot");
      applyDrop(g, makeItem(t, { minRarity: 3 }));
    } else if (g.level % 5 === 0) {
      pushSplash(g, `LEVEL ${g.level}`, gains, C.gilt, 9600);
    } else if (f.isBoss || f.isElite) {
      // a covering splash (VANQUISHED / ELITE FELLED) is coming — give the
      // level its own screen in the queue instead of a buried burst
      pushSplash(g, `LEVEL ${g.level} ▲`, gains, C.gilt);
    } else {
      g.lvlfx = { id: splashSeq++, lvl: g.level, gains, at: Date.now() };
    }
    const unlocked = SKILLS.find((s) => s.cls === g.cls && s.lv === g.level);
    if (unlocked) pushLog(g, `New skill available to train: ${unlocked.name}.`, "lvl");
  }

  if (f.isBoss) {
    g.bossPending = false;
    g.bossDown[g.zone] = true;
    g.bossMeter[g.zone] = 0;
    pushSplash(g, "BOSS VANQUISHED", f.name, C.gilt);
    if (g.zone < ZONES.length - 1 && g.maxZone === g.zone) {
      g.maxZone += 1;
      pushLog(g, `The way opens: ${ZONES[g.maxZone].name} awaits.`, "boss");
      pushSplash(g, "THE WAY OPENS", ZONES[g.maxZone].name, C.jade);
    }
  } else if (f.isElite) {
    pushRibbon(g, "ELITE FELLED", C.storm);
    bumpBounty(g, "elite");
  }
}

/* ---------------- combat step (one tick) ---------------- */

/* tactical brain: derived from what each skill actually does. Sustain fires
   on need, buffs refresh only when faded, DPS respects target quality — and
   rage economics get their own rules (see the gate in the cast loop). */
const TACT = {
  atkBuffs: new Set(["arcanesurge", "blessing", "bloodpact", "bloodroar", "bushido", "deathpact", "deathspoem", "fury", "hawkeye", "innerfire", "laststand", "momentum", "nightembrace", "packhowl", "painfeast", "soulburn", "warcry2", "wildshape"]),
  critBuffs: new Set(["arcane", "arcanesurge", "bushido", "deathpact", "deathspoem", "hawkeye", "ioncharge", "momentum", "nightembrace", "soulburn"]),
  vowBuffs: new Set(["vowward"]),
  shields: new Set(["aegis", "barkskin", "bearhide", "blessing", "bulwark2", "camostep", "ironbody", "ironskin", "manaward", "parryflow", "parrystance", "resurrection", "sanctuary", "sanctum", "smokeveil", "staticveil", "stillmind", "unbreakable", "ward"]),
  debuffs: new Set(["challenge", "curse", "graspdead", "patience", "warcry2"]),
  dots: new Set(["bleedingedge", "envenom", "flamestrike", "hex", "plaguetouch", "serpentarrow", "serpentvenom", "soulflame"]),
  lateHeals: new Set(["graceful", "regrowth", "reversal"]),
  bigHeals: new Set(["laststand", "painfeast", "resurrection"]),
  nukePw: {ancestorfist: 10.0, annihilate: 11.0, beastking: 8.0, berserkrush: 12.5, falconvolley: 11.5, finalcut: 12.0, paradox: 12.0, stormlance: 5.2, titanwrath: 9.0},
  aoeBig: new Set(["apocalypse", "avatar", "cataclysm", "finalvow", "meteor", "ragequake", "skyfall", "spellstorm", "supernova"]),
};

function step(prev) {
  if (prev.paused) return prev;
  RARITY_LUCK = prev.bg === "gambler" ? 0.25 : 0;
  const g = {
    ...prev,
    buffs: { ...prev.buffs }, cds: { ...prev.cds },
    kills: [...prev.kills], bossDown: [...prev.bossDown], bossMeter: [...prev.bossMeter],
    materials: { ...prev.materials },
    bounty: prev.bounty ? { ...prev.bounty } : null,
  };
  const now = Date.now();
  g.fx = (prev.fx || []).filter((f) => now - f.at < 900);
  if (g.splash && now - g.splash.at > (g.splash.dur || 2400)) g.splash = null;
  if (!g.splash && g.splashQ && g.splashQ.length) {
    const [next, ...rest] = g.splashQ;
    g.splash = { ...next, at: now };
    g.splashQ = rest;
  }
  if (g.lvlfx && now - g.lvlfx.at > 2000) g.lvlfx = null;
  if (g.ribbon && now - g.ribbon.at > 1500) g.ribbon = null;
  // safety net: a level burst hidden beneath any splash becomes its own queued splash
  if (g.lvlfx && g.splash) {
    pushSplash(g, `LEVEL ${g.lvlfx.lvl} ▲`, g.lvlfx.gains || "", C.gilt);
    g.lvlfx = null;
  }
  // ceremony hold: the world pauses while any announcement is on screen
  if (g.splash || g.lvlfx) return g;

  // the bounty board never stays bare for long
  if (!g.bounty) g.bounty = newBounty(g);
  else if (g.bounty.done) {
    g.bountyCd = (g.bountyCd || 0) - 1;
    if (g.bountyCd <= 0) g.bounty = newBounty(g);
  }
  const fx = { push: (x) => { g.fx = [...g.fx, { ...x, at: now }]; } };
  const st = calcStats(g);
  const dt = TICK_MS / 1000;
  /* ---- companion lifecycle: cap to scaling max, tick revival ---- */
  const petCfg = companionCfg(g);
  const petCap = petCfg ? petMaxOf(g, st) : 0;
  if (petCfg) {
    if (!g.pet) g.pet = { hp: petCap, downT: 0 };
    g.pet.hp = Math.min(g.pet.hp, petCap);
    if (g.pet.hp <= 0 && g.pet.downT > 0) {
      g.pet.downT -= dt;
      if (g.pet.downT <= 0) {
        g.pet.hp = Math.round(petCap * 0.35);
        g.pet.downT = 0;
        pushLog(g, `Your ${petCfg.kind === "guardian" ? "Guardian" : "beast"} returns to your side.`, "buff");
      }
    }
  } else g.pet = null;

  /* ---- camp: rest, sleep, train ---- */
  if (g.camping) {
    if (g.hp < st.maxHp) g.hp = Math.min(st.maxHp, g.hp + Math.max(1, st.maxHp * ((g.bg === "hermit" ? 0.075 : 0.05) + (g.race === "deepborn" ? 0.01 : 0))));
    if (petCfg && g.pet) {
      if (g.pet.hp <= 0) { g.pet.downT = Math.max(0, (g.pet.downT || 0) - dt * 2); if (g.pet.downT <= 0 && g.pet.hp <= 0) { g.pet.hp = Math.round(petCap * 0.35); pushLog(g, "Tended by firelight, your companion stirs awake.", "buff"); } }
      else if (g.pet.hp < petCap) g.pet.hp = Math.min(petCap, g.pet.hp + Math.max(1, Math.round(petCap * 0.08)));
    }
    if (g.vigor < 100) {
      if (g.vigor < 40 && !g.wasTired) g.wasTired = true;
      g.vigor = Math.min(100, g.vigor + (g.bg === "hermit" ? 1.35 : 0.9));
      if (g.vigor >= 100 && g.wasTired) {
        g.wasTired = false;
        g.restedT = g.bg === "pilgrim" ? 900 : 600;
        pushLog(g, `You wake well-slept. Rested: +${g.bg === "pilgrim" ? 35 : 25}% XP for a while.`, "buff");
      }
    }
    if (g.training) {
      const tr = { ...g.training, left: g.training.left - dt };
      if (tr.left <= 0) {
        const sk = SKILLS.find((s) => s.id === tr.id);
        g.trained = [...g.trained, tr.id];
        g.training = null;
        pushLog(g, `Training complete: ${sk ? sk.name : "skill"} mastered. Weave it in Skills.`, "lvl");
        if (sk) pushSplash(g, "SKILL MASTERED", sk.name, C.storm);
      } else g.training = tr;
    }
    return g;
  }

  // timers
  for (const k of Object.keys(g.cds)) g.cds[k] = Math.max(0, g.cds[k] - dt * (g.cls === "chronomancer" ? 1.5 : 1));
  const b = g.buffs;
  if (b.atkT > 0) { b.atkT -= dt; if (b.atkT <= 0) b.atkMult = 1; }
  if (b.critT > 0) { b.critT -= dt; if (b.critT <= 0) b.critAdd = 0; }
  if (b.vowT > 0) b.vowT -= dt;
  if (b.communeT > 0) b.communeT -= dt;
  if (b.slowT > 0) b.slowT -= dt;

  }
  let foes = g.enemies.map((f) => ({ ...f }));

  /* ---- player turn ---- */
  const tired = g.vigor < 25;
  const critCh = st.crit + b.critAdd;

  const baseAtk = st.atk * b.atkMult * (tired && g.race !== "stoneborn" ? 0.75 : 1) * (bossFight && g.cls === "warrior" ? 1.15 : 1) * (bossFight ? 1 + 0.12 * fullSets + (g.race === "sunborn" ? 0.12 : 0) : 1) * (g.cls === "sentinel" && b.shield > 0 ? 1.1 : 1) * rage * soloShot;

  const healMul = g.cls === "cleric" ? 1.4 : 1;

  const needsHealing = (frac) => {

      const pAmt = Math.round(pm2 * frac * healMul);
      g.pet.hp = Math.min(pm2, g.pet.hp + pAmt);
      fx.push({ id: floatSeq++, text: "+" + fmt(pAmt), crit: false, side: "beast", heal: true });

  const voidMul = g.race === "voidborn" && foes.length > 1 ? 1.1 : 1;
  /* elemental offense: explicit skill elements ride the wheel whole; neutral

      case "echostrike": dealFrontE(1.7, "Echo"); dealFrontE(1.7, "Echo"); break;
      case "momentum": b.atkMult = 1.3; b.atkT = 6; b.critAdd = 15; b.critT = 6; break;
      case "paradox": dealFrontE(12, "Paradox"); break;
      case "boltcast": dealFrontE(2.7, "Bolt"); break;
      case "staticveil": gainShield(st.maxHp * 0.2); pushLog(g, "Static crackles around you.", "buff"); break;
      case "arcflash": dealAllE(2.8, "Arcflash"); break;
      case "ioncharge": b.critAdd = 20; b.critT = 6; pushLog(g, "Charge saturates the air.", "buff"); break;
      case "stormlance": dealFrontE(5.2, "Stormlance"); break;
      case "tempest": dealAllE(3.3, "Tempest"); b.slowT = 4; break;
      case "skyfall": dealAllE(9.5, "Skyfall"); break;
      case "aegisjudge": {
        if (foes[0]) {
          const isC = Math.random() * 100 < critCh;
          const dmg = Math.max(1, Math.round(baseAtk * 9 * rnd(0.85, 1.15) * (isC ? critDmg : 1)));
          foes[0].hp -= dmg;
          gainShield(dmg * 0.3);
          fx.push({ id: floatSeq++, text: "Judgment −" + fmt(dmg), crit: isC, side: "enemy" });
        }
        break;
      }
      default: cast = false;
    }
    if (cast) {
      if (g.cls === "ravager") g.rage = Math.max(0, (g.rage || 0) - sk.cd * 4);
      else g.cds[sid] = sk.cd;
    }
  }

  g.hurtLastTick = false;
  if (g.cls === "ravager" && foes.length) g.rage = Math.min(100, (g.rage || 0) + 6);
  if (g.cls === "ravager" && !foes.length) g.rage = Math.max(0, (g.rage || 0) - 2);
  if (g.cls === "chronomancer") g.chrono = ((g.chrono || 0) + 1) % 4;
  // Spellblade arcane edge: every 3rd strike detonates
  if (g.cls === "spellblade" && foes[0]) {
    g.arcaneCount = (g.arcaneCount || 0) + 1;
    if (g.arcaneCount >= 3) {
      g.arcaneCount = 0;
      const dmg = Math.max(1, Math.round(baseAtk * 1.2 * rnd(0.85, 1.15)));
      foes[0].hp -= dmg;
      fx.push({ id: floatSeq++, text: "咒−" + fmt(dmg), crit: false, side: "enemy" });
    }
  }
  // Samurai iaido: guaranteed crit on the first strike against a fresh foe
  if (g.cls === "samurai" && foes[0] && !foes[0].iaido) {
    foes[0].iaido = true;
    const dmg = Math.max(1, Math.round(baseAtk * 1 * rnd(0.85, 1.15) * critDmg));
    foes[0].hp -= dmg;
    fx.push({ id: floatSeq++, text: "Iai −" + fmt(dmg), crit: true, side: "enemy" });
  }
  {
    const wMain = g.eq.weapon;
    const wtM = WEAPON_TYPES[(wMain && wMain.wtype) || "sword"] || WEAPON_TYPES.sword;
    const spdEff = wtM.spd + (g.cls === "monk" ? 0.15 : 0) + (g.race === "windborn" ? 0.1 : 0);
    const mMul = wtM.dmg * (masteryOf(g, wMain) ? 1.1 : g.race === "human" ? 1.08 : 1);
    const heroMul = petCfg
      ? (b.communeT > 0 ? petCfg.heroAtkMul + petCfg.atkShare * 0.8 : petCfg.heroAtkMul)
      : 1;
    if (g.cls !== "vowkeeper") {
      dealFront(heroMul * mMul);
      if (spdEff > 1 && Math.random() < spdEff - 1) dealFront(0.8 * heroMul * mMul);
      if (g.cls === "chronomancer" && g.chrono === 0) dealFront(1 * heroMul * mMul, "Echo");
    }
    if (g.cls === "blademaster") {
      const off = g.eq.offhand;
      if (off && off.wtype && WEAPON_TYPES[off.wtype] && WEAPON_TYPES[off.wtype].hands === 1) {
        const oMul = WEAPON_TYPES[off.wtype].dmg * (masteryOf(g, off) ? 1.1 : 1);
        dealFront(0.45 * oMul, "Off");
      }
    }
    if (petCfg && g.pet && g.pet.hp > 0 && foes[0]) {
      const petAtk = st.atk * petCfg.atkShare * b.atkMult * (bossFight ? 1 + 0.12 * fullSets : 1);
      const bd = Math.max(1, Math.round(petAtk * rnd(0.85, 1.15)));
      foes[0].hp -= bd;
      fx.push({ id: floatSeq++, text: companionForm(g).glyph + " −" + fmt(bd), crit: false, side: "beast" });
    }
  }
  if (g.cls === "druid" && !g.hurtLastTick && g.hp < st.maxHp) g.hp = Math.min(st.maxHp, g.hp + Math.round(st.maxHp * 0.03));
  if (g.race === "seafolk" && !g.hurtLastTick && g.hp < st.maxHp) g.hp = Math.min(st.maxHp, g.hp + Math.round(st.maxHp * 0.01));
  if (b.dotT > 0 && foes[0]) { foes[0].hp -= Math.round(b.dot * dt * (g.cls === "shadow" ? 1.3 : 1) * (g.race === "emberkin" ? 1.25 : 1) * foeElemMod(b.dotEl || null, foes[0])); b.dotT -= dt; }

  /* ---- item procs: on-hit ---- */
  const procs = eqProcs(g);
  if (foes.length) {
    if (procs.has("scorch") && b.dotT <= 0 && Math.random() < 0.12) {
      b.dot = Math.round(st.atk * 0.6); b.dotT = 3; b.dotEl = "fire";
      fx.push({ id: floatSeq++, text: "Scorch", crit: false, side: "enemy" });
    }
    if (procs.has("frostbite") && b.slowT <= 0 && Math.random() < 0.12) {
      b.slowT = 4;
      fx.push({ id: floatSeq++, text: "Frostbite", crit: false, side: "enemy" });
    }
    if (procs.has("stormbrand") && foes[0] && Math.random() < 0.1) {
      const d2 = Math.max(1, Math.round(st.atk * 1.5 * rnd(0.85, 1.15) * foeElemMod("storm", foes[0])));
      foes[0].hp -= d2;
      fx.push({ id: floatSeq++, text: "⚡−" + fmt(d2), crit: false, side: "enemy" });
    }
    if (procs.has("chainarc") && Math.random() < 0.08) {
      let tot = 0;
      for (const foe2 of foes) { const d3 = Math.max(1, Math.round(st.atk * 0.9 * rnd(0.85, 1.15) * foeElemMod("storm", foe2))); foe2.hp -= d3; tot += d3; }
      fx.push({ id: floatSeq++, text: "Arc −" + fmt(tot), crit: false, side: "enemy" });
    }
    if (procs.has("cindernova") && Math.random() < 0.06) {
      let tot = 0;
      for (const foe2 of foes) { const d3 = Math.max(1, Math.round(st.atk * 1.3 * rnd(0.85, 1.15) * foeElemMod("fire", foe2))); foe2.hp -= d3; tot += d3; }
      fx.push({ id: floatSeq++, text: "Nova −" + fmt(tot), crit: true, side: "enemy" });
    }
    if (procs.has("leechfang") && Math.random() < 0.1) {
      const hl = Math.round(st.maxHp * 0.02);
      g.hp = Math.min(st.maxHp, g.hp + hl);
      fx.push({ id: floatSeq++, text: "+" + fmt(hl), crit: false, side: "player", heal: true });
    }
    if (g.race === "bloodkin" && Math.random() < 0.1) {
      const hl = Math.round(st.maxHp * 0.02);
      g.hp = Math.min(st.maxHp, g.hp + hl);
      fx.push({ id: floatSeq++, text: "血+" + fmt(hl), crit: false, side: "player", heal: true });
    }
  }

  /* ---- resolve deaths ---- */
  const survivors = [];
  let slainThisTick = 0;
  for (const f of foes) {
    if (f.hp <= 0) {
      rewardFoe(g, f, st);
      slainThisTick++;
    } else survivors.push(f);
  }
  foes = survivors;
  if (foes.length === 0) {
    if (g.waveSize >= 2 && slainThisTick > 0 && !bossFight && !g.waveHadElite) {
      pushRibbon(g, `PACK SLAIN ×${g.waveSize}`, C.violet);
      bumpBounty(g, "packs");
    }
    // boss scent builds on ordinary hunts
    if (!g.bossPending && !bossFight) {
      const chance = 0.03 + g.bossMeter[g.zone];
      if (Math.random() < chance) {
        g.bossPending = true;
        pushLog(g, `The ground trembles. ${ZONES[g.zone].boss} has caught your scent…`, "boss");
        pushSplash(g, "THE HUNT TURNS", `${ZONES[g.zone].boss} comes for you`, C.cinnabar);
      } else {
        g.bossMeter[g.zone] = Math.min(0.5, g.bossMeter[g.zone] + (g.bg === "tracker" ? 0.0195 : 0.015));
      }
    }
    g.enemies = null;
    return g;
  }

  /* ---- enemy turn: every living foe strikes ---- */
  const heroDefEff = petCfg ? petCfg.heroDefMul : 1;
  if (g.splash || g.lvlfx) { g.enemies = foes; return g; }
  for (let i = 0; i < foes.length; i++) {
    const f = foes[i];
    if (f.stun > 0) { f.stun -= 1; continue; }
    const petFront = petCfg && g.pet && g.pet.hp > 0 && g.formation !== "back";
    if (f.isBoss) {
      f.bsT = (f.bsT || 6) - dt;
      if (f.bsT <= 0) {
        f.bsT = 7;
        f.bsN = (f.bsN || 0) + 1;
        if (f.bsN % 2 === 1) {
          const bel = f.el || "fire";
          let bd2 = Math.max(1, Math.round(f.atk * 2.2 * rnd(0.9, 1.1) * (1 - playerRes(g, bel))));
          if (petFront) {
            g.pet.hp -= bd2;
            fx.push({ id: floatSeq++, text: ELEMENTS[bel].glyph + "息 −" + fmt(bd2), crit: true, side: "beast" });
            if (g.pet.hp <= 0) { g.pet.hp = 0; g.pet.downT = 10; pushRibbon(g, petCfg.kind === "guardian" ? "THE GUARDIAN FALLS" : "YOUR BEAST FALLS", C.cinnabar); pushLog(g, "Your companion is struck down — it will return, in time.", "boss"); }
          } else {
            if (b.shield > 0) { const ab = Math.min(b.shield, bd2); b.shield -= ab; bd2 -= ab; }
            if (bd2 > 0) { g.hp -= bd2; g.hurtLastTick = true; }
            fx.push({ id: floatSeq++, text: ELEMENTS[bel].glyph + "息 −" + fmt(Math.max(0, bd2)), crit: true, side: "player" });
          }
          pushLog(g, `${f.name} unleashes its ${ELEMENTS[bel].name} breath!`, "boss");
        } else if (f.enrage < 1.3) {
          f.enrage = +(f.enrage + 0.1).toFixed(2);
          f.atk = Math.round(f.atk * 1.1);
          pushRibbon(g, "THE BOSS RAGES", C.cinnabar);
        }
      }
    }
    const slowed = (b.slowT > 0 ? 0.7 : 1) * (g.graveChill > 0 ? 0.92 : 1);
    if (petFront) {
      const petDef = st.def * petCfg.petDefMul;
      let edmgP = Math.max(1, Math.round(f.atk * slowed * rnd(0.85, 1.15) - petDef * 0.6));
      if (f.el) edmgP = Math.max(1, Math.round(edmgP * (1 - playerRes(g, f.el))));
      g.pet.hp -= edmgP;
      fx.push({ id: floatSeq++, text: "−" + fmt(edmgP), crit: false, side: "beast" });
      if (g.pet.hp <= 0) {
        g.pet.hp = 0;
        g.pet.downT = 10;
        pushRibbon(g, petCfg.kind === "guardian" ? "THE GUARDIAN FALLS" : "YOUR BEAST FALLS", C.cinnabar);
        pushLog(g, "Your companion is struck down — it will return, in time.", petCfg.kind === "guardian" ? "boss" : "kill");
      }
      continue;
    }
    let edmg = Math.max(1, Math.round((f.atk * slowed * rnd(0.85, 1.15) - st.def * heroDefEff * 0.6) * (g.race === "golemborn" ? 0.92 : 1) * (g.bg === "soldier" && (f.isElite || f.inPack) ? 0.88 : 1)));
    if (b.shield > 0) {
      const absorbed = Math.min(b.shield, edmg);
      b.shield -= absorbed;
      edmg -= absorbed;
    }
    if (edmg > 0 && f.el) edmg = Math.max(1, Math.round(edmg * (1 - playerRes(g, f.el))));
    if (edmg > 0) {
      g.hp -= edmg;
      g.hurtLastTick = true;
      if (g.cls === "ravager") g.rage = Math.min(100, (g.rage || 0) + 8);
      if (g.cls === "vowkeeper") {
        const mul = (b.vowT > 0 ? 1.6 : 1);
        const shock = Math.max(1, Math.round((edmg * 1.2 + st.atk * 0.35) * mul));
        for (const f2 of foes) if (f2.hp > 0) f2.hp -= shock;
        fx.push({ id: floatSeq++, text: "誓 −" + fmt(shock * Math.max(1, foes.length)), crit: b.vowT > 0, side: "enemy" });
      }
      fx.push({ id: floatSeq++, text: (f.el ? ELEMENTS[f.el].glyph : "") + "−" + fmt(edmg), crit: false, side: "player" });
      if (procs.has("stoneveil") && Math.random() < 0.1) {
        gainShield(st.maxHp * 0.12);
        fx.push({ id: floatSeq++, text: "⛨ Stoneveil", crit: false, side: "player", heal: true });
      }
      if (procs.has("thornmail") && Math.random() < 0.12) {
        const rd = Math.max(1, Math.round(st.atk * 0.4));
        f.hp -= rd;
        fx.push({ id: floatSeq++, text: "Thorns −" + fmt(rd), crit: false, side: "enemy" });
      }
      if (g.race === "frostkin" && b.slowT <= 0 && Math.random() < 0.1) {
        b.slowT = 3;
        fx.push({ id: floatSeq++, text: "Rime", crit: false, side: "enemy" });
      }
    }
    if (g.hp <= 0) {
      if (g.race === "spiritborn" && g.spiritGuard) {
        g.spiritGuard = false;
        if (Math.random() < 0.4) {
          g.hp = Math.max(1, Math.round(st.maxHp * 0.15));
          fx.push({ id: floatSeq++, text: "灵!", crit: false, side: "player", heal: true });
          pushLog(g, "Half-beyond — the killing blow passes through you, and spirit floods back.", "buff");
          continue;
        }
      }
      g.hp = 0;
      g.dead = (g.bg === "deserter" ? 6 : 8) - (g.bg === "tide" ? 1 : 0);
      const lost = g.bg === "deserter" ? 0 : Math.round(g.gold * (g.race === "stoneborn" ? 0.085 : 0.1));
      g.gold -= lost;
      g.enemies = null;
      g.bossPending = false;
      b.shield = 0; b.dot = 0; b.dotT = 0;
      g.streak = g.race === "foxkin" ? Math.floor((g.streak || 0) / 2) : 0;
      pushLog(g, lost > 0
        ? `${f.name} strikes you down. Your streak breaks; you lose ${fmt(lost)} gold.`
        : `${f.name} strikes you down. Your streak breaks — but a deserter keeps their purse.`, "death");
      pushSplash(g, "STRUCK DOWN", "the fire calls you back", C.cinnabar);
      return g;
    }
  }

  g.enemies = foes;
  return g;
}

/* ---------------- offline progress ---------------- */

function applyOffline(g) {
  RARITY_LUCK = g.bg === "gambler" ? 0.25 : 0;
  const now = Date.now();
  const sec = clamp((now - (g.savedAt || now)) / 1000, 0, 8 * 3600);
  if (sec < 90) return { g, report: null };

  if (g.camping) {
    const st = calcStats(g);
    g.hp = st.maxHp;
    if (g.vigor < 100) {
      if (g.vigor < 40) g.restedT = g.bg === "pilgrim" ? 900 : 600;
      g.vigor = 100;
      g.wasTired = false;
    }
    let trainedName = null;
    if (g.training && sec >= g.training.left) {
      const sk = SKILLS.find((s) => s.id === g.training.id);
      g.trained = [...g.trained, g.training.id];
      trainedName = sk ? sk.name : null;
      g.training = null;
    } else if (g.training) {
      g.training = { ...g.training, left: g.training.left - sec };
    }
    pushLog(g, "You wake by the cold ashes of the fire, restored.", "sys");
    const hrs = Math.floor(sec / 3600), mins = Math.floor((sec % 3600) / 60);
    return { g, report: { camp: true, time: (hrs ? hrs + "h " : "") + mins + "m", trainedName } };
  }

  const kt = killTime(g);
  let kills = clamp(Math.floor(sec / kt), 0, 6000);
  if (kills < 1) return { g, report: null };

  const z = ZONES[g.zone];
  const mid = Math.round((z.lv[0] + z.lv[1]) / 2);
  const sc = xpScale(g.level, mid);
  const rmods = (RACES[g.race] || RACES.human).mods;
  const echoMult = 1 + (g.echoes || 0) * 0.01;
  const setB = setTiers(g).t;
  const setRewardMult = 1 + 0.06 * setB.binding + 0.04 * setB.chime;
  const gold = Math.round(kills * eGold(mid) * (rmods.gold || 1) * echoMult * setRewardMult * (eqProcs(g).has("greedglint") ? 1.1 : 1) * (g.bg === "noble" ? 1.08 : 1) * (g.bg === "rod" ? 1.05 : 1));
  const xp = Math.round(kills * eXp(mid) * sc * (rmods.xp || 1) * echoMult * setRewardMult * (eqProcs(g).has("sagemind") ? 1.08 : 1) * (g.bg === "scholar" ? 1.1 : 1));
  g.gold += gold;
  g.xp += xp;
  g.kills[g.zone] = Math.min(99999, g.kills[g.zone] + kills);
  g.lifetimeKills += kills;
  g.streak = (g.streak || 0) + kills;
  if (g.bounty && !g.bounty.done && g.bounty.type === "kills") {
    g.bounty = { ...g.bounty, have: Math.min(g.bounty.need, g.bounty.have + kills) };
    if (g.bounty.have >= g.bounty.need) {
      g.bounty.done = true;
      g.gold += g.bounty.gold;
      pushLog(g, `Bounty complete while away: ${g.bounty.label} — +${fmt(g.bounty.gold)}g.`, "lvl");
    }
  }
  g.vigor = Math.max(25, g.vigor - kills * 0.35 * (g.bg === "farmhand" ? 0.75 : 1));
  const t = g.zone + 1;
  const mi = matIdxForTier(t);
  const mats = Math.round(kills * 0.3 * 1.2);
  g.materials[MATS[mi].key] += mats;
  const preLevel = g.level;
  let levels = 0;
  while (g.xp >= xpNeed(g.level)) {
    g.xp -= xpNeed(g.level);
    g.level += 1;
    levels += 1;
  }
  const realmUp = Math.floor(g.level / 10) > Math.floor(preLevel / 10);
  if (realmUp) {
    g.materials[MATS[mi].key] += ri(3, 5);
    applyDrop(g, makeItem(t, { minRarity: 3 }));
  }
  const drops = Math.min(10, Math.floor(kills * 0.28));
  for (let i = 0; i < drops; i++) applyDrop(g, makeItem(t));
  g.splash = null;
  g.splashQ = [];
  g.hold = 0;
  g.lvlfx = null;
  g.ribbon = null;
  g.hp = calcStats(g).maxHp;
  pushLog(g, `You return from ${ZONES[g.zone].name} laden with spoils.`, "sys");
  const hrs = Math.floor(sec / 3600), mins = Math.floor((sec % 3600) / 60);
  return {
    g,
    report: {
      time: (hrs ? hrs + "h " : "") + mins + "m",
      kills, gold, xp, mats, matName: MATS[mi].name, levels,
      realm: realmUp ? realmOf(g.level) : null,
      trivial: sc < 1 ? Math.round((1 - sc) * 100) : 0,
    },
  };
}

/* ---------------- storage, migration, seeds ---------------- */

function migrate(raw) {
  const cls = CLASSES[raw.cls] ? raw.cls : "warrior";
  const base = newGame(cls, raw.name);
  const g = { ...base, ...raw, cls };
  g.v = SAVE_VER;
  g.race = RACES[raw.race] ? raw.race : "human";
  g.bg = BACKGROUNDS[raw.bg] ? raw.bg : "farmhand";
  g.eq = { ...base.eq };
  if (raw.eq) for (const k of SLOT_KEYS) if (raw.eq[k]) g.eq[k] = raw.eq[k];
  const backfillSet = (it) => {
    if (!it || typeof it.set === "number" || typeof it.name !== "string") return it;
    const idx = SIG_SETS.findIndex((sn) => it.name.startsWith(sn + " "));
    return idx >= 0 ? { ...it, set: idx } : it;
  };
  for (const k of SLOT_KEYS) if (g.eq[k]) g.eq[k] = backfillSet(g.eq[k]);
  g.inv = (g.inv || []).map(backfillSet);
  const normItem = (it) => {
    if (!it) return it;
    let x = it;
    if (x.proc && !x.procs && PROCS[x.proc]) x = { ...x, procs: { [PROCS[x.proc].cat]: x.proc } };
    if (x.slot === "weapon" && !x.wtype) x = { ...x, wtype: "sword" };
    return x;
  };
  for (const k of SLOT_KEYS) if (g.eq[k]) g.eq[k] = normItem(g.eq[k]);
  g.inv = g.inv.map(normItem);
  g.vault = (Array.isArray(raw.vault) ? raw.vault : []).map((it) => normItem(backfillSet(it)));
  g.runes = raw.runes && typeof raw.runes === "object" ? { ...raw.runes } : {};
  g.pendingUpgrades = [];
  g.rage = clamp(raw.rage || 0, 0, 100);
  g.chrono = 0;
  g.formation = raw.formation === "back" ? "back" : "front";
  g.pet = raw.pet && typeof raw.pet === "object" ? { hp: Math.max(0, Math.round(raw.pet.hp || 0)), downT: Math.max(0, raw.pet.downT || 0) } : null;
  g.loadoutIdx = clamp(raw.loadoutIdx || 0, 0, 2);
  g.loadoutFocus = [0, 1, 2].map((i) => {
    const F = Array.isArray(raw.loadoutFocus) ? raw.loadoutFocus[i] : null;
    if (!Array.isArray(F)) return null;
    const cl = F.filter((s, j) => ["atk", "hp", "def", "crit"].includes(s) && F.indexOf(s) === j);
    return cl.length ? cl : null;
  });
  if (g.focus && !g.loadoutFocus[g.loadoutIdx]) g.loadoutFocus[g.loadoutIdx] = [...g.focus];
  g.loadouts = [0, 1, 2].map((i) => {
    const L = Array.isArray(raw.loadouts) ? raw.loadouts[i] : null;
    if (!L) return null;
    const m = {};
    for (const k of SLOT_KEYS) m[k] = L[k] ? normItem(backfillSet(L[k])) : null;
    return m;
  });
  for (const k of SLOT_KEYS) { const it = g.eq[k]; if (it && isVaultClass(it)) vaultStore(g, it, true); }
  g.inv = g.inv.filter((it) => { if (isVaultClass(it)) { vaultStore(g, it, true); return false; } return true; });
  g.kills = ZONES.map((_, i) => (raw.kills && raw.kills[i]) || 0);
  g.bossDown = ZONES.map((_, i) => !!(raw.bossDown && raw.bossDown[i]));
  g.bossMeter = ZONES.map((_, i) => (raw.bossMeter && raw.bossMeter[i]) || 0);
  g.materials = { ...base.materials, ...(raw.materials || {}) };
  g.essence = Math.max(0, Math.round(raw.essence || 0));
  g.trained = Array.isArray(raw.trained)
    ? raw.trained
    : SKILLS.filter((s) => s.cls === cls && s.lv <= g.level).map((s) => s.id);
  g.skillsOn = (raw.skillsOn || []).filter((id) => g.trained.includes(id)).slice(0, ((raw.level || 1) >= 50 ? 4 : 3) + (cls === "beastcaller" ? 1 : 0));
  g.vigor = clamp(typeof raw.vigor === "number" ? raw.vigor : 100, 0, 100);
  g.restedT = raw.restedT || 0;
  const rawFocus = Array.isArray(raw.focus) ? raw.focus : raw.focus ? [raw.focus] : [];
  g.focus = rawFocus.filter((s, i) => ["atk", "hp", "def", "crit"].includes(s) && rawFocus.indexOf(s) === i);
  if (!g.focus.length) g.focus = null;
  g.locked = { ...base.locked, ...(raw.locked || {}) };
  g.streak = raw.streak || 0;
  g.echoes = Math.max(0, Math.round(raw.echoes || 0));
  g.rebirths = Math.max(0, Math.round(raw.rebirths || 0));
  g.bounty = raw.bounty && raw.bounty.type ? { ...raw.bounty } : null;
  g.bountyCd = 0;
  g.training = raw.training && raw.training.id ? raw.training : null;
  g.zone = clamp(raw.zone || 0, 0, ZONES.length - 1);
  g.maxZone = clamp(raw.maxZone || 0, g.zone, ZONES.length - 1);
  // transient resets
  g.enemies = null; g.waveSize = 1; g.dead = 0; g.fx = []; g.splash = null; g.splashQ = []; g.hold = 0; g.lvlfx = null; g.ribbon = null;
  g.cds = {}; g.paused = false; g.bossPending = false;
  g.buffs = { atkMult: 1, atkT: 0, critAdd: 0, critT: 0, shield: 0, dot: 0, dotT: 0, slowT: 0 };
  const ids = [
    ...g.inv.map((i) => i.id + 1),
    ...Object.values(g.eq).filter(Boolean).map((i) => i.id + 1),
  ];
  itemSeq = Math.max(itemSeq, 1, ...ids);
  return g;
}

async function saveGame(g) {
  try {
    if (!store.available()) return;
    await store.set(SAVE_KEY, JSON.stringify({ ...g, fx: [], splash: null, splashQ: [], hold: 0, lvlfx: null, ribbon: null, savedAt: Date.now() }));
  } catch (e) { /* storage unavailable — session-only play */ }
}

async function loadGame() {
  try {
    if (!store.available()) return null;
    const res = await store.get(SAVE_KEY);
    if (!res || !res.value) return null;
    return migrate(JSON.parse(res.value));
  } catch (e) {
    return null;
  }
}

async function clearSave() {
  try {
    await store.delete(SAVE_KEY);
  } catch (e) { /* ignore */ }
}

function encodeSeed(g) {
  const json = JSON.stringify({ ...g, fx: [], splash: null, splashQ: [], hold: 0, lvlfx: null, ribbon: null, enemies: null, savedAt: Date.now() });
  return "WARSEED1." + btoa(unescape(encodeURIComponent(json)));
}

function decodeSeed(text) {
  const clean = (text || "").trim();
  const body = clean.startsWith("WARSEED1.") ? clean.slice(9) : clean;
  const json = decodeURIComponent(escape(atob(body.replace(/\s+/g, ""))));
  const raw = JSON.parse(json);
  if (!raw || !CLASSES[raw.cls]) throw new Error("not a hero seed");
  return migrate(raw);
}

function App() {
  const [game, setGame] = useState(null);
  const [phase, setPhase] = useState("loading");
  const [tab, setTab] = useState("battle");
  const [report, setReport] = useState(null);
  const [confirmReset, setConfirmReset] = useState(false);
  const [pickCls, setPickCls] = useState("warrior");
  const [pickRace, setPickRace] = useState("human");
  const [pickBg, setPickBg] = useState("farmhand");
  const [showStats, setShowStats] = useState(false);
  const [confirmRebirth, setConfirmRebirth] = useState(false);
  const [carry, setCarry] = useState({ echoes: 0, rebirths: 0 });
  const [heroName, setHeroName] = useState("");
  const [forgeSlot, setForgeSlot] = useState("weapon");
  const [vaultSlotF, setVaultSlotF] = useState("all");
  const [vaultStatF, setVaultStatF] = useState("any");
  const [showLootGuide, setShowLootGuide] = useState(false);
  const [showForgeGuide, setShowForgeGuide] = useState(false);
  const [seedOut, setSeedOut] = useState("");
  const [seedIn, setSeedIn] = useState("");
  const [seedMsg, setSeedMsg] = useState("");
  const gameRef = useRef(null);
  gameRef.current = game;

  useEffect(() => {
    (async () => {
      const g = await loadGame();
      if (g) {
        const { g: g2, report: rep } = applyOffline(g);
        setGame(g2);
        setReport(rep);
        setPhase("play");
        saveGame(g2);
      } else {
        try {
          if (store.available()) {
            const r = await store.get(ECHO_KEY);
            if (r && r.value) {
              const c = JSON.parse(r.value);
              setCarry({ echoes: c.echoes || 0, rebirths: c.rebirths || 0 });
            }
          }
        } catch (e) { /* no banked echoes */ }
        setPhase("select");
      }
    })();
  }, []);

  useEffect(() => {
    if (phase !== "play") return;
    const iv = setInterval(() => setGame((g) => (g ? step(g) : g)), TICK_MS);
    return () => clearInterval(iv);
  }, [phase]);

  useEffect(() => {
    if (phase !== "play") return;
    const iv = setInterval(() => { if (gameRef.current) saveGame(gameRef.current); }, 15000);
    return () => clearInterval(iv);
  }, [phase]);

  const start = () => {
    const g = newGame(pickCls, heroName.trim(), pickRace, pickBg);
    g.echoes = carry.echoes || 0;
    g.rebirths = carry.rebirths || 0;
    if (pickBg === "orphan") {
      const s0 = SKILLS.find((s2) => s2.cls === pickCls && s2.lv === 3);
      if (s0) { g.trained = [s0.id]; g.skillsOn = [s0.id]; pushLog(g, `Temple drills endure: ${s0.name} is already yours.`, "buff"); }
    }
    if (pickBg === "smith") g.materials.glyph = 3;
    if (pickBg === "pyre") g.essence = 5;
    if (g.echoes > 0) {
      pushLog(g, `Echoes of ${g.rebirths} past ${g.rebirths > 1 ? "lives" : "life"} hum within you: +${g.echoes}% XP & gold, +${(g.echoes * 0.5).toFixed(0)}% stats.`, "buff");
    }
    try { store.delete(ECHO_KEY); } catch (e) { /* ignore */ }
    setCarry({ echoes: 0, rebirths: 0 });
    setGame(g);
    setPhase("play");
    saveGame(g);
  };

  const doRebirth = async () => {
    const g = gameRef.current;
    if (!g) return;
    const gained = Math.round((Math.floor(g.level / 4) + g.bossDown.filter(Boolean).length * 3) * (g.race === "starborn" ? 1.2 : 1));
    const next = { echoes: (g.echoes || 0) + gained, rebirths: (g.rebirths || 0) + 1 };
    try { await store.set(ECHO_KEY, JSON.stringify(next)); } catch (e) { /* session-only */ }
    await clearSave();
    setCarry(next);
    setGame(null);
    setConfirmRebirth(false);
    setReport(null);
    setTab("battle");
    setSeedOut("");
    setSeedMsg("");
    setPhase("select");
  };

  const mutate = (fn) => {
    setGame((g) => {
      if (!g) return g;
      const next = fn({
        ...g,
        inv: [...g.inv], eq: { ...g.eq }, skillsOn: [...g.skillsOn],
        trained: [...g.trained], materials: { ...g.materials },
      });
      saveGame(next);
      return next;
    });
  };

  const equip = (item) =>
    mutate((g) => {
      if (item.slot === "offhand" && isTwoH(g.eq.weapon)) {
        pushLog(g, "Your two-handed grip leaves no hand free.", "sys");
        return g;
      }
      g.inv = g.inv.filter((i) => i.id !== item.id);
      if (item.slot === "weapon" && isTwoH(item)) displaceOffhand(g, false);
      const old = g.eq[item.slot];
      if (old) {
        if (isVaultClass(old)) pushLog(g, `${old.name} returns to the vault's keeping.`, "sys");
        else g.inv = [...g.inv, old];
      }
      g.eq = { ...g.eq, [item.slot]: item };
      g.hp = Math.min(g.hp, calcStats(g).maxHp);
      pushLog(g, `Equipped ${item.name}.`, "sys");
      return g;
    });

  const equipOff = (item) =>
    mutate((g) => {
      if (g.cls !== "blademaster" || !item.wtype || isTwoH(item)) return g;
      if (isTwoH(g.eq.weapon)) { pushLog(g, "Free your main hand of the two-hander first.", "sys"); return g; }
      g.inv = g.inv.filter((i) => i.id !== item.id);
      const off = g.eq.offhand;
      if (off) {
        if (isVaultClass(off)) pushLog(g, `${off.name} returns to the vault's keeping.`, "sys");
        else g.inv = [...g.inv, off];
      }
      g.eq = { ...g.eq, offhand: { ...item, slot: "offhand" } };
      g.hp = Math.min(g.hp, calcStats(g).maxHp);
      pushLog(g, `Off hand armed: ${item.name}.`, "sys");
      return g;
    });

  const sell = (item) =>
    mutate((g) => {
      if (isVaultClass(item)) {
        g.inv = g.inv.filter((i) => i.id !== item.id);
        vaultStore(g, item);
        pushLog(g, `${item.name} is attuned — it cannot be melted. It rests in the vault.`, "sys");
        return g;
      }
      g.inv = g.inv.filter((i) => i.id !== item.id);
      g.gold += item.value;
      const e = essenceOf(item.rarity);
      if (e) g.essence = (g.essence || 0) + e;
      pushLog(g, `Sold ${item.name} for ${fmt(item.value)} gold${e ? ` · +${e}精` : ""}.`, "loot");
      return g;
    });

  const sellAll = () =>
    mutate((g) => {
      const keep = g.inv.filter((i) => isVaultClass(i));
      const melt = g.inv.filter((i) => !isVaultClass(i));
      for (const it of keep) vaultStore(g, it, true);
      const v = melt.reduce((s, i) => s + i.value, 0);
      const es = melt.reduce((s, i) => s + essenceOf(i.rarity), 0);
      if (melt.length) {
        g.essence = (g.essence || 0) + es;
        g.gold += v;
        pushLog(g, `Melted ${melt.length} items for ${fmt(v)} gold${es ? ` · +${es}精` : ""}${keep.length ? ` · ${keep.length} attuned piece${keep.length > 1 ? "s" : ""} sealed in the vault` : ""}.`, "loot");
      } else if (keep.length) {
        pushLog(g, `${keep.length} attuned piece${keep.length > 1 ? "s" : ""} sealed in the vault — nothing melted.`, "sys");
      }
      g.inv = [];
      return g;
    });

  const toggleFormation = () =>
    mutate((g) => {
      if (!companionCfg(g)) return g;
      g.formation = g.formation === "back" ? "front" : "back";
      pushLog(g, g.formation === "back"
        ? "Your companion falls back — you take the blows now."
        : "Your companion strides to the front line, shielding you.", "sys");
      return g;
    });

  const toggleSkill = (id) =>
    mutate((g) => {
      const cap = (g.level >= 50 ? 4 : 3) + (g.cls === "beastcaller" ? 1 : 0);
      if (g.skillsOn.includes(id)) g.skillsOn = g.skillsOn.filter((s) => s !== id);
      else if (!g.trained.includes(id)) pushLog(g, "Train this skill at camp first.", "sys");
      else if (g.skillsOn.length < cap) g.skillsOn = [...g.skillsOn, id];
      else pushLog(g, `Only ${cap} skills can be woven at once${g.level < 50 ? " — one more loom opens at level 50" : ""}.`, "sys");
      return g;
    });

  const toggleLock = (slot) =>
    mutate((g) => {
      g.locked = { ...g.locked, [slot]: !g.locked[slot] };
      pushLog(g, g.locked[slot]
        ? `${SLOTS[slot].name} locked — upgrades will wait in your pack for review.`
        : `${SLOTS[slot].name} unlocked — pure upgrades equip themselves again.`, "sys");
      return g;
    });

  const startTraining = (id) =>
    mutate((g) => {
      const sk = SKILLS.find((s) => s.id === id);
      if (!sk || g.trained.includes(id) || g.level < sk.lv) return g;
      if (g.training) pushLog(g, `You set aside ${SKILLS.find((s) => s.id === g.training.id)?.name || "your studies"}.`, "sys");
      const tt = Math.round(sk.tt * (g.bg === "orphan" ? 0.7 : 1));
      g.training = { id, left: tt, total: tt };
      pushLog(g, `Training ${sk.name} — progress only while camped.`, "sys");
      return g;
    });

  const toggleFocusStat = (f) =>
    mutate((g) => {
      const cur = focusRanks(g).slice();
      const i = cur.indexOf(f);
      if (i >= 0) cur.splice(i, 1);
      else cur.push(f);
      g.focus = cur.length ? cur : null;
      pushLog(g, g.focus
        ? `Build preference: ${g.focus.map((s) => s.toUpperCase()).join(" > ")} — upgrades ranked in that order.`
        : "Build preference cleared — any overall improvement counts.", "sys");
      return g;
    });

  const resolveUpgrade = (itemId, accept) =>
    mutate((g) => {
      const q = (g.pendingUpgrades || []).find((x) => x.itemId === itemId);
      if (!q) return g;
      g.pendingUpgrades = g.pendingUpgrades.filter((x) => x.itemId !== itemId);
      if (!accept) { pushLog(g, `Kept your current ${SLOTS[q.slot].name}. ${q.itemName} waits in your pack.`, "sys"); return g; }
      const incoming = g.inv.find((i) => i.id === itemId) || (g.vault || []).find((i) => i.id === itemId);
      if (!incoming) return g;
      const old = g.eq[q.slot];
      g.inv = g.inv.filter((i) => i.id !== itemId);
      if (q.slot === "weapon" && isTwoH(incoming)) displaceOffhand(g, false);
      g.eq = { ...g.eq, [q.slot]: incoming };
      // the replaced piece is preserved — attuned to the vault or kept in the pack, never auto-melted
      if (old) {
        if (isVaultClass(old)) { vaultStore(g, old, true); pushLog(g, `${incoming.name} equipped · ${old.name} kept safe in the vault.`, "loot"); }
        else if (g.inv.length < INV_CAP) { g.inv = [...g.inv, old]; pushLog(g, `${incoming.name} equipped · ${old.name} kept in your pack.`, "loot"); }
        else pushLog(g, `${incoming.name} equipped · pack full, ${old.name} could not be kept.`, "sys");
      }
      g.hp = Math.min(g.hp, calcStats(g).maxHp);
      return g;
    });

  const clearFocus = () =>
    mutate((g) => {
      g.focus = null;
      pushLog(g, "Build preference cleared — any overall improvement counts.", "sys");
      return g;
    });

  const travel = (idx) =>
    mutate((g) => {
      g.zone = idx;
      g.enemies = null;
      g.bossPending = false;
      pushLog(g, `You travel to ${ZONES[idx].name}.`, "sys");
      return g;
    });

  const toggleCamp = () =>
    mutate((g) => {
      g.camping = !g.camping;
      if (g.camping) { g.enemies = null; g.bossPending = false; pushLog(g, "You set up camp. The fire crackles.", "sys"); }
      else pushLog(g, "You break camp and take up your blade.", "sys");
      return g;
    });

  const togglePause = () => mutate((g) => { g.paused = !g.paused; return g; });

  const buyMat = (mi2) =>
    mutate((g) => {
      const m = MATS[mi2];
      const price = Math.round(m.price * (g.bg === "merchant" ? 0.88 : 1));
      if (g.gold < price) { pushLog(g, "Not enough gold.", "sys"); return g; }
      g.gold -= price;
      g.materials[m.key] += 1;
      pushLog(g, `Bought 1× ${m.name}.`, "melt");
      return g;
    });

  const buyTonic = () =>
    mutate((g) => {
      const price = Math.round(35 * costScale(g.zone + 1) * (g.bg === "merchant" ? 0.88 : 1));
      if (g.gold < price) { pushLog(g, "Not enough gold.", "sys"); return g; }
      g.gold -= price;
      g.vigor = Math.min(100, g.vigor + 50);
      pushLog(g, "The tonic burns going down. Vigor +50.", "buff");
      return g;
    });

  const forge = () =>
    mutate((g) => {
      const t = g.zone + 1;
      const mi2 = matIdxForTier(t);
      const mat = MATS[mi2];
      const goldCost = Math.round(60 * costScale(t) * (g.bg === "smith" ? 0.85 : 1) * (g.race === "ironkin" ? 0.88 : 1));
      if (g.materials[mat.key] < 5) { pushLog(g, `The forge needs 5× ${mat.name}.`, "sys"); return g; }
      if (g.gold < goldCost) { pushLog(g, `The smith wants ${fmt(goldCost)} gold.`, "sys"); return g; }
      g.materials[mat.key] -= 5;
      g.gold -= goldCost;
      const item = forgeItem(t, forgeSlot, FORGE_WEIGHTS);
      pushLog(g, `The forge rings: ${item.name} (${RARITIES[item.rarity].name}).`, "lvl");
      const r = applyDrop(g, item);
      if (item.mw && r !== "melt") pushSplash(g, "MASTERWORK", item.name, C.gilt);
      return g;
    });

  const focusedForge = () =>
    mutate((g) => {
      const t = g.zone + 1;
      const mat = MATS[matIdxForTier(t)];
      const goldCost = Math.round(120 * costScale(t) * (g.bg === "smith" ? 0.85 : 1) * (g.race === "ironkin" ? 0.88 : 1));
      if ((g.essence || 0) < 10) { pushLog(g, "The rite needs 10 Spirit Essence.", "sys"); return g; }
      if (g.materials[mat.key] < 5 || g.gold < goldCost) { pushLog(g, `It also asks 5× ${mat.name} and ${fmt(goldCost)} gold.`, "sys"); return g; }
      g.essence -= 10;
      g.materials[mat.key] -= 5;
      g.gold -= goldCost;
      const item = forgeItem(t, forgeSlot, [0, 0, 0, 0, 85, 15]);
      pushLog(g, `The rite concludes: ${item.name} (${RARITIES[item.rarity].name}).`, "lvl");
      const r = applyDrop(g, item);
      if (item.mw && r !== "melt") pushSplash(g, "MASTERWORK", item.name, C.gilt);
      return g;
    });

  const temper = () =>
    mutate((g) => {
      const it = g.eq[forgeSlot];
      if (!it) { pushLog(g, "Nothing is equipped in that slot.", "sys"); return g; }
      const tp = it.temper || 0;
      if (tp >= 5) { pushLog(g, `${it.name} can be honed no further.`, "sys"); return g; }
      const im = MATS[matIdxForTier(it.tier)];
      const matCost = 2 + tp;
      const goldCost = Math.round(40 * costScale(it.tier) * (tp + 1) * (g.bg === "smith" ? 0.85 : 1) * (g.race === "ironkin" ? 0.88 : 1));
      if (g.materials[im.key] < matCost || g.gold < goldCost) {
        pushLog(g, `Tempering asks ${matCost}× ${im.name} and ${fmt(goldCost)} gold.`, "sys");
        return g;
      }
      g.materials[im.key] -= matCost;
      g.gold -= goldCost;
      const ns = { ...it.stats };
      for (const k of Object.keys(ns)) ns[k] = k === "crit" ? +(ns[k] * 1.08).toFixed(1) : Math.round(ns[k] * 1.08);
      g.eq = { ...g.eq, [forgeSlot]: { ...it, stats: ns, temper: tp + 1 } };
      pushLog(g, `${it.name} tempered to +${tp + 1}: its edge sings.`, "lvl");
      if (tp + 1 === 5) pushRibbon(g, "FULLY TEMPERED", C.gilt);
      return g;
    });

  const autoForge = () =>
    mutate((g) => {
      const t = g.zone + 1;
      const mi2 = matIdxForTier(t);
      const mat = MATS[mi2];
      const goldCost = Math.round(60 * costScale(t) * (g.bg === "smith" ? 0.85 : 1) * (g.race === "ironkin" ? 0.88 : 1));
      let strikes = 0, spentMats = 0, spentGold = 0, made = null, result = null;
      while (strikes < 60) {
        if (g.materials[mat.key] < 5 || g.gold < goldCost) break;
        g.materials[mat.key] -= 5;
        g.gold -= goldCost;
        spentMats += 5;
        spentGold += goldCost;
        strikes++;
        const item = forgeItem(t, forgeSlot, FORGE_WEIGHTS);
        const r = applyDrop(g, item, true);
        if (r !== "melt") { made = item; result = r; break; }
      }
      if (strikes === 0) {
        pushLog(g, `Auto-forge needs 5× ${mat.name} and ${fmt(goldCost)} gold per strike.`, "sys");
      } else if (made) {
        const outcome = result === "kept" ? "kept in pack — weigh the trade-off" : "equipped on the spot";
